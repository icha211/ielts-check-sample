<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Writing Set | IELTS Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f8f5;--surface:#fff;--text:#182621;--muted:#5a6d66;--teal:#114b3a;--teal2:#1f745e;--border:#d8e4de;--radius:14px;--shadow:0 14px 32px rgba(17,75,58,.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Poppins,sans-serif;color:var(--text);background:radial-gradient(circle at 5% 0%,rgba(76,163,255,.12),transparent 34%),radial-gradient(circle at 95% 5%,rgba(17,75,58,.12),transparent 30%),var(--bg)}
    h1,h2,h3{font-family:Sora,sans-serif;letter-spacing:-.01em}
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px 36px;display:grid;gap:14px}
    .topbar,.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:16px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(140deg,#fff,#edf8f2)}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:36px;height:36px;border:1px solid var(--border);border-radius:11px;padding:4px;object-fit:contain;background:#fff}.brand p{color:var(--muted);font-size:.85rem;margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:10px;padding:10px 13px;font-size:.84rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .2s ease}
    .btn:hover{transform:translateY(-2px)} .btn-main{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}.btn-alt{background:#fff;color:var(--teal);border:1px solid var(--border)}
    .field{margin-bottom:10px}.field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:Poppins,sans-serif;font-size:.9rem;background:#fff}
    .field textarea{min-height:120px;resize:vertical}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .settings-box{border:1px solid #cfe1f7;border-radius:var(--radius);background:linear-gradient(180deg,#f4f9ff,#eef6ff);padding:12px}
    .settings-box h3{color:#1f4f95}
    .toast{position:fixed;right:12px;bottom:12px;background:#123e32;color:#fff;border-radius:10px;padding:10px 14px;font-size:.83rem;display:none;z-index:20}
    @media (max-width:900px){.row2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <section class="topbar">
    <div class="brand"><img src="logo.png" alt="IELTS Check logo"><div><h1>Create Writing Problem Set</h1><p>Create page only. User view is separate in writing test page.</p></div></div>
    <div class="actions">
      <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
      <a class="btn btn-alt" href="developer-edit-writing.html">Open Edit Page</a>
      <a class="btn btn-alt" href="writing-test.html?returnTo=developer-create-writing.html" target="_blank">Open Real User View</a>
      <button class="btn btn-main" type="button" id="saveTop">Save Writing Set</button>
    </div>
  </section>

  <section class="panel settings-box">
    <h3 style="margin-bottom:10px;">Writing Set Information</h3>
    <div class="row2">
      <div class="field"><label>Set Title</label><input type="text" id="setTitle" placeholder="IELTS Academic Writing"></div>
      <div class="field"><label>Set Date</label><input type="date" id="setDate"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Difficulty</label><select id="difficultyLevel"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div>
      <div class="field"><label>Level</label><select id="setLevel"><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select></div>
    </div>
    <div class="field"><label>Task Title</label><input type="text" id="taskTitle" placeholder="Task 1: Describe a Chart"></div>
    <div class="field"><label>Task Description</label><textarea id="taskDescription" placeholder="Instruction shown above prompt"></textarea></div>
    <div class="field"><label>Prompt Content (HTML allowed)</label><textarea id="promptContent" placeholder="Prompt body"></textarea></div>
    <div class="field"><label>Minimum Words</label><input type="number" min="50" id="minimumWords" value="150"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button class="btn btn-main" type="button" id="saveBottom">Save Writing Set</button>
      <button class="btn btn-alt" type="button" id="resetBtn">Reset Draft</button>
    </div>
  </section>
</main>
<div class="toast" id="toast"></div>

<script src="storage-sync.js"></script>
<script>
const STORAGE_KEY = "prephaven_problems_writing_v1";
const draft = { moduleId:"writing", icon:"✍️", moduleName:"Writing", title:"", difficulty:"beginner", level:1, scheduledDate:"", taskTitle:"", taskDescription:"", promptContent:"", minimumWords:150 };
function toast(m){const b=document.getElementById("toast");b.textContent=m;b.style.display="block";setTimeout(()=>b.style.display="none",2200);} 
function readProblems(){return [];}
async function writeProblems(v){await storageSync.saveAllProblems({writing:v,reading:[],listening:[],speaking:[]}).catch(err=>{console.error("Error saving problems:",err);});}
function setDefaultDate(){document.getElementById("setDate").value=new Date().toISOString().split("T")[0];}
function setInitialDate(){const params=new URLSearchParams(window.location.search);const incoming=params.get("date");const value=incoming&&/^\d{4}-\d{2}-\d{2}$/.test(incoming)?incoming:new Date().toISOString().split("T")[0];document.getElementById("setDate").value=value;}
async function save(){
  const p={...draft,title:document.getElementById("setTitle").value.trim(),scheduledDate:document.getElementById("setDate").value,difficulty:document.getElementById("difficultyLevel").value,level:Number(document.getElementById("setLevel").value||1),taskTitle:document.getElementById("taskTitle").value.trim(),taskDescription:document.getElementById("taskDescription").value.trim(),promptContent:document.getElementById("promptContent").value.trim(),minimumWords:Number(document.getElementById("minimumWords").value||150),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),id:`problem_${Date.now()}`};
  if(!p.title||!p.scheduledDate||!p.taskTitle||!p.promptContent){toast("Title, date, task title, and prompt are required");return;}
  const list=readProblems();list.unshift(p);await writeProblems(list);toast("Writing set saved");
}
function reset(){document.getElementById("setTitle").value="";document.getElementById("difficultyLevel").value="beginner";document.getElementById("setLevel").value="1";document.getElementById("taskTitle").value="";document.getElementById("taskDescription").value="";document.getElementById("promptContent").value="";document.getElementById("minimumWords").value="150";setDefaultDate();}
document.getElementById("saveTop").addEventListener("click",save);document.getElementById("saveBottom").addEventListener("click",save);document.getElementById("resetBtn").addEventListener("click",reset);setInitialDate();
</script>
</body>
</html>
