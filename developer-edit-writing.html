<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Writing Sets | IELTS Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f8f5;--surface:#fff;--text:#182621;--muted:#5a6d66;--teal:#114b3a;--teal2:#1f745e;--border:#d8e4de;--radius:14px;--shadow:0 14px 32px rgba(17,75,58,.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Poppins,sans-serif;color:var(--text);background:radial-gradient(circle at 5% 0%,rgba(76,163,255,.12),transparent 34%),radial-gradient(circle at 95% 5%,rgba(17,75,58,.12),transparent 30%),var(--bg)}
    h1,h2,h3{font-family:Sora,sans-serif;letter-spacing:-.01em}
    .wrap{max-width:1200px;margin:0 auto;padding:22px 16px 36px;display:grid;gap:14px}
    .topbar,.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:14px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(140deg,#fff,#edf8f2)}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:36px;height:36px;border:1px solid var(--border);border-radius:11px;padding:4px;object-fit:contain;background:#fff}.brand p{color:var(--muted);font-size:.85rem;margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:10px;padding:10px 13px;font-size:.84rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .2s ease}
    .btn:hover{transform:translateY(-2px)} .btn-main{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}.btn-alt{background:#fff;color:var(--teal);border:1px solid var(--border)}
    .shell{display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px;align-items:start}
    .set-list{display:grid;gap:8px;max-height:76vh;overflow:auto;padding-right:4px}
    .set-item{border:1px solid var(--border);border-radius:12px;background:#fff;padding:10px;cursor:pointer;transition:all .2s ease}.set-item:hover{transform:translateY(-1px)}.set-item.active{border-color:var(--teal);background:#eff8f3}
    .set-item h4{font-size:.9rem;color:var(--teal);margin-bottom:2px}.set-item p{color:var(--muted);font-size:.78rem}
    .empty{border:1px dashed var(--border);border-radius:12px;padding:16px;color:var(--muted);text-align:center;font-size:.86rem}
    .settings-box{border:1px solid #cfe1f7;border-radius:var(--radius);background:linear-gradient(180deg,#f4f9ff,#eef6ff);padding:12px}
    .settings-box h3{color:#1f4f95}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{margin-bottom:10px}.field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:Poppins,sans-serif;font-size:.9rem;background:#fff}
    .field textarea{min-height:120px;resize:vertical}
    .footer-actions{position:sticky;bottom:10px;margin-top:10px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .toast{position:fixed;right:12px;bottom:12px;background:#123e32;color:#fff;border-radius:10px;padding:10px 14px;font-size:.83rem;display:none;z-index:20}
    @media (max-width:950px){.shell{grid-template-columns:1fr}.row2{grid-template-columns:1fr}.footer-actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <section class="topbar">
    <div class="brand"><img src="logo.png" alt="IELTS Check logo"><div><h1>Edit Writing Problem Sets</h1><p>Edit page only. User view is separate in writing test page.</p></div></div>
    <div class="actions">
      <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
      <a class="btn btn-alt" href="developer-create-writing.html">Create New Writing Set</a>
      <a class="btn btn-alt" href="writing-test.html?returnTo=developer-edit-writing.html" target="_blank">Open Real User View</a>
      <button class="btn btn-main" type="button" id="updateTop">Update Current Set</button>
    </div>
  </section>

  <section class="shell">
    <aside class="panel"><h3 style="margin-bottom:8px;">Writing Set List</h3><div id="setList" class="set-list"></div></aside>
    <section class="panel">
      <div id="emptyEditor" class="empty">Select one writing set from the left panel.</div>
      <div id="editor" style="display:none;">
        <div class="settings-box">
          <h3 style="margin-bottom:10px;">Writing Set Information</h3>
          <div class="row2"><div class="field"><label>Set Title</label><input type="text" id="setTitle"></div><div class="field"><label>Set Date</label><input type="date" id="setDate"></div></div>
          <div class="row2"><div class="field"><label>Difficulty</label><select id="difficultyLevel"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div><div class="field"><label>Level</label><select id="setLevel"><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select></div></div>
          <div class="field"><label>Task Title</label><input type="text" id="taskTitle"></div>
          <div class="field"><label>Task Description</label><textarea id="taskDescription"></textarea></div>
          <div class="field"><label>Prompt Content (HTML allowed)</label><textarea id="promptContent"></textarea></div>
          <div class="field"><label>Minimum Words</label><input type="number" min="50" id="minimumWords"></div>
        </div>

        <div class="footer-actions">
          <button class="btn btn-main" type="button" id="updateBottom">Update Current Set</button>
          <button class="btn btn-alt" type="button" id="duplicateBtn">Duplicate as New</button>
          <button class="btn btn-alt" type="button" id="deleteBtn" style="border-color:#ffd1d1;color:#c44444;">Delete Current Set</button>
        </div>
      </div>
    </section>
  </section>
</main>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "prephaven_problems_writing_v1";
let allProblems = [];
let selectedIndex = null;
function toast(m){const b=document.getElementById("toast");b.textContent=m;b.style.display="block";setTimeout(()=>b.style.display="none",2200);} 
function readProblems(){const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return [];try{const p=JSON.parse(raw);return Array.isArray(p)?p:[];}catch{return [];}}
function writeProblems(v){localStorage.setItem(STORAGE_KEY,JSON.stringify(v));}
function escapeHtml(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}

function renderSetList(){
  const host=document.getElementById("setList");
  if(allProblems.length===0){host.innerHTML='<div class="empty">No writing set yet.</div>';return;}
  host.innerHTML=allProblems.map((item,idx)=>`<article class="set-item ${selectedIndex===idx?"active":""}" onclick="selectSet(${idx})"><h4>${escapeHtml(item.icon||"✍️")} ${escapeHtml(item.title||"Untitled")}</h4><p>${escapeHtml(item.difficulty||"beginner")} • Level ${escapeHtml(item.level||1)}</p><p>Date: ${escapeHtml(item.scheduledDate||"-")}</p></article>`).join("");
}

function selectSet(index){
  const item=allProblems[index];if(!item)return;selectedIndex=index;
  document.getElementById("emptyEditor").style.display="none";document.getElementById("editor").style.display="block";
  document.getElementById("setTitle").value=item.title||"";
  document.getElementById("setDate").value=item.scheduledDate||new Date().toISOString().split("T")[0];
  document.getElementById("difficultyLevel").value=item.difficulty||"beginner";
  document.getElementById("setLevel").value=String(item.level||1);
  document.getElementById("taskTitle").value=item.taskTitle||"";
  document.getElementById("taskDescription").value=item.taskDescription||"";
  document.getElementById("promptContent").value=item.promptContent||"";
  document.getElementById("minimumWords").value=String(item.minimumWords||150);
  renderSetList();
}

function syncCurrent(){
  const c=allProblems[selectedIndex];
  c.moduleId="writing";c.moduleName="Writing";c.icon="✍️";
  c.title=document.getElementById("setTitle").value.trim();
  c.scheduledDate=document.getElementById("setDate").value;
  c.difficulty=document.getElementById("difficultyLevel").value;
  c.level=Number(document.getElementById("setLevel").value||1);
  c.taskTitle=document.getElementById("taskTitle").value.trim();
  c.taskDescription=document.getElementById("taskDescription").value.trim();
  c.promptContent=document.getElementById("promptContent").value.trim();
  c.minimumWords=Number(document.getElementById("minimumWords").value||150);
  c.updatedAt=new Date().toISOString();
}

function updateCurrent(){
  if(selectedIndex===null){toast("Select a set first");return;}
  syncCurrent();const c=allProblems[selectedIndex];
  if(!c.title||!c.scheduledDate||!c.taskTitle||!c.promptContent){toast("Title, date, task title, and prompt are required");return;}
  writeProblems(allProblems);toast("Writing set updated");renderSetList();
}

function duplicateAsNew(){
  if(selectedIndex===null){toast("Select a set first");return;}
  syncCurrent();const src=allProblems[selectedIndex];const copy=JSON.parse(JSON.stringify(src));copy.id=`problem_${Date.now()}`;copy.title=`${src.title||"Untitled"} (Copy)`;copy.createdAt=new Date().toISOString();copy.updatedAt=new Date().toISOString();allProblems.unshift(copy);writeProblems(allProblems);toast("Duplicated as new writing set");renderSetList();
}

function deleteCurrent(){
  if(selectedIndex===null){toast("Select a set first");return;}
  const c=allProblems[selectedIndex];if(!confirm(`Delete \"${c.title||"Untitled"}\"?`))return;
  allProblems.splice(selectedIndex,1);writeProblems(allProblems);selectedIndex=null;document.getElementById("editor").style.display="none";document.getElementById("emptyEditor").style.display="block";toast("Writing set deleted");renderSetList();
}

document.getElementById("updateTop").addEventListener("click",updateCurrent);
document.getElementById("updateBottom").addEventListener("click",updateCurrent);
document.getElementById("duplicateBtn").addEventListener("click",duplicateAsNew);
document.getElementById("deleteBtn").addEventListener("click",deleteCurrent);
allProblems=readProblems();renderSetList();
const params=new URLSearchParams(window.location.search);const idx=params.get("index");if(idx!==null&&!Number.isNaN(Number(idx))){const i=Number(idx);if(i>=0&&i<allProblems.length)selectSet(i);} 
</script>
</body>
</html>
