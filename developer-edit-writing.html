<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Writing Sets | IELTS Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f8f5;--surface:#fff;--text:#182621;--muted:#5a6d66;--teal:#114b3a;--teal2:#1f745e;--border:#d8e4de;--radius:14px;--shadow:0 14px 32px rgba(17,75,58,.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Poppins,sans-serif;color:var(--text);background:radial-gradient(circle at 5% 0%,rgba(76,163,255,.12),transparent 34%),radial-gradient(circle at 95% 5%,rgba(17,75,58,.12),transparent 30%),var(--bg)}
    h1,h2,h3{font-family:Sora,sans-serif;letter-spacing:-.01em}
    .wrap{max-width:1200px;margin:0 auto;padding:22px 16px 36px;display:grid;gap:14px}
    .topbar,.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:14px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(140deg,#fff,#edf8f2)}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:36px;height:36px;border:1px solid var(--border);border-radius:11px;padding:4px;object-fit:contain;background:#fff}.brand p{color:var(--muted);font-size:.85rem;margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:10px;padding:10px 13px;font-size:.84rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .2s ease}
    .btn:hover{transform:translateY(-2px)} .btn-main{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}.btn-alt{background:#fff;color:var(--teal);border:1px solid var(--border)}
    .shell{display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px;align-items:start}
    .set-list{display:grid;gap:8px;max-height:76vh;overflow:auto;padding-right:4px}
    .set-item{border:1px solid var(--border);border-radius:12px;background:#fff;padding:10px;cursor:pointer;transition:all .2s ease}.set-item:hover{transform:translateY(-1px)}.set-item.active{border-color:var(--teal);background:#eff8f3}
    .set-item h4{font-size:.9rem;color:var(--teal);margin-bottom:2px}.set-item p{color:var(--muted);font-size:.78rem}
    .empty{border:1px dashed var(--border);border-radius:12px;padding:16px;color:var(--muted);text-align:center;font-size:.86rem}
    .settings-box{border:1px solid #cfe1f7;border-radius:var(--radius);background:linear-gradient(180deg,#f4f9ff,#eef6ff);padding:12px}
    .settings-box h3{color:#1f4f95}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{margin-bottom:10px}.field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:Poppins,sans-serif;font-size:.9rem;background:#fff}
    .field textarea{min-height:120px;resize:vertical}
    .footer-actions{position:sticky;bottom:10px;margin-top:10px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .toast{position:fixed;right:12px;bottom:12px;background:#123e32;color:#fff;border-radius:10px;padding:10px 14px;font-size:.83rem;display:none;z-index:20}
    .rich-editor-toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:#f9fafb;border:1px solid var(--border);border-radius:14px;align-items:center;margin:0 0 10px;box-shadow:0 10px 24px rgba(15,23,42,.08);position:sticky;top:10px;z-index:6}
    .toolbar-group{display:flex;gap:4px;border-right:1px solid var(--border);padding-right:6px}
    .toolbar-group:last-child{border-right:none}
    .toolbar-btn{width:32px;height:32px;padding:0;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .toolbar-btn:hover{background:#f0f4f2;border-color:var(--teal2)}
    .toolbar-btn.active{background:var(--teal2);color:#fff;border-color:var(--teal2)}
    .toolbar-btn svg,.toolbar-color-btn svg{width:16px;height:16px;display:block}
    .align-icon{display:inline-block;width:14px;font-size:13px;line-height:1;font-weight:700}
    .align-left{text-align:left}.align-center{text-align:center}.align-right{text-align:right}.align-justify{letter-spacing:-1px}
    .toolbar-select{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;font-size:.84rem;background:#fff;cursor:pointer;min-width:112px}
    .toolbar-color-input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
    .toolbar-color-btn{width:36px;height:32px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
    .toolbar-color-btn:hover{background:#f0f4f2;border-color:var(--teal2)}
    .color-preview-text{font-size:22px;line-height:1;font-weight:700;color:#1f1f1f;border-bottom:3px solid #1f1f1f;padding:0 2px}
    .color-preview-fill{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.18);background:#ffff00}
    .toolbar-pop{position:relative}
    .toolbar-pop-btn{height:32px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-weight:600;font-size:.84rem}
    .toolbar-pop-btn:hover{background:#f0f4f2;border-color:var(--teal2)}
    .toolbar-pop-panel{position:absolute;top:38px;left:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 30px rgba(15,23,42,.12);padding:10px;min-width:220px;max-width:min(280px,calc(100vw - 32px));z-index:15;display:none}
    .toolbar-pop.open .toolbar-pop-panel{display:block}
    .color-palette-panel{min-width:220px;max-width:min(280px,calc(100vw - 32px));max-height:180px;overflow:auto}
    .color-swatch-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
    .color-swatch{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.12);cursor:pointer;transition:transform .15s ease}
    .color-swatch:hover{transform:scale(1.08)}
    .spacing-row{display:grid;grid-template-columns:110px 1fr 56px;gap:10px;align-items:center;margin:8px 0}
    .spacing-row label{font-size:.9rem;font-weight:700}
    .spacing-row input[type="range"]{width:100%;height:4px;cursor:pointer}
    .spacing-row input[type="number"]{width:56px;padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:.86rem}
    .rich-editor-content{min-height:80px;padding:12px;border:1px solid var(--border);border-radius:14px;background:#fff;font-family:Poppins,sans-serif;font-size:.9rem;line-height:1.5;outline:none;overflow-y:auto}
    .rich-editor-content:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(31,116,94,.1)}
    .spacing-control{display:flex;align-items:center;gap:8px;font-size:.85rem}
    .spacing-control input[type="range"]{width:80px;height:4px;cursor:pointer}
    .spacing-control input[type="number"]{width:45px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.8rem}
    @media (max-width:900px){.shell{grid-template-columns:1fr}.row2{grid-template-columns:1fr}.sticky-actions{grid-template-columns:1fr}.rich-editor-toolbar{flex-direction:column;align-items:flex-start}.toolbar-group{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:6px;margin-bottom:6px;width:100%}}
  </style>
</head>
<body>
<main class="wrap">
  <section class="topbar">
    <div class="brand"><img src="logo.png" alt="IELTS Check logo"><div><h1>Edit Writing Problem Sets</h1><p>Edit page only. User view is separate in writing test page.</p></div></div>
    <div class="actions">
      <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
      <a class="btn btn-alt" href="developer-create-writing.html">Create New Writing Set</a>
      <a class="btn btn-alt" href="writing-test.html?returnTo=developer-edit-writing.html" target="_blank">Open Real User View</a>
      <button class="btn btn-main" type="button" id="updateTop">Update Current Set</button>
    </div>
  </section>

  <section class="shell">
    <aside class="panel"><h3 style="margin-bottom:8px;">Writing Set List</h3><div id="setList" class="set-list"></div></aside>
    <section class="panel">
      <div id="emptyEditor" class="empty">Select one writing set from the left panel.</div>
      <div id="editor" style="display:none;">
        <div class="settings-box">
          <h3 style="margin-bottom:10px;">Writing Set Information</h3>
          <div class="row2"><div class="field"><label>Set Title</label><input type="text" id="setTitle"></div><div class="field"><label>Set Date</label><input type="date" id="setDate"></div></div>
          <div class="row2"><div class="field"><label>Difficulty</label><select id="difficultyLevel"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div><div class="field"><label>Level</label><select id="setLevel"><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select></div></div>
          <div class="field"><label>Task Title</label><input type="text" id="taskTitle"></div>
          <div class="field"><label>Task Description</label><div id="taskDescriptionEditor"></div><input type="hidden" id="taskDescription" value=""></div>
          <div class="field"><label>Prompt Content (HTML allowed)</label><div id="promptContentEditor"></div><input type="hidden" id="promptContent" value=""></div>
          <div class="field"><label>Minimum Words</label><input type="number" min="50" id="minimumWords"></div>
        </div>

        <div class="footer-actions">
          <button class="btn btn-main" type="button" id="updateBottom">Update Current Set</button>
          <button class="btn btn-alt" type="button" id="duplicateBtn">Duplicate as New</button>
          <button class="btn btn-alt" type="button" id="deleteBtn" style="border-color:#ffd1d1;color:#c44444;">Delete Current Set</button>
        </div>
      </div>
    </section>
  </section>
</main>
<div class="toast" id="toast"></div>

<script src="storage-sync.js"></script>
<script>
const STORAGE_KEY = "prephaven_problems_writing_v1";
let allProblems = [];
let selectedIndex = null;
function toast(m){const b=document.getElementById("toast");b.textContent=m;b.style.display="block";setTimeout(()=>b.style.display="none",2200);} 
function execCommand(cmd, value = null) { document.execCommand(cmd, false, value); }
function updateToolbarState(editor) { const toolbar = editor.previousElementSibling; if (!toolbar || !toolbar.classList.contains('rich-editor-toolbar')) return; const btnStates = { bold: document.queryCommandState('bold'), italic: document.queryCommandState('italic'), underline: document.queryCommandState('underline'), strikeThrough: document.queryCommandState('strikeThrough') }; ['bold', 'italic', 'underline', 'strikeThrough'].forEach(cmd => { const btn = toolbar.querySelector(`[data-cmd="${cmd}"]`); if (btn) btn.classList.toggle('active', btnStates[cmd]); }); }
const COLOR_SWATCHES = ["#000000","#4a4a4a","#6f6f6f","#9a9a9a","#b5b5b5","#d0d0d0","#e1e1e1","#f2f2f2","#ffffff","#c00000","#ff1a1a","#ff9f00","#f2e600","#00e600","#13d9d9","#4a86e8","#1f00ff","#9900ff","#ff00ff","#d9b2aa","#ddb7b9","#ead6b8","#efe0b5","#c8d9bf","#c6d7dd","#c4d6f0","#b9cde3","#c7c0de","#d7c1d0","#df8576","#e18f8f","#efc38c","#f2d68a","#abd18a","#9ec4ca","#97b8e8","#94bae3","#a79ed1","#c999ba","#cc4125","#d95f5f","#e9a24a","#efc64a","#6fb057","#45818e","#3c78d8","#3d85c6","#674ea7","#a64d79"];
const TOOLBAR_ICONS = { bold: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8.21 13c2.106 0 3.412-1.087 3.412-2.823 0-1.306-.984-2.283-2.324-2.386v-.055a2.176 2.176 0 0 0 1.852-2.14c0-1.51-1.162-2.46-3.014-2.46H3.843V13zM5.908 4.674h1.696c.963 0 1.517.451 1.517 1.244 0 .834-.629 1.32-1.73 1.32H5.908V4.673zm0 6.788V8.598h1.73c1.217 0 1.88.492 1.88 1.415 0 .943-.643 1.449-1.832 1.449H5.907z"/></svg>', italic: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M7.991 11.674 9.53 4.455c.123-.595.246-.71 1.347-.807l.11-.52H7.211l-.11.52c1.06.096 1.128.212 1.005.807L6.57 11.674c-.123.595-.246.71-1.346.806l-.11.52h3.774l.11-.52c-1.06-.095-1.129-.211-1.006-.806z"/></svg>', underline: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.313 3.136h-1.23V9.54c0 2.105 1.47 3.623 3.917 3.623s3.917-1.518 3.917-3.623V3.136h-1.23v6.323c0 1.49-.978 2.57-2.687 2.57s-2.687-1.08-2.687-2.57zM12.5 15h-9v-1h9z"/></svg>', highlight: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.096.644a2 2 0 0 1 2.791.036l1.433 1.433a2 2 0 0 1 .035 2.791l-.413.435-8.07 8.995a.5.5 0 0 1-.372.166h-3a.5.5 0 0 1-.234-.058l-.412.412A.5.5 0 0 1 2.5 15h-2a.5.5 0 0 1-.354-.854l1.412-1.412A.5.5 0 0 1 1.5 12.5v-3a.5.5 0 0 1 .166-.372l8.995-8.07zm-.115 1.47L2.727 9.52l3.753 3.753 7.406-8.254zm3.585 2.17.064-.068a1 1 0 0 0-.017-1.396L13.18 1.387a1 1 0 0 0-1.396-.018l-.068.065zM5.293 13.5 2.5 10.707v1.586L3.707 13.5z"/></svg>', alignLeft: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M2 12.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/></svg>', alignCenter: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4 12.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m2-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/></svg>', alignRight: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-4-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m4-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-4-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/></svg>', alignJustify: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M2 12.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/></svg>' };
function buildColorSwatches(editorId, target) { return COLOR_SWATCHES.map((color) => `<button type="button" class="color-swatch" data-color-target="${target}" data-color-value="${color}" style="background:${color}" title="${color}"></button>`).join(""); }
function createRichEditorMarkup(editorId, placeholder = "") { return `<div class="rich-editor-toolbar" id="${editorId}Toolbar"><div class="toolbar-group"><button type="button" class="toolbar-btn" data-cmd="bold" title="Bold">${TOOLBAR_ICONS.bold}</button><button type="button" class="toolbar-btn" data-cmd="italic" title="Italic">${TOOLBAR_ICONS.italic}</button><button type="button" class="toolbar-btn" data-cmd="underline" title="Underline">${TOOLBAR_ICONS.underline}</button><button type="button" class="toolbar-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button></div><div class="toolbar-group"><button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h1" title="Heading 1">H1</button><button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h2" title="Heading 2">H2</button><button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h3" title="Heading 3">H3</button><select class="toolbar-select" id="${editorId}FontSize" title="Font Size"><option value="">Size</option><option value="1">12px</option><option value="2">14px</option><option value="3">18px</option><option value="4">24px</option><option value="5">32px</option></select></div><div class="toolbar-group"><button type="button" class="toolbar-btn" data-cmd="justifyLeft" title="Align Left">${TOOLBAR_ICONS.alignLeft}</button><button type="button" class="toolbar-btn" data-cmd="justifyCenter" title="Align Center">${TOOLBAR_ICONS.alignCenter}</button><button type="button" class="toolbar-btn" data-cmd="justifyRight" title="Align Right">${TOOLBAR_ICONS.alignRight}</button><button type="button" class="toolbar-btn" data-cmd="justifyFull" title="Justify">${TOOLBAR_ICONS.alignJustify}</button></div><div class="toolbar-group toolbar-pop" id="${editorId}TextColorWrap"><button type="button" class="toolbar-color-btn" id="${editorId}TextColorBtn" title="Text Color"><span class="color-preview-text" id="${editorId}TextColorPreview">A</span></button><div class="toolbar-pop-panel color-palette-panel"> <div class="color-swatch-grid">${buildColorSwatches(editorId, "text")}</div></div><input type="color" class="toolbar-color-input" id="${editorId}TextColor" value="#000000"></div><div class="toolbar-group toolbar-pop" id="${editorId}BgColorWrap"><button type="button" class="toolbar-color-btn" id="${editorId}BgColorBtn" title="Highlight Color">${TOOLBAR_ICONS.highlight}<span class="color-preview-fill" id="${editorId}BgColorPreview"></span></button><div class="toolbar-pop-panel color-palette-panel"><div class="color-swatch-grid">${buildColorSwatches(editorId, "bg")}</div></div><input type="color" class="toolbar-color-input" id="${editorId}BgColor" value="#ffff00"></div><div class="toolbar-group toolbar-pop" id="${editorId}SpacingWrap"><button type="button" class="toolbar-pop-btn" id="${editorId}SpacingToggle">Spacing</button><div class="toolbar-pop-panel"><div class="spacing-row"><label>Letter</label><input type="range" id="${editorId}LetterSpace" min="-2" max="10" step="0.5" value="0"><input type="number" id="${editorId}LetterSpaceNum" min="-2" max="10" step="0.5" value="0"></div><div class="spacing-row"><label>Line</label><input type="range" id="${editorId}LineSpace" min="1" max="3" step="0.1" value="1.5"><input type="number" id="${editorId}LineSpaceNum" min="1" max="3" step="0.1" value="1.5"></div></div></div></div><div contenteditable="true" class="rich-editor-content" id="${editorId}Content" placeholder="${placeholder}"></div><input type="hidden" id="${editorId}" value="">`; }
function bindRichEditorToolbar(editorId) { const toolbar = document.getElementById(editorId + 'Toolbar'); const editor = document.getElementById(editorId + 'Content'); if (!toolbar || !editor) return; const spacingWrap = document.getElementById(editorId + 'SpacingWrap'); const textColorWrap = document.getElementById(editorId + 'TextColorWrap'); const bgColorWrap = document.getElementById(editorId + 'BgColorWrap'); const closePops = () => { spacingWrap?.classList.remove('open'); textColorWrap?.classList.remove('open'); bgColorWrap?.classList.remove('open'); }; toolbar.querySelectorAll('[data-cmd]').forEach(btn => { btn.addEventListener('click', (e) => { e.preventDefault(); const cmd = btn.dataset.cmd; const value = btn.dataset.value || null; execCommand(cmd, value); editor.focus(); updateToolbarState(editor); }); }); const fontSizeSelect = document.getElementById(editorId + 'FontSize'); fontSizeSelect?.addEventListener('change', (e) => { if (e.target.value) execCommand('fontSize', e.target.value); editor.focus(); e.target.value=''; }); const alignSelect = document.getElementById(editorId + 'Align'); alignSelect?.addEventListener('change', (e) => { if (e.target.value) execCommand(e.target.value); editor.focus(); e.target.value=''; }); const textColorInput = document.getElementById(editorId + 'TextColor'); const textColorBtn = document.getElementById(editorId + 'TextColorBtn'); const textColorPreview = document.getElementById(editorId + 'TextColorPreview'); textColorBtn?.addEventListener('click', (e) => { e.preventDefault(); textColorWrap?.classList.toggle('open'); bgColorWrap?.classList.remove('open'); spacingWrap?.classList.remove('open'); }); textColorInput?.addEventListener('change', (e) => { execCommand('foreColor', e.target.value); if (textColorPreview) textColorPreview.style.borderBottomColor = e.target.value; editor.focus(); }); const bgColorInput = document.getElementById(editorId + 'BgColor'); const bgColorBtn = document.getElementById(editorId + 'BgColorBtn'); const bgColorPreview = document.getElementById(editorId + 'BgColorPreview'); bgColorBtn?.addEventListener('click', (e) => { e.preventDefault(); bgColorWrap?.classList.toggle('open'); textColorWrap?.classList.remove('open'); spacingWrap?.classList.remove('open'); }); bgColorInput?.addEventListener('change', (e) => { execCommand('backColor', e.target.value); if (bgColorPreview) bgColorPreview.style.backgroundColor = e.target.value; editor.focus(); }); toolbar.querySelectorAll('.color-swatch').forEach((swatch) => { swatch.addEventListener('click', () => { const color = swatch.dataset.colorValue; const target = swatch.dataset.colorTarget; if (target === 'text') { execCommand('foreColor', color); if (textColorPreview) textColorPreview.style.borderBottomColor = color; } else { execCommand('backColor', color); if (bgColorPreview) bgColorPreview.style.backgroundColor = color; } editor.focus(); closePops(); }); }); const spacingToggle = document.getElementById(editorId + 'SpacingToggle'); spacingToggle?.addEventListener('click', (e) => { e.preventDefault(); spacingWrap?.classList.toggle('open'); textColorWrap?.classList.remove('open'); bgColorWrap?.classList.remove('open'); }); document.addEventListener('click', (e) => { if (toolbar && !toolbar.contains(e.target)) closePops(); }); const letterSpaceRange = document.getElementById(editorId + 'LetterSpace'); const letterSpaceNum = document.getElementById(editorId + 'LetterSpaceNum'); if (letterSpaceRange && letterSpaceNum) { const updateLetterSpace = (val) => { editor.style.letterSpacing = val + 'px'; letterSpaceRange.value = val; letterSpaceNum.value = val; }; letterSpaceRange.addEventListener('input', (e) => updateLetterSpace(e.target.value)); letterSpaceNum.addEventListener('input', (e) => updateLetterSpace(e.target.value)); } const lineSpaceRange = document.getElementById(editorId + 'LineSpace'); const lineSpaceNum = document.getElementById(editorId + 'LineSpaceNum'); if (lineSpaceRange && lineSpaceNum) { const updateLineSpace = (val) => { editor.style.lineHeight = val; lineSpaceRange.value = val; lineSpaceNum.value = val; }; lineSpaceRange.addEventListener('input', (e) => updateLineSpace(e.target.value)); lineSpaceNum.addEventListener('input', (e) => updateLineSpace(e.target.value)); } editor.addEventListener('blur', () => { const hiddenInput = document.getElementById(editorId); if (hiddenInput) hiddenInput.value = editor.innerHTML; }); editor.addEventListener('input', () => { const hiddenInput = document.getElementById(editorId); if (hiddenInput) hiddenInput.value = editor.innerHTML; }); }
function readProblems(){return [];}
async function writeProblems(v){await storageSync.saveProblemsByModule("writing",v).catch((err)=>{console.error("Error saving writing sets:",err);});}
function escapeHtml(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}

function renderSetList(){
  const host=document.getElementById("setList");
  if(allProblems.length===0){host.innerHTML='<div class="empty">No writing set yet.</div>';return;}
  host.innerHTML=allProblems.map((item,idx)=>`<article class="set-item ${selectedIndex===idx?"active":""}" onclick="selectSet(${idx})"><h4>${escapeHtml(item.icon||"✍️")} ${escapeHtml(item.title||"Untitled")}</h4><p>${escapeHtml(item.difficulty||"beginner")} • Level ${escapeHtml(item.level||1)}</p><p>Date: ${escapeHtml(item.scheduledDate||"-")}</p></article>`).join("");
}

function selectSet(index){
  const item=allProblems[index];if(!item)return;selectedIndex=index;
  document.getElementById("emptyEditor").style.display="none";document.getElementById("editor").style.display="block";
  document.getElementById("setTitle").value=item.title||"";
  document.getElementById("setDate").value=item.scheduledDate||new Date().toISOString().split("T")[0];
  document.getElementById("difficultyLevel").value=item.difficulty||"beginner";
  document.getElementById("setLevel").value=String(item.level||1);
  document.getElementById("taskTitle").value=item.taskTitle||"";
  
  // Load HTML content into rich editors
  const taskDescEditor = document.getElementById("taskDescriptionContent");
  if (taskDescEditor) taskDescEditor.innerHTML = item.taskDescription || "";
  const promptContentEditor = document.getElementById("promptContentContent");
  if (promptContentEditor) promptContentEditor.innerHTML = item.promptContent || "";
  
  // Also sync hidden inputs
  document.getElementById("taskDescription").value = item.taskDescription || "";
  document.getElementById("promptContent").value = item.promptContent || "";
  
  document.getElementById("minimumWords").value=String(item.minimumWords||150);
  renderSetList();
}

function syncCurrent(){
  const c=allProblems[selectedIndex];
  c.moduleId="writing";c.moduleName="Writing";c.icon="✍️";
  c.title=document.getElementById("setTitle").value.trim();
  c.scheduledDate=document.getElementById("setDate").value;
  c.difficulty=document.getElementById("difficultyLevel").value;
  c.level=Number(document.getElementById("setLevel").value||1);
  c.taskTitle=document.getElementById("taskTitle").value.trim();
  c.taskDescription=document.getElementById("taskDescription").value;
  c.promptContent=document.getElementById("promptContent").value;
  c.minimumWords=Number(document.getElementById("minimumWords").value||150);
  c.updatedAt=new Date().toISOString();
}

function updateCurrent(){
  if(selectedIndex===null){toast("Select a set first");return;}
  syncCurrent();const c=allProblems[selectedIndex];
  if(!c.title||!c.scheduledDate||!c.taskTitle||!c.promptContent){toast("Title, date, task title, and prompt are required");return;}
  writeProblems(allProblems);toast("Writing set updated");renderSetList();
}

function duplicateAsNew(){
  if(selectedIndex===null){toast("Select a set first");return;}
  syncCurrent();const src=allProblems[selectedIndex];const copy=JSON.parse(JSON.stringify(src));copy.id=`problem_${Date.now()}`;copy.title=`${src.title||"Untitled"} (Copy)`;copy.createdAt=new Date().toISOString();copy.updatedAt=new Date().toISOString();allProblems.unshift(copy);writeProblems(allProblems);toast("Duplicated as new writing set");renderSetList();
}

function deleteCurrent(){
  if(selectedIndex===null){toast("Select a set first");return;}
  const c=allProblems[selectedIndex];if(!confirm(`Delete \"${c.title||"Untitled"}\"?`))return;
  allProblems.splice(selectedIndex,1);writeProblems(allProblems);selectedIndex=null;document.getElementById("editor").style.display="none";document.getElementById("emptyEditor").style.display="block";toast("Writing set deleted");renderSetList();
}

// Initialize rich text editors on load
window.addEventListener('load', () => {
  const taskDescEditor = document.getElementById("taskDescriptionEditor");
  if (taskDescEditor) {
    taskDescEditor.innerHTML = createRichEditorMarkup("taskDescription", "Instruction shown above prompt");
    bindRichEditorToolbar("taskDescription");
  }
  const promptContentEditor = document.getElementById("promptContentEditor");
  if (promptContentEditor) {
    promptContentEditor.innerHTML = createRichEditorMarkup("promptContent", "Prompt body");
    bindRichEditorToolbar("promptContent");
  }
});

document.getElementById("updateTop").addEventListener("click",updateCurrent);
document.getElementById("updateBottom").addEventListener("click",updateCurrent);
document.getElementById("duplicateBtn").addEventListener("click",duplicateAsNew);
document.getElementById("deleteBtn").addEventListener("click",deleteCurrent);
(async()=>{allProblems=await storageSync.getProblemsByModule("writing");renderSetList();const params=new URLSearchParams(window.location.search);const idx=params.get("index");if(idx!==null&&!Number.isNaN(Number(idx))){const i=Number(idx);if(i>=0&&i<allProblems.length)selectSet(i);}})(); 
</script>
