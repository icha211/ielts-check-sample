<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Reading Sets | IELTS Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f8f5;
            --surface: #ffffff;
            --text: #182621;
            --muted: #5a6d66;
            --teal-900: #114b3a;
            --teal-700: #1f745e;
            --border: #d8e4de;
            --danger: #c44444;
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow: 0 14px 32px rgba(17, 75, 58, 0.09);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 5% 0%, rgba(76, 163, 255, 0.12), transparent 34%),
                radial-gradient(circle at 95% 5%, rgba(17, 75, 58, 0.12), transparent 30%),
                var(--bg);
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: "Sora", sans-serif; letter-spacing: -0.01em; }

        .wrap {
            max-width: 1260px;
            margin: 0 auto;
            padding: 22px 16px 36px;
            display: grid;
            gap: 14px;
        }

        .topbar {
            background: linear-gradient(140deg, #ffffff, #edf8f2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .brand { display: flex; align-items: center; gap: 10px; }

        .brand img {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 4px;
            object-fit: contain;
            background: #fff;
        }

        .brand p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

        .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 13px;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn-main { background: linear-gradient(135deg, var(--teal-900), var(--teal-700)); color: #fff; }
        .btn-alt { background: #fff; color: var(--teal-900); border: 1px solid var(--border); }

        .shell {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 14px;
        }

        .settings-box {
            border: 1px solid #cfe1f7;
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #f4f9ff, #eef6ff);
            padding: 12px;
            margin-bottom: 12px;
        }

        .settings-box h3 {
            color: #1f4f95;
        }

        .questions-box {
            border: 1px solid #d7e7da;
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #f8fff9, #f2fbf4);
            padding: 12px;
        }

        .questions-box h3 {
            color: var(--teal-900);
        }

        .set-list {
            display: grid;
            gap: 8px;
            max-height: 76vh;
            overflow: auto;
            padding-right: 4px;
        }

        .set-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .set-item:hover { transform: translateY(-1px); }
        .set-item.active { border-color: var(--teal-900); background: #eff8f3; }
        .set-item h4 { font-size: 0.9rem; color: var(--teal-900); margin-bottom: 2px; }
        .set-item p { color: var(--muted); font-size: 0.78rem; }

        .empty {
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--muted);
            text-align: center;
            font-size: 0.86rem;
        }

        .row2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .field { margin-bottom: 10px; }

        .field label {
            display: block;
            font-size: 0.84rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-family: "Poppins", sans-serif;
            font-size: 0.9rem;
            background: #fff;
        }

        .field textarea { min-height: 110px; resize: vertical; }

        .group-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #fff, #f8fcfa);
            padding: 12px;
            margin-bottom: 10px;
        }

        .group-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.72rem;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: 700;
            background: rgba(17, 75, 58, 0.1);
            color: var(--teal-900);
        }

        .question-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
            padding: 10px;
            margin-bottom: 10px;
        }

        .question-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .option-item {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
        }

        .option-item strong {
            font-size: 0.78rem;
            color: var(--muted);
            min-width: 18px;
        }

        .answer-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .answer-choice {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            background: #fff;
            user-select: none;
        }

        .answer-choice.active {
            border-color: var(--teal-900);
            background: rgba(17, 75, 58, 0.12);
            color: var(--teal-900);
            font-weight: 700;
        }

        .inline-btn {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 10px;
            padding: 7px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
        }

        .inline-btn.danger { color: var(--danger); border-color: #ffd1d1; background: #fff5f5; }

        .sticky-actions {
            position: sticky;
            bottom: 10px;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(9px);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .toast {
            position: fixed;
            right: 12px;
            bottom: 12px;
            background: #123e32;
            color: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.83rem;
            display: none;
            z-index: 20;
        }

        @media (max-width: 950px) {
            .shell { grid-template-columns: 1fr; }
            .row2 { grid-template-columns: 1fr; }
            .sticky-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="topbar">
            <div class="brand">
                <img src="logo.png" alt="IELTS Check logo">
                <div>
                    <h1>Edit Reading Problem Sets</h1>
                    <p>Edit page only. User view is separate in the real reading test page.</p>
                </div>
            </div>
            <div class="actions">
                <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
                <a class="btn btn-alt" href="developer-create.html">Create New Reading Set</a>
                <a class="btn btn-alt" href="reading-test.html?returnTo=developer-edit.html" target="_blank">Open Real User View</a>
                <button class="btn btn-main" type="button" id="updateTop">Update Current Set</button>
            </div>
        </section>

        <section class="shell">
            <aside class="panel">
                <h3 style="margin-bottom: 8px;">Reading Set List</h3>
                <div id="setList" class="set-list"></div>
            </aside>

            <section class="panel">
                <div id="emptyEditor" class="empty">Select one reading set from the left panel.</div>
                <div id="editor" style="display:none;">
                    <div class="settings-box">
                        <h3 style="margin-bottom: 10px;">Reading Set Information</h3>
                        <div class="row2">
                            <div class="field">
                                <label>Set Title</label>
                                <input type="text" id="setTitle">
                            </div>
                            <div class="field">
                                <label>Set Date</label>
                                <input type="date" id="setDate">
                            </div>
                        </div>

                        <div class="row2">
                            <div class="field">
                                <label>Difficulty</label>
                                <select id="difficultyLevel">
                                    <option value="beginner">Beginner</option>
                                    <option value="intermediate">Intermediate</option>
                                    <option value="advanced">Advanced</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Level</label>
                                <select id="setLevel">
                                    <option value="1">Level 1</option>
                                    <option value="2">Level 2</option>
                                    <option value="3">Level 3</option>
                                </select>
                            </div>
                        </div>

                        <div class="field">
                            <label>Passage Title</label>
                            <input type="text" id="passageTitle">
                        </div>

                        <div class="field">
                            <label>Passage Content</label>
                            <textarea id="passageContent"></textarea>
                        </div>
                    </div>

                    <div class="questions-box">
                        <h3 style="margin-bottom: 10px;">Question Groups</h3>
                        <div id="groupsContainer"></div>
                        <button type="button" class="inline-btn" id="addGroupBtn">+ Add Group</button>
                    </div>

                    <div class="sticky-actions">
                        <button class="btn btn-main" type="button" id="updateBottom">Update Current Set</button>
                        <button class="btn btn-alt" type="button" id="duplicateBtn">Duplicate as New</button>
                        <button class="btn btn-alt" type="button" id="deleteBtn" style="border-color:#ffd1d1;color: var(--danger);">Delete Current Set</button>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script src="storage-sync.js"></script>
    <script>
        const STORAGE_KEY = "prephaven_problems_v1";
        const QUESTION_TYPE_CONFIG = {
            "multiple-choice": { mode: "radio", options: ["A", "B", "C", "D"], locked: false, label: "Multiple Choice (A/B/C/...)" },
            "true-false-not-given": { mode: "radio", options: ["True", "False", "Not Given"], locked: true, label: "True / False / Not Given" },
            "yes-no-not-given": { mode: "radio", options: ["Yes", "No", "Not Given"], locked: true, label: "Yes / No / Not Given" },
            "short-answer": { mode: "text", options: [], locked: true, label: "Short Answer" },
            "fill-in-the-blank": { mode: "blank", options: [], locked: true, label: "Fill in the Blank" },
            "sentence-completion": { mode: "text", options: [], locked: true, label: "Sentence Completion" }
        };

        let allProblems = [];
        let selectedIndex = null;

        function toast(message) {
            const box = document.getElementById("toast");
            box.textContent = message;
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 2200);
        }

        function readProblems() {
            return [];
        }

        async function writeProblems(list) {
            await storageSync.saveProblemsByModule("reading", list).catch((err) => {
                console.error("Error saving reading sets:", err);
            });
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function escapeJs(value) {
            return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
        }

        function newQuestion(type) {
            const conf = QUESTION_TYPE_CONFIG[type];
            return {
                type,
                text: "",
                options: [...conf.options],
                answer: "",
                uiMode: conf.mode
            };
        }

        function newGroup(problem) {
            return {
                title: `Questions ${(problem.questionGroups || []).length + 1}`,
                instruction: "",
                questions: [newQuestion("multiple-choice")]
            };
        }

        function normalizeQuestion(raw) {
            const normalizedType = raw.type === "fill-in-the-blank"
                ? "fill-in-the-blank"
                : raw.type === "radio"
                    ? (raw.options && raw.options.includes("True") ? "true-false-not-given" : "multiple-choice")
                    : "short-answer";
            const conf = QUESTION_TYPE_CONFIG[normalizedType];
            const sourceOptions = typeof raw.options === "string" ? raw.options.split(",").map((o) => o.trim()).filter(Boolean) : conf.options;

            return {
                type: normalizedType,
                text: raw.text || "",
                options: sourceOptions.length ? sourceOptions : [...conf.options],
                answer: raw.answer || "",
                uiMode: conf.mode
            };
        }

        function renderSetList() {
            const host = document.getElementById("setList");
            const readingSets = allProblems
                .map((item, idx) => ({ item, idx }))
                .filter((entry) => entry.item.moduleId === "reading");

            if (readingSets.length === 0) {
                host.innerHTML = '<div class="empty">No reading set yet.</div>';
                return;
            }

            host.innerHTML = readingSets.map(({ item, idx }) => {
                const active = selectedIndex === idx ? "active" : "";
                return `
                    <article class="set-item ${active}" onclick="selectSet(${idx})">
                        <h4>${escapeHtml(item.icon || "📖")} ${escapeHtml(item.title || "Untitled")}</h4>
                        <p>${escapeHtml(item.difficulty || "beginner")} • Level ${escapeHtml(item.level || 1)}</p>
                        <p>Date: ${escapeHtml(item.scheduledDate || "-")}</p>
                    </article>
                `;
            }).join("");
        }

        function selectSet(index) {
            const item = allProblems[index];
            if (!item || item.moduleId !== "reading") return;
            selectedIndex = index;

            if (!Array.isArray(item.questionGroups) || item.questionGroups.length === 0) {
                item.questionGroups = [newGroup(item)];
            }

            item.questionGroups = item.questionGroups.map((group) => ({
                title: group.title || "Questions",
                instruction: group.instruction || "",
                questions: (group.questions || []).length ? group.questions.map(normalizeQuestion) : [newQuestion("multiple-choice")]
            }));

            document.getElementById("emptyEditor").style.display = "none";
            document.getElementById("editor").style.display = "block";
            document.getElementById("setTitle").value = item.title || "";
            document.getElementById("setDate").value = item.scheduledDate || new Date().toISOString().split("T")[0];
            document.getElementById("difficultyLevel").value = item.difficulty || "beginner";
            document.getElementById("setLevel").value = String(item.level || 1);
            document.getElementById("passageTitle").value = item.passageTitle || "";
            document.getElementById("passageContent").value = item.passageContent || "";

            renderSetList();
            renderGroups();
        }

        function renderGroups() {
            const host = document.getElementById("groupsContainer");
            const current = allProblems[selectedIndex];
            if (!current) return;

            host.innerHTML = "";

            current.questionGroups.forEach((group, gIdx) => {
                const groupEl = document.createElement("section");
                groupEl.className = "group-card";
                groupEl.innerHTML = `
                    <div class="group-head">
                        <span class="badge">Group ${gIdx + 1}</span>
                        <button type="button" class="inline-btn danger" onclick="removeGroup(${gIdx})">Delete Group</button>
                    </div>
                    <div class="field">
                        <label>Group Title</label>
                        <input type="text" value="${escapeHtml(group.title)}" onchange="updateGroup(${gIdx}, 'title', this.value)">
                    </div>
                    <div class="field">
                        <label>Instruction</label>
                        <textarea onchange="updateGroup(${gIdx}, 'instruction', this.value)">${escapeHtml(group.instruction || "")}</textarea>
                    </div>
                    <div id="questions_${gIdx}"></div>
                    <button type="button" class="inline-btn" onclick="addQuestion(${gIdx})">+ Add Question</button>
                `;
                host.appendChild(groupEl);

                renderQuestions(gIdx);
            });
        }

        function renderQuestions(gIdx) {
            const current = allProblems[selectedIndex];
            if (!current) return;
            const host = document.getElementById(`questions_${gIdx}`);
            const group = current.questionGroups[gIdx];
            if (!host || !group) return;

            host.innerHTML = "";

            group.questions.forEach((q, qIdx) => {
                const conf = QUESTION_TYPE_CONFIG[q.type];
                const card = document.createElement("article");
                card.className = "question-card";

                const typeOptions = Object.entries(QUESTION_TYPE_CONFIG)
                    .map(([key, value]) => `<option value="${key}" ${key === q.type ? "selected" : ""}>${value.label}</option>`)
                    .join("");

                let optionsSection = "";
                let answerSection = "";

                if (conf.mode === "radio") {
                    const items = q.options.map((opt, idx) => {
                        const disabled = conf.locked ? "readonly" : "";
                        const marker = conf.locked ? "" : String.fromCharCode(65 + idx);
                        return `
                            <div class="option-item">
                                <strong>${marker}</strong>
                                <input type="text" value="${escapeHtml(opt)}" ${disabled} onchange="updateOption(${gIdx}, ${qIdx}, ${idx}, this.value)">
                            </div>
                        `;
                    }).join("");

                    optionsSection = `
                        <div class="field">
                            <label>Options</label>
                            ${items}
                            ${conf.locked ? "" : `<button type="button" class="inline-btn" onclick="addOption(${gIdx}, ${qIdx})">+ Add Option</button>`}
                        </div>
                    `;

                    const answerChips = q.options.map((opt) => {
                        const active = q.answer === opt ? "active" : "";
                        return `<span class="answer-choice ${active}" onclick="pickAnswer(${gIdx}, ${qIdx}, '${escapeJs(opt)}')">${escapeHtml(opt)}</span>`;
                    }).join("");

                    answerSection = `<div class="field"><label>Correct Answer</label><div class="answer-options">${answerChips}</div></div>`;
                } else if (conf.mode === "blank") {
                    const textId = `question_text_${gIdx}_${qIdx}`;
                    answerSection = `
                        <div class="field">
                            <label>Correct Answer</label>
                            <input type="text" value="${escapeHtml(q.answer)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'answer', this.value)">
                            <div class="helper">Select a word in the question text and click Mark Selected Answer.</div>
                            <div class="inline-actions">
                                <button type="button" class="inline-btn" onclick="markSelectedBlank(${gIdx}, ${qIdx})">Mark Selected Answer</button>
                                <button type="button" class="inline-btn" onclick="clearBlankMark(${gIdx}, ${qIdx})">Clear Mark</button>
                            </div>
                        </div>
                    `;
                    card.innerHTML = `
                        <div class="question-head">
                            <span class="badge">Question ${qIdx + 1}</span>
                            <button type="button" class="inline-btn danger" onclick="removeQuestion(${gIdx}, ${qIdx})">Delete Question</button>
                        </div>
                        <div class="field">
                            <label>Question Type</label>
                            <select onchange="changeQuestionType(${gIdx}, ${qIdx}, this.value)">${typeOptions}</select>
                        </div>
                        <div class="field">
                            <label>Question Text</label>
                            <input id="${textId}" type="text" value="${escapeHtml(q.text)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'text', this.value)">
                        </div>
                        ${answerSection}
                    `;
                    host.appendChild(card);
                    return;
                } else {
                    answerSection = `
                        <div class="field">
                            <label>Correct Answer</label>
                            <input type="text" value="${escapeHtml(q.answer)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'answer', this.value)">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="question-head">
                        <span class="badge">Question ${qIdx + 1}</span>
                        <button type="button" class="inline-btn danger" onclick="removeQuestion(${gIdx}, ${qIdx})">Delete Question</button>
                    </div>
                    <div class="field">
                        <label>Question Type</label>
                        <select onchange="changeQuestionType(${gIdx}, ${qIdx}, this.value)">${typeOptions}</select>
                    </div>
                    <div class="field">
                        <label>Question Text</label>
                        <input type="text" value="${escapeHtml(q.text)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'text', this.value)">
                    </div>
                    ${optionsSection}
                    ${answerSection}
                `;
                host.appendChild(card);
            });
        }

        function updateGroup(gIdx, field, value) {
            allProblems[selectedIndex].questionGroups[gIdx][field] = value;
        }

        function updateQuestion(gIdx, qIdx, field, value) {
            allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx][field] = value;
        }

        function updateOption(gIdx, qIdx, oIdx, value) {
            const question = allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx];
            question.options[oIdx] = value;
            if (question.answer && !question.options.includes(question.answer)) {
                question.answer = "";
            }
            renderQuestions(gIdx);
        }

        function addOption(gIdx, qIdx) {
            const question = allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx];
            question.options.push(String.fromCharCode(65 + question.options.length));
            renderQuestions(gIdx);
        }

        function markSelectedBlank(gIdx, qIdx) {
            const input = document.getElementById(`question_text_${gIdx}_${qIdx}`);
            if (!input) return;

            const start = input.selectionStart;
            const end = input.selectionEnd;
            if (start === end) {
                toast("Highlight the answer word first");
                return;
            }

            const selected = input.value.slice(start, end).trim();
            if (!selected) {
                toast("Highlight a valid answer word");
                return;
            }

            const nextValue = `${input.value.slice(0, start)}[[${selected}]]${input.value.slice(end)}`;
            allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx].text = nextValue;
            allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx].answer = selected;
            renderQuestions(gIdx);
        }

        function clearBlankMark(gIdx, qIdx) {
            const question = allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx];
            question.text = String(question.text || "").replace(/\[\[(.+?)\]\]/g, "$1");
            question.answer = "";
            renderQuestions(gIdx);
        }

        function pickAnswer(gIdx, qIdx, value) {
            allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx].answer = value;
            renderQuestions(gIdx);
        }

        function changeQuestionType(gIdx, qIdx, nextType) {
            const conf = QUESTION_TYPE_CONFIG[nextType];
            const q = allProblems[selectedIndex].questionGroups[gIdx].questions[qIdx];
            q.type = nextType;
            q.uiMode = conf.mode;
            q.options = [...conf.options];
            q.answer = "";
            renderQuestions(gIdx);
        }

        function addGroup() {
            allProblems[selectedIndex].questionGroups.push(newGroup(allProblems[selectedIndex]));
            renderGroups();
        }

        function removeGroup(gIdx) {
            const groups = allProblems[selectedIndex].questionGroups;
            groups.splice(gIdx, 1);
            if (groups.length === 0) {
                groups.push(newGroup(allProblems[selectedIndex]));
            }
            renderGroups();
        }

        function addQuestion(gIdx) {
            allProblems[selectedIndex].questionGroups[gIdx].questions.push(newQuestion("multiple-choice"));
            renderQuestions(gIdx);
        }

        function removeQuestion(gIdx, qIdx) {
            const list = allProblems[selectedIndex].questionGroups[gIdx].questions;
            list.splice(qIdx, 1);
            if (list.length === 0) {
                list.push(newQuestion("multiple-choice"));
            }
            renderQuestions(gIdx);
        }

        function syncFormToCurrent() {
            const current = allProblems[selectedIndex];
            current.title = document.getElementById("setTitle").value.trim();
            current.scheduledDate = document.getElementById("setDate").value;
            current.difficulty = document.getElementById("difficultyLevel").value;
            current.level = Number(document.getElementById("setLevel").value || 1);
            current.passageTitle = document.getElementById("passageTitle").value.trim();
            current.passageContent = document.getElementById("passageContent").value.trim();
            current.moduleId = "reading";
            current.moduleName = "Reading";
            current.icon = "📖";
            current.updatedAt = new Date().toISOString();

            current.questionGroups = current.questionGroups.map((group) => ({
                title: group.title,
                instruction: group.instruction,
                questions: group.questions.map((q) => {
                    const conf = QUESTION_TYPE_CONFIG[q.type];
                    return {
                        type: conf.mode === "radio" ? "radio" : "text",
                        text: q.text,
                        options: conf.mode === "radio" ? q.options.join(", ") : "",
                        answer: q.answer
                    };
                })
            }));
        }

        function updateCurrentSet() {
            if (selectedIndex === null) {
                toast("Select a set first");
                return;
            }

            syncFormToCurrent();
            const current = allProblems[selectedIndex];

            if (!current.title || !current.scheduledDate || !current.passageContent) {
                toast("Title, date, and passage are required");
                return;
            }

            const allAnswered = current.questionGroups.every((group) =>
                group.questions.every((q) => q.text && q.answer)
            );
            if (!allAnswered) {
                toast("Every question must have text and correct answer");
                return;
            }

            writeProblems(allProblems);
            toast("Reading set updated");
            renderSetList();
            selectSet(selectedIndex);
        }

        function duplicateAsNew() {
            if (selectedIndex === null) {
                toast("Select a set first");
                return;
            }

            syncFormToCurrent();
            const source = allProblems[selectedIndex];
            const cloned = JSON.parse(JSON.stringify(source));
            cloned.id = `problem_${Date.now()}`;
            cloned.title = `${source.title || "Untitled"} (Copy)`;
            cloned.createdAt = new Date().toISOString();
            cloned.updatedAt = new Date().toISOString();
            allProblems.unshift(cloned);
            writeProblems(allProblems);
            toast("Duplicated as new reading set");
            renderSetList();
        }

        function deleteCurrentSet() {
            if (selectedIndex === null) {
                toast("Select a set first");
                return;
            }

            const current = allProblems[selectedIndex];
            if (!confirm(`Delete \"${current.title || "Untitled"}\"?`)) return;

            allProblems.splice(selectedIndex, 1);
            writeProblems(allProblems);
            selectedIndex = null;
            document.getElementById("editor").style.display = "none";
            document.getElementById("emptyEditor").style.display = "block";
            toast("Reading set deleted");
            renderSetList();
        }

        document.getElementById("updateTop").addEventListener("click", updateCurrentSet);
        document.getElementById("updateBottom").addEventListener("click", updateCurrentSet);
        document.getElementById("duplicateBtn").addEventListener("click", duplicateAsNew);
        document.getElementById("deleteBtn").addEventListener("click", deleteCurrentSet);
        document.getElementById("addGroupBtn").addEventListener("click", addGroup);

        (async () => {
            allProblems = await storageSync.getProblemsByModule("reading");
            renderSetList();

            const params = new URLSearchParams(window.location.search);
            const idx = params.get("index");
            if (idx !== null && !Number.isNaN(Number(idx))) {
                const parsed = Number(idx);
                if (parsed >= 0 && parsed < allProblems.length && allProblems[parsed].moduleId === "reading") {
                    selectSet(parsed);
                }
            }
        })();
    </script>
</body>
</html>
