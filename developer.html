<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Console | PrepHaven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #114B3A;
            --primary-dark: #0B3227;
            --secondary: #2E7D5A;
            --accent-gold: #E8B64A;
            --accent-sky: #4DA3FF;
            --bg: #F5F8F6;
            --surface: #FFFFFF;
            --text-main: #1D2A24;
            --text-muted: #5E6E66;
            --success: #22A06B;
            --warning: #F2A93B;
            --error: #D64545;
            --border: #D9E4DE;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-soft: 0 10px 28px rgba(17, 75, 58, 0.08);
            --space-1: 0.5rem;
            --space-2: 0.75rem;
            --space-3: 1rem;
            --space-4: 1.5rem;
            --space-5: 2rem;
            --space-6: 3rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        h1, h2, h3, h4, .dev-title {
            font-family: "Sora", sans-serif;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-5);
        }

        /* Header */
        .dev-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-5);
            background: var(--surface);
            padding: var(--space-4);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
        }

        .dev-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .dev-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: var(--space-1);
        }

        .nav-buttons {
            display: flex;
            gap: var(--space-3);
        }

        .btn {
            padding: var(--space-2) var(--space-4);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Poppins", sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        /* Tabs */
        .tab-container {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-5);
            border-bottom: 2px solid var(--border);
            background: var(--surface);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
        }

        .tab-btn {
            padding: var(--space-2) var(--space-4);
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Form */
        .form-section {
            background: var(--surface);
            padding: var(--space-5);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
            margin-bottom: var(--space-5);
        }

        .form-group {
            margin-bottom: var(--space-4);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--space-2);
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: var(--space-3);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: "Poppins", sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        @media (max-width: 900px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Options Input */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .option-input {
            display: flex;
            gap: var(--space-2);
            align-items: center;
        }

        .option-input input {
            flex: 1;
        }

        .option-input button {
            padding: var(--space-2) var(--space-3);
            background: var(--error);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
        }

        /* Problem List */
        .problems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-4);
        }

        .problem-card {
            background: var(--surface);
            padding: var(--space-4);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
            border-left: 4px solid var(--accent-sky);
        }

        .problem-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
        }

        .problem-card-title {
            font-weight: 700;
            color: var(--primary);
        }

        .problem-card-stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: var(--space-3);
        }

        .problem-card-actions {
            display: flex;
            gap: var(--space-2);
        }

        .problem-card-actions button {
            flex: 1;
            padding: var(--space-2);
            font-size: 0.85rem;
        }

        /* Messages */
        .alert {
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(34, 160, 107, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert-error {
            background: rgba(214, 69, 69, 0.1);
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--space-6);
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: var(--space-3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="dev-header">
            <div>
                <h1 class="dev-title"> Developer Console</h1>
                <p class="dev-subtitle">Manage IELTS problem sets</p>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="goToDashboard()"> Back to Dashboard</button>
                <button class="btn btn-primary" onclick="exportProblems()"> Export Data</button>
            </div>
        </div>

        <!-- Alert Messages -->
        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertError" class="alert alert-error"></div>

        <!-- Tabs -->
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('create')"> Create Problem Set</button>
            <button class="tab-btn" onclick="switchTab('manage')"> Manage Sets</button>
        </div>

        <!-- CREATE TAB -->
        <div id="create" class="tab-content active">
            <div class="form-section">
                <h2 style="margin-bottom: var(--space-4);">Create New Problem Set</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label>Module Name</label>
                        <select id="moduleName">
                            <option value="">Select a module...</option>
                            <option value="reading"> Reading</option>
                            <option value="writing"> Writing</option>
                            <option value="listening"> Listening</option>
                            <option value="speaking"> Speaking</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Difficulty Level</label>
                        <select id="difficultyLevel">
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Set Title</label>
                    <input type="text" id="setTitle" placeholder="e.g., Academic Reading: Business Trends">
                </div>

                <!-- Passage Section (for Reading/Listening) -->
                <div id="passageSection">
                    <div class="form-group">
                        <label>Passage/Text</label>
                        <textarea id="passageText" placeholder="Enter the main text/passage..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Passage Title (optional)</label>
                        <input type="text" id="passageTitle" placeholder="e.g., The Future of Work">
                    </div>
                </div>

                <!-- Questions Section -->
                <div id="questionsSection">
                    <h3 style="margin-bottom: var(--space-3);">Questions</h3>
                    <div id="questionsList"></div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: var(--space-3);" onclick="addQuestion()">+ Add Question</button>
                </div>

                <button class="btn btn-primary" style="width: 100%; margin-top: var(--space-5);" onclick="saveProblemSet()"> Save Problem Set</button>
            </div>
        </div>

        <!-- MANAGE TAB -->
        <div id="manage" class="tab-content">
            <div id="problemsList" class="problems-grid"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon"></div>
                <p>No problem sets yet. Create one to get started!</p>
            </div>
        </div>
    </div>

    <script>
        // ============ DATA MANAGEMENT ============
        const PROBLEMS_KEY = "prephaven_problems_v1";
        let allProblems = [];
        let questions = [];

        // ============ INITIALIZATION ============
        document.addEventListener("DOMContentLoaded", () => {
            loadProblems();
            initializeSampleProblems();
            renderProblemsList();
        });

        function loadProblems() {
            const stored = localStorage.getItem(PROBLEMS_KEY);
            if (stored) {
                allProblems = JSON.parse(stored);
                console.log(`Loaded ${allProblems.length} problem sets`);
            }
        }

        function initializeSampleProblems() {
            // Only add samples if empty
            if (allProblems.length > 0) return;
            
            const sampleProblems = [
                {
                    moduleId: "reading",
                    icon: "",
                    moduleName: "Reading",
                    title: "Academic Reading: Technology & Society",
                    difficulty: "intermediate",
                    passage: {
                        title: "The Impact of Artificial Intelligence",
                        text: "The rapid advancement of artificial intelligence has transformed multiple sectors of society. From healthcare diagnostics to autonomous vehicles, AI systems now perform tasks that were once considered exclusively human domains. However, this technological revolution brings both opportunities and challenges. While AI can process vast amounts of data and identify patterns beyond human capability, concerns about job displacement and ethical implications remain. Organizations worldwide are investing heavily in AI research, recognizing both its potential and the need for responsible development frameworks."
                    },
                    questions: [
                        {
                            id: "q1",
                            text: "According to the passage, which sectors have been transformed by AI?",
                            type: "mcq",
                            options: ["Only healthcare", "Healthcare and autonomous vehicles", "Only technology", "Finance and banking"],
                            correctAnswer: "Healthcare and autonomous vehicles"
                        },
                        {
                            id: "q2",
                            text: "What concern is mentioned about AI development?",
                            type: "mcq",
                            options: ["Cost of implementation", "Job displacement and ethical implications", "Lack of research", "Poor accuracy"],
                            correctAnswer: "Job displacement and ethical implications"
                        },
                        {
                            id: "q3",
                            text: "Complete the sentence: Organizations are investing in AI because they recognize ________.",
                            type: "fill-in",
                            options: ["its potential and need for responsible development"],
                            correctAnswer: "its potential and need for responsible development"
                        }
                    ],
                    createdAt: new Date().toISOString(),
                    id: `problem_sample_reading_${Date.now()}`
                }
            ];
            
            allProblems = sampleProblems;
            localStorage.setItem(PROBLEMS_KEY, JSON.stringify(allProblems));
            console.log("Sample problems initialized");
        }

        // ============ TAB SWITCHING ============
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll(".tab-content").forEach((tab) => {
                tab.classList.remove("active");
            });

            // Remove active from all buttons
            document.querySelectorAll(".tab-btn").forEach((btn) => {
                btn.classList.remove("active");
            });

            // Show selected tab
            document.getElementById(tabName).classList.add("active");
            event.target.classList.add("active");

            if (tabName === "manage") {
                renderProblemsList();
            }
        }

        // ============ QUESTION MANAGEMENT ============
        function addQuestion() {
            const qIndex = questions.length;
            const questionObj = {
                id: `q_${Date.now()}_${qIndex}`,
                text: "",
                type: "mcq",
                options: ["", ""],
                correctAnswer: ""
            };
            questions.push(questionObj);
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById("questionsList");
            container.innerHTML = "";

            questions.forEach((q, idx) => {
                const questionDiv = document.createElement("div");
                questionDiv.style.cssText =
                    "background: var(--bg); padding: var(--space-3); border-radius: var(--radius-md); margin-bottom: var(--space-3); border-left: 4px solid var(--accent-gold);";

                let questionHTML = `
                    <div class="form-group">
                        <label>Question ${idx + 1}</label>
                        <input type="text" value="${q.text}" placeholder="Question text"
                            onchange="updateQuestion(${idx}, 'text', this.value)">
                    </div>

                    <div class="form-group">
                        <label>Question Type</label>
                        <select onchange="updateQuestion(${idx}, 'type', this.value)">
                            <option value="mcq" ${q.type === "mcq" ? "selected" : ""}>Multiple Choice</option>
                            <option value="fill-in" ${q.type === "fill-in" ? "selected" : ""}>Fill in the Blank</option>
                            <option value="matching" ${q.type === "matching" ? "selected" : ""}>Matching</option>
                        </select>
                    </div>
                `;

                if (q.type === "mcq" || q.type === "matching") {
                    questionHTML += `<div class="form-group"><label>Options</label><div class="options-list" id="options_${idx}"></div></div>`;
                    questionDiv.innerHTML += questionHTML;
                    questionDiv.appendChild(this.createOptionsEditor(idx, q));
                    questionHTML = "";
                } else {
                    questionDiv.innerHTML += questionHTML;
                }

                questionHTML += `
                    <div class="form-group">
                        <label>Correct Answer</label>
                        <input type="text" value="${q.correctAnswer}" placeholder="Correct answer"
                            onchange="updateQuestion(${idx}, 'correctAnswer', this.value)">
                    </div>

                    <button class="btn btn-danger" style="width: 100%;" onclick="removeQuestion(${idx})"> Remove Question</button>
                `;
                questionDiv.innerHTML += questionHTML;
                container.appendChild(questionDiv);
            });
        }

        function createOptionsEditor(qIdx, q) {
            const container = document.createElement("div");
            container.className = "options-list";

            if (Array.isArray(q.options)) {
                q.options.forEach((opt, oIdx) => {
                    const optDiv = document.createElement("div");
                    optDiv.className = "option-input";
                    optDiv.innerHTML = `
                        <input type="text" value="${opt}" placeholder="Option ${oIdx + 1}"
                            onchange="updateOption(${qIdx}, ${oIdx}, this.value)">
                        <button onclick="removeOption(${qIdx}, ${oIdx})"></button>
                    `;
                    container.appendChild(optDiv);
                });
            }

            const addBtn = document.createElement("button");
            addBtn.textContent = "+ Add Option";
            addBtn.className = "btn btn-secondary";
            addBtn.style.cssText = "width: 100%; margin-top: var(--space-2);";
            addBtn.onclick = () => addOption(qIdx);
            container.appendChild(addBtn);

            return container;
        }

        function addOption(qIdx) {
            if (!questions[qIdx].options) questions[qIdx].options = [];
            questions[qIdx].options.push("");
            renderQuestions();
        }

        function updateOption(qIdx, oIdx, value) {
            questions[qIdx].options[oIdx] = value;
        }

        function removeOption(qIdx, oIdx) {
            questions[qIdx].options.splice(oIdx, 1);
            renderQuestions();
        }

        function updateQuestion(qIdx, field, value) {
            questions[qIdx][field] = value;
        }

        function removeQuestion(idx) {
            questions.splice(idx, 1);
            renderQuestions();
        }

        // ============ SAVE PROBLEM SET ============
        function saveProblemSet() {
            const moduleName = document.getElementById("moduleName").value;
            const setTitle = document.getElementById("setTitle").value;
            const passageText = document.getElementById("passageText").value;
            const passageTitle = document.getElementById("passageTitle").value;
            const difficulty = document.getElementById("difficultyLevel").value;

            if (!moduleName || !setTitle || questions.length === 0) {
                showAlert("error", "Please fill in all required fields and add at least one question.");
                return;
            }

            if ((moduleName === "reading" || moduleName === "listening") && !passageText) {
                showAlert("error", "Reading and Listening modules require a passage.");
                return;
            }

            const moduleMap = {
                reading: { icon: "", moduleName: "Reading" },
                writing: { icon: "", moduleName: "Writing" },
                listening: { icon: "", moduleName: "Listening" },
                speaking: { icon: "", moduleName: "Speaking" }
            };

            const problemSet = {
                moduleId: moduleName,
                icon: moduleMap[moduleName].icon,
                moduleName: moduleMap[moduleName].moduleName,
                title: setTitle,
                difficulty: difficulty,
                passage: passageText
                    ? {
                          text: passageText,
                          title: passageTitle || moduleMap[moduleName].moduleName
                      }
                    : null,
                questions: questions,
                createdAt: new Date().toISOString(),
                id: `problem_${Date.now()}`
            };

            allProblems.push(problemSet);
            localStorage.setItem(PROBLEMS_KEY, JSON.stringify(allProblems));

            showAlert("success", `Problem set "${setTitle}" saved successfully!`);
            resetForm();
            renderProblemsList();
        }

        function resetForm() {
            document.getElementById("moduleName").value = "";
            document.getElementById("setTitle").value = "";
            document.getElementById("passageText").value = "";
            document.getElementById("passageTitle").value = "";
            document.getElementById("difficultyLevel").value = "beginner";
            questions = [];
            renderQuestions();
        }

        // ============ MANAGE PROBLEMS ============
        function renderProblemsList() {
            const container = document.getElementById("problemsList");
            const emptyState = document.getElementById("emptyState");

            if (allProblems.length === 0) {
                container.innerHTML = "";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            container.innerHTML = "";

            allProblems.forEach((problem, idx) => {
                const card = document.createElement("div");
                card.className = "problem-card";
                card.innerHTML = `
                    <div class="problem-card-header">
                        <div class="problem-card-title">${problem.icon} ${problem.title}</div>
                    </div>
                    <div class="problem-card-stats">
                        <div> Module: ${problem.moduleName}</div>
                        <div> Questions: ${problem.questions.length}</div>
                        <div> Difficulty: ${problem.difficulty}</div>
                        <div style="font-size: 0.8rem; margin-top: var(--space-2); color: var(--text-muted);">
                            Created: ${new Date(problem.createdAt).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="problem-card-actions">
                        <button class="btn btn-secondary" onclick="editProblem(${idx})"> Edit</button>
                        <button class="btn btn-danger" onclick="deleteProblem(${idx})"> Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function deleteProblem(idx) {
            if (confirm("Are you sure you want to delete this problem set?")) {
                allProblems.splice(idx, 1);
                localStorage.setItem(PROBLEMS_KEY, JSON.stringify(allProblems));
                showAlert("success", "Problem set deleted!");
                renderProblemsList();
            }
        }

        function editProblem(idx) {
            const problem = allProblems[idx];
            document.getElementById("moduleName").value = problem.moduleId;
            document.getElementById("setTitle").value = problem.title;
            document.getElementById("passageText").value = problem.passage?.text || "";
            document.getElementById("passageTitle").value = problem.passage?.title || "";
            document.getElementById("difficultyLevel").value = problem.difficulty;

            questions = JSON.parse(JSON.stringify(problem.questions));
            renderQuestions();

            // Remove the old one for re-save
            allProblems.splice(idx, 1);
            localStorage.setItem(PROBLEMS_KEY, JSON.stringify(allProblems));

            // Switch to create tab
            document.getElementById("create").classList.add("active");
            document.getElementById("manage").classList.remove("active");
            document.querySelectorAll(".tab-btn")[0].classList.add("active");
            document.querySelectorAll(".tab-btn")[1].classList.remove("active");

            showAlert("success", "Problem set loaded for editing!");
        }

        // ============ UTILITIES ============
        function showAlert(type, message) {
            const alertDiv =
                type === "success" ? document.getElementById("alertSuccess") : document.getElementById("alertError");
            alertDiv.textContent = message;
            alertDiv.classList.add("show");
            setTimeout(() => alertDiv.classList.remove("show"), 4000);
        }

        function exportProblems() {
            const dataStr = JSON.stringify(allProblems, null, 2);
            const dataBlob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `ielts_problems_${new Date().toISOString().split("T")[0]}.json`;
            link.click();
            showAlert("success", "Problems exported successfully!");
        }

        function goToDashboard() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
