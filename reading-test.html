        </style>
        <script>
        // --- Tracker Popup Logic ---
        let trackerPopupPartIndex = null;

        function renderHeaderTracker(passages) {
            const tracker = document.getElementById('headerTracker');
            if (!tracker) return;
            const parts = buildPartTrackerData(passages);
            let html = '';
            parts.forEach((part, idx) => {
                const entries = part.entries || [];
                const total = entries.length;
                const answeredCount = entries.filter((entry) => String(answerState[entry.name] || '').trim().length > 0).length;
                const isActive = idx === currentPartIndex;
                const isPopupOpen = trackerPopupPartIndex === idx;
                html += `<div class="tracker-part-box${isActive ? ' active' : ''}" onclick="onTrackerPartClick(event, ${idx})">`;
                html += `<div class="tracker-part-label">${idx + 1}</div>`;
                html += `<div class="tracker-part-progress">${answeredCount} / ${total}</div>`;
                if (isPopupOpen) {
                    // Centered popup for question numbers
                    html += `<div class="tracker-popup">`;
                    html += renderTrackerQuestionChips(entries, idx);
                    html += `</div>`;
                }
                html += `</div>`;
            });
            tracker.innerHTML = html;
        }

        function renderTrackerQuestionChips(entries, partIdx) {
            // Center the chips, expand left/right as number increases
            // If odd, center; if even, balance left/right
            let html = '<div class="tracker-question-row">';
            entries.forEach((entry, i) => {
                const answered = String(answerState[entry.name] || '').trim().length > 0;
                html += `<button type="button" class="tracker-question-chip${answered ? ' answered' : ''}${currentPartIndex === partIdx ? '' : ''}" onclick="event.stopPropagation(); jumpToPartQuestion(${partIdx}, '${entry.name}')">${escapeHtml(entry.label)}</button>`;
            });
            html += '</div>';
            return html;
        }

        function onTrackerPartClick(event, partIndex) {
            event.stopPropagation();
            const isSamePart = currentPartIndex === partIndex;
            const isOpen = trackerPopupPartIndex === partIndex;

            if (isSamePart && isOpen) {
                trackerPopupPartIndex = null;
                renderPartStrip(getProblemPassages());
                return;
            }

            setActivePart(partIndex, null, true);
        }
        </script>
    </div>

    <script src="storage-sync.js"></script>
    <script>
        const STORAGE_KEY = "prephaven_problems_v1";
        const TEST_RESULTS_KEY = "prephaven_test_results_v1";
        const DAILY_TEST_KEY = "prephaven_daily_tests_v1";
        const ACTIVE_READING_SET_ID_KEY = "ielts_check_active_reading_set_id";
        const params = new URLSearchParams(window.location.search);
        const PACKAGE_MODE = params.get("package") === "1";
        const RETURN_TO = params.get("returnTo");
        const DAY_VALUE = params.get("day");
        const NEXT_URL = PACKAGE_MODE ? "writing-test.html?package=1" : (RETURN_TO || "index.html");
        const AI_REVIEW_ENDPOINT = "http://127.0.0.1:8787/api/ai-review";

        // Default problem set
        const defaultProblemSet = {
            moduleId: "reading",
            icon: "",
            moduleName: "Reading",
            title: "Reading Test",
            passages: [
                {
                    title: "The History of the Bicycle",
                    content: `A The bicycle is a common mode of transportation today, but its invention was not the result of a single "Eureka!" moment. Instead, it evolved over decades, with various inventors contributing to its development. The earliest precursor to the modern bicycle was the "dandy horse," invented by German Baron Karl von Drais in 1817. It had two wheels and a wooden frame, but no pedals; the rider pushed along the ground with their feet.

B It wasn't until the 1860s that pedals were added to the front wheel by French inventors Pierre Michaux and Pierre Lallement. This invention, known as the velocipede, was largely constructed of wood and iron, earning it the nickname "boneshaker" due to the incredibly uncomfortable ride it provided on cobblestone roads.

C In the 1870s, the "Penny Farthing" emerged. This bicycle featured a massive front wheel and a tiny rear wheel, designed to allow the rider to travel faster with each pedal stroke. While faster, it was notoriously dangerous; the rider sat very high up, and any sudden stop would send them flying over the handlebars.

D The true breakthrough came in 1885 with John Kemp Starley's "Rover safety bicycle." It featured two wheels of equal size and a chain drive to the rear wheel. Combined with John Boyd Dunlop's invention of the pneumatic (air-filled) rubber tire in 1888, the bicycle finally became a safe, comfortable, and highly popular mode of transport.`,
                    questionGroups: [
                        {
                            title: "Questions 1-2",
                            instruction: "Do the following statements agree with the information given in the Reading Passage? Choose True, False, or Not Given.",
                            questions: [
                                { type: "radio", text: "1. Karl von Drais's invention was propelled by pedals.", options: "True, False, Not Given", answer: "False" },
                                { type: "radio", text: "2. The velocipede was comfortable to ride on cobblestone streets.", options: "True, False, Not Given", answer: "False" }
                            ]
                        },
                        {
                            title: "Question 3",
                            instruction: "Choose the correct letter, A, B, C or D.",
                            questions: [
                                { type: "radio", text: "3. What made the Rover safety bicycle different from the Penny Farthing?", options: "A, B, C, D", answer: "A" }
                            ]
                        },
                        {
                            title: "Questions 4-5",
                            instruction: "Complete the sentences below. Choose NO MORE THAN TWO WORDS from the passage for each answer.",
                            questions: [
                                { type: "text", text: "4. The velocipede earned the nickname ________ due to its uncomfortable ride.", options: "", answer: "boneshaker" },
                                { type: "text", text: "5. The pneumatic rubber tire was invented by ________ in 1888.", options: "", answer: "John Boyd Dunlop" }
                            ]
                        }
                    ]
                }
            ]
        };

        let currentProblem = null;
        let currentPartIndex = 0;
        const answerState = {};
        let pendingFocusInputName = null;
        let isTypeTrackerCollapsed = true;

        function syncPanelViewportLayout() {
            const overview = document.getElementById('readingOverview');
            if (!overview) return;
            const measuredHeight = Math.ceil(overview.getBoundingClientRect().height);
            if (measuredHeight > 0) {
                document.documentElement.style.setProperty('--overview-height', `${measuredHeight}px`);
            }
        }

        function formatReadingDate(dateValue) {
            const raw = String(dateValue || "").trim();
            if (!raw) return "No date";
            const parsed = new Date(raw);
            if (Number.isNaN(parsed.getTime())) return raw;
            return parsed.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
        }

        function getQuestionTypeLabel(question) {
            const q = question || {};
            const type = String(q.type || "").toLowerCase();
            if (type === "matching-headings") return "Matching Heading";
            if (type === "fill-in-the-blank") return "Fill in the Blank";
            if (type === "short-answer") return "Isian Singkat (Short Answer)";
            if (type === "text") {
                const hasDefs = extractNumberedBlankDefs(q.text || "").length > 0;
                return hasDefs ? "Isian Singkat (Short Answer)" : "Short Answer";
            }

            const optionsText = String(q.options || "").toLowerCase();
            if (optionsText.includes("true") && optionsText.includes("false") && optionsText.includes("not given")) return "True/False/Not Given";
            if (optionsText.includes("yes") && optionsText.includes("no") && optionsText.includes("not given")) return "Yes/No/Not Given";
            return "Multiple Choice";
        }

        function collectQuestionLabelsForQuestion(question, fallbackCounter) {
            if (question?.type === 'matching-headings') {
                const matching = normalizeMatchingHeadings(question);
                return matching.rows.map((row) => String(row.number || "")).filter(Boolean);
            }
            const numberedDefs = extractNumberedBlankDefs(question?.text || "");
            if ((question?.type === 'text' || question?.type === 'fill-in-the-blank' || question?.type === 'short-answer') && numberedDefs.length > 0) {
                return numberedDefs.map((def) => String(def.number));
            }
            return [extractQuestionDisplayNumber(question, fallbackCounter)];
        }

        function buildQuestionTypeMeta(groups) {
            const result = [];
            let fallbackCounter = 1;
            groups.forEach((group, gIdx) => {
                const labels = [];
                (group.questions || []).forEach((q) => {
                    const qLabels = collectQuestionLabelsForQuestion(q, fallbackCounter);
                    labels.push(...qLabels);
                    const numberedDefs = extractNumberedBlankDefs(q?.text || "");
                    if (!((q?.type === 'text' || q?.type === 'fill-in-the-blank') && numberedDefs.length > 0) && q?.type !== 'matching-headings') {
                        fallbackCounter++;
                    }
                });

                const firstLabel = labels[0] || String(fallbackCounter);
                const lastLabel = labels[labels.length - 1] || firstLabel;
                const typeLabel = getQuestionTypeLabel((group.questions || [])[0] || {});

                result.push({
                    groupIndex: gIdx,
                    typeLabel,
                    startLabel: firstLabel,
                    endLabel: lastLabel
                });
            });
            return result;
        }

        function goToPrevPassage() {
            if (currentPartIndex <= 0) {
                goBackToDeveloper();
                return;
            }
            setActivePart(currentPartIndex - 1);
        }

        function goToNextPassage() {
            const passages = getProblemPassages();
            if (currentPartIndex >= passages.length - 1) {
                submitTest();
                return;
            }
            setActivePart(currentPartIndex + 1);
        }

        function scrollToGroup(groupIndex) {
            const target = document.getElementById(`group_${currentPartIndex}_${groupIndex}`);
            const container = document.getElementById('rightPanel');
            if (!target || !container) return;
            container.scrollTo({ top: target.offsetTop - 50, behavior: 'smooth' });
        }

        function renderReadingOverview(passages, typeMeta) {
            const dateEl = document.getElementById('overviewDate');
            if (dateEl) {
                dateEl.textContent = formatReadingDate(currentProblem?.scheduledDate || currentProblem?.date || currentProblem?.scheduled_at);
            }

            const parts = buildPartTrackerData(passages);
            const strip = document.getElementById('passageProgressStrip');
            if (strip) {
                strip.innerHTML = parts.map((part, idx) => {
                    const entries = part.entries || [];
                    const total = entries.length;
                    const answeredCount = entries.filter((entry) => String(answerState[entry.name] || '').trim().length > 0).length;
                    const percentage = total > 0 ? Math.round((answeredCount / total) * 100) : 0;
                    return `
                        <article class="passage-progress-card ${idx === currentPartIndex ? 'active' : ''}" onclick="setActivePart(${idx})">
                            <div class="passage-progress-ring" style="--pct:${percentage}%">
                                <span class="passage-progress-value">${answeredCount}/${total}</span>
                            </div>
                            <div class="passage-progress-meta">
                                <div class="passage-progress-name">PASSAGE ${idx + 1}</div>
                                <div class="passage-progress-count">${total} questions</div>
                            </div>
                        </article>
                    `;
                }).join('');
            }

            const typeStrip = document.getElementById('questionTypeStrip');
            if (typeStrip) {
                typeStrip.innerHTML = (typeMeta || []).map((meta, idx) => `
                    <button type="button" class="question-type-chip ${idx === 0 ? 'active' : ''}" onclick="scrollToGroup(${meta.groupIndex})">
                        ${escapeHtml(meta.typeLabel)} · Question ${escapeHtml(meta.startLabel)}-${escapeHtml(meta.endLabel)}
                    </button>
                `).join('');
            }

            const bottom = document.getElementById('overviewBottom');
            const toggleBtn = document.getElementById('toggleTypeTrackerBtn');
            if (bottom && toggleBtn) {
                bottom.style.display = isTypeTrackerCollapsed ? 'none' : '';
                const iconEl = document.getElementById('trackerToggleIcon');
                if (iconEl) iconEl.src = isTypeTrackerCollapsed ? 'asset/icon/expand-hide-tracker.png' : 'asset/icon/closed-hide-tracker.png';
                requestAnimationFrame(syncPanelViewportLayout);
            }

            const prevBtn = document.getElementById('prevPassageBtn');
            const nextBtn = document.getElementById('nextPassageBtn');
            if (prevBtn) {
                prevBtn.textContent = currentPartIndex === 0 ? '← Home' : `← Passage ${currentPartIndex}`;
            }
            if (nextBtn) {
                const isLast = currentPartIndex >= passages.length - 1;
                nextBtn.textContent = isLast ? 'Submit →' : `Passage ${currentPartIndex + 2} →`;
                nextBtn.classList.toggle('primary', isLast);
            }
        }

        function extractQuestionDisplayNumber(question, fallback) {
            const rawText = String(question?.text || question?.textHtml || "");
            const plainText = rawText.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
            const match = plainText.match(/(?:^|\s)(\d+)\s*[.)]/);
            return match ? String(match[1]) : String(fallback);
        }

        function getProblemPassages() {
            if (!currentProblem) return [];
            if (Array.isArray(currentProblem.passages) && currentProblem.passages.length > 0) {
                return currentProblem.passages;
            }
            return [{
                title: currentProblem.passageTitle || "Passage",
                content: currentProblem.passageContent || "",
                questionGroups: currentProblem.questionGroups || []
            }];
        }

        function getPassageQuestionGroups(passage, fallbackGroups) {
            if (Array.isArray(passage?.questionGroups) && passage.questionGroups.length > 0) {
                return passage.questionGroups;
            }
            return Array.isArray(fallbackGroups) ? fallbackGroups : [];
        }

        function snapshotCurrentAnswers() {
            const inputs = document.querySelectorAll('#dynamic-questions-container input, #dynamic-questions-container select');
            inputs.forEach((input) => {
                if (input.tagName === 'SELECT') {
                    answerState[input.name] = input.value || "";
                    return;
                }
                if (input.type === 'radio') {
                    if (input.checked) answerState[input.name] = input.value;
                    else if (!(input.name in answerState)) answerState[input.name] = "";
                    return;
                }
                answerState[input.name] = input.value || "";
            });
        }

        function hydrateInputsFromState() {
            const inputs = document.querySelectorAll('#dynamic-questions-container input, #dynamic-questions-container select');
            inputs.forEach((input) => {
                if (!(input.name in answerState)) return;
                if (input.tagName === 'SELECT') {
                    input.value = String(answerState[input.name] || "");
                    return;
                }
                if (input.type === 'radio') {
                    input.checked = String(answerState[input.name] || "") === String(input.value || "");
                    return;
                }
                input.value = String(answerState[input.name] || "");
            });
        }

        function countQuestionsInGroup(group) {
            const questions = Array.isArray(group?.questions) ? group.questions : [];
            return questions.reduce((sum, q) => {
                if (q?.type === 'matching-headings') {
                    const rows = Array.isArray(q.matchingHeadingsRows) ? q.matchingHeadingsRows : [];
                    return sum + Math.max(1, rows.length);
                }
                const numberedDefs = extractNumberedBlankDefs(q?.text || "");
                return sum + (numberedDefs.length > 0 ? numberedDefs.length : 1);
            }, 0);
        }

        function parseMatchingHeadingsAnswerMap(raw) {
            const text = String(raw || "").trim();
            if (!text) return {};
            try {
                const parsed = JSON.parse(text);
                if (parsed && typeof parsed === "object") {
                    if (parsed.answers && typeof parsed.answers === "object") return parsed.answers;
                    return parsed;
                }
            } catch (_) {}
            return {};
        }

        function normalizeMatchingHeadings(question) {
            const options = Array.isArray(question?.matchingHeadingsOptions) ? question.matchingHeadingsOptions : [];
            const rows = Array.isArray(question?.matchingHeadingsRows) ? question.matchingHeadingsRows : [];
            const optionMap = new Map();
            const normalizedOptions = options.map((opt, idx) => {
                const id = String(opt?.id || `mh_${idx + 1}`);
                const label = String(opt?.label || "").trim() || `${idx + 1}.`;
                const text = String(opt?.text || "");
                optionMap.set(id, { id, label, text });
                return { id, label, text };
            });

            const answerMap = parseMatchingHeadingsAnswerMap(question?.answer);
            const normalizedRows = (rows.length ? rows : [{ number: "1", prompt: "Passage A", answerOptionId: "" }]).map((row, idx) => {
                const number = String(row?.number || idx + 1);
                const prompt = String(row?.prompt || `Passage ${String.fromCharCode(65 + idx)}`);
                const answerOptionId = String(row?.answerOptionId || answerMap[number] || "");
                return { number, prompt, answerOptionId };
            });

            return { options: normalizedOptions, rows: normalizedRows, optionMap };
        }

        function countQuestionsInPassage(passage, fallbackGroups) {
            const groups = getPassageQuestionGroups(passage, fallbackGroups);
            return groups.reduce((sum, group) => sum + countQuestionsInGroup(group), 0);
        }

        function buildPartTrackerData(passages) {
            return passages.map((passage, pIdx) => {
                const groups = getPassageQuestionGroups(passage, currentProblem.questionGroups || []);
                const entries = [];

                groups.forEach((group, gIdx) => {
                    group.questions.forEach((q, qIdx) => {
                        const baseName = `q_${pIdx}_${gIdx}_${qIdx}`;
                        const baseBlockId = `block_${baseName}`;
                        if (q.type === 'matching-headings') {
                            const matching = normalizeMatchingHeadings(q);
                            matching.rows.forEach((row) => {
                                entries.push({
                                    name: `${baseName}__mh__${row.number}`,
                                    label: String(row.number),
                                    blockId: baseBlockId
                                });
                            });
                            return;
                        }
                        const numberedDefs = extractNumberedBlankDefs(q.text);

                        if ((q.type === 'text' || q.type === 'fill-in-the-blank' || q.type === 'short-answer') && numberedDefs.length > 0) {
                            numberedDefs.forEach((def) => {
                                entries.push({
                                    name: `${baseName}__${def.number}`,
                                    label: String(def.number),
                                    blockId: baseBlockId
                                });
                            });
                        } else {
                            const questionLabel = extractQuestionDisplayNumber(q, entries.length + 1);
                            entries.push({
                                name: baseName,
                                label: questionLabel,
                                blockId: baseBlockId
                            });
                        }
                    });
                });

                return { entries };
            });
        }

        // Remove old part strip rendering, now handled in header
        function renderPartStrip(passages) {
            renderHeaderTracker(passages);
        }

        function setActivePart(index, focusInputName = null, openTrackerPopup = false) {
            snapshotCurrentAnswers();
            currentPartIndex = index;
            pendingFocusInputName = focusInputName;
            trackerPopupPartIndex = openTrackerPopup ? index : null;
            renderTest();
        }

        function jumpToPartQuestion(partIndex, inputName) {
            if (partIndex !== currentPartIndex) {
                setActivePart(partIndex, inputName);
                return;
            }

            const baseInput = inputName.includes('__') ? inputName.split('__')[0] : inputName;
            scrollToQuestion(`block_${baseInput}`);
        }

        function normalizeQuestionType(question) {
            const rawType = String(question.type || "").toLowerCase();
            if (rawType === "radio" || rawType === "text" || rawType === "fill-in-the-blank" || rawType === "short-answer" || rawType === "matching-headings") {
                return rawType;
            }
            if (rawType.includes("sentence") || rawType.includes("completion")) {
                return "text";
            }
            return "radio";
        }

        function toReadingShape(problem) {
            if (!problem) return null;

            const normalizeQuestionGroups = (groups) => (groups || []).map((group) => ({
                title: group.title || "Questions",
                instruction: group.instruction || "",
                passageBody: group.passageBody || undefined,
                passageStart: group.passageStart || undefined,
                questions: (group.questions || []).map((q) => ({
                    type: normalizeQuestionType(q),
                    text: q.text || "",
                    textHtml: q.textHtml || "",
                    options: typeof q.options === "string" ? q.options : Array.isArray(q.options) ? q.options.join(", ") : "",
                    answer: q.answer || q.correctAnswer || "",
                    matchingHeadingsOptions: Array.isArray(q.matchingHeadingsOptions) ? q.matchingHeadingsOptions : undefined,
                    matchingHeadingsRows: Array.isArray(q.matchingHeadingsRows) ? q.matchingHeadingsRows : undefined
                }))
            }));

            if (Array.isArray(problem.passages) && problem.passages.length > 0) {
                const passages = problem.passages.slice(0, 3).map((passage, index) => ({
                    title: passage.title || passage.passageTitle || `Passage ${index + 1}`,
                    content: passage.content || passage.passageContent || "",
                    questionGroups: normalizeQuestionGroups(passage.questionGroups)
                }));

                return {
                    ...problem,
                    title: problem.title || "Reading Test",
                    passages,
                    passageTitle: passages[0]?.title || "Passage",
                    passageContent: passages[0]?.content || "",
                    questionGroups: passages.flatMap((passage) => passage.questionGroups)
                };
            }

            const hasQuestionGroups = Array.isArray(problem.questionGroups) && problem.questionGroups.length > 0;
            if (hasQuestionGroups) {
                const questionGroups = normalizeQuestionGroups(problem.questionGroups);
                return {
                    ...problem,
                    title: problem.title || "Reading Test",
                    passageTitle: problem.passageTitle || "Passage",
                    passageContent: problem.passageContent || "",
                    passages: [{
                        title: problem.passageTitle || "Passage",
                        content: problem.passageContent || "",
                        questionGroups
                    }],
                    questionGroups
                };
            }

            const hasQuestions = Array.isArray(problem.questions) && problem.questions.length > 0;
            if (hasQuestions) {
                const questionGroups = [{
                    title: "Questions 1-" + problem.questions.length,
                    instruction: "Answer the following questions based on the reading passage.",
                    questions: problem.questions.map((q, idx) => ({
                        type: normalizeQuestionType(q),
                        text: q.text || `${idx + 1}. Question`,
                        textHtml: q.textHtml || "",
                        options: Array.isArray(q.options) ? q.options.join(", ") : (q.options || ""),
                        answer: q.answer || q.correctAnswer || "",
                        matchingHeadingsOptions: Array.isArray(q.matchingHeadingsOptions) ? q.matchingHeadingsOptions : undefined,
                        matchingHeadingsRows: Array.isArray(q.matchingHeadingsRows) ? q.matchingHeadingsRows : undefined
                    }))
                }];
                return {
                    moduleId: "reading",
                    icon: problem.icon || "",
                    moduleName: "Reading",
                    title: problem.title || "Reading Test",
                    passageTitle: problem.passage?.title || problem.passageTitle || "Passage",
                    passageContent: problem.passage?.text || problem.passageContent || "",
                    passages: [{
                        title: problem.passage?.title || problem.passageTitle || "Passage",
                        content: problem.passage?.text || problem.passageContent || "",
                        questionGroups
                    }],
                    questionGroups
                };
            }

            return null;
        }

        // Load problem or use default
        async function loadProblem() {
            try {
                const problems = await storageSync.getProblemsByModule("reading");
                const readingCandidates = Array.isArray(problems)
                    ? problems.filter((item) => item && item.moduleId === "reading")
                    : [];

                const normalizedCandidates = readingCandidates
                    .map((candidate) => toReadingShape(candidate))
                    .filter((normalized) => (
                        normalized &&
                        Array.isArray(normalized.passages) &&
                        normalized.passages.some((passage) => String(passage.content || "").trim().length > 0) &&
                        Array.isArray(normalized.questionGroups) &&
                        normalized.questionGroups.length > 0
                    ));

                let selectedByActiveId = null;
                try {
                    const preferredId = String(localStorage.getItem(ACTIVE_READING_SET_ID_KEY) || "").trim();
                    if (preferredId) {
                        selectedByActiveId = normalizedCandidates.find((item) => String(item.id || "") === preferredId) || null;
                    }
                } catch (_) {}

                // Prefer the most complete set (more passages/groups), then most recently updated.
                normalizedCandidates.sort((a, b) => {
                    const aPassages = Array.isArray(a.passages) ? a.passages.length : 0;
                    const bPassages = Array.isArray(b.passages) ? b.passages.length : 0;
                    if (aPassages !== bPassages) return bPassages - aPassages;

                    const aGroups = Array.isArray(a.questionGroups) ? a.questionGroups.length : 0;
                    const bGroups = Array.isArray(b.questionGroups) ? b.questionGroups.length : 0;
                    if (aGroups !== bGroups) return bGroups - aGroups;

                    const aTime = new Date(a.updatedAt || a.createdAt || 0).getTime() || 0;
                    const bTime = new Date(b.updatedAt || b.createdAt || 0).getTime() || 0;
                    return bTime - aTime;
                });

                const selected = selectedByActiveId || normalizedCandidates[0] || null;

                if (selected) {
                    currentProblem = selected;
                } else {
                    currentProblem = toReadingShape(defaultProblemSet) || defaultProblemSet;
                }
            } catch (e) {
                console.error("Error loading problem:", e);
                currentProblem = toReadingShape(defaultProblemSet) || defaultProblemSet;
            }

            renderTest();
        }

        function isRichText(value) {
            return /<\/?[a-z][\s\S]*>/i.test(String(value || ""));
        }

        function sanitizeRichHtml(value) {
            const template = document.createElement("template");
            template.innerHTML = String(value || "");

            template.content.querySelectorAll("script,style,iframe,object,embed,link,meta").forEach((node) => node.remove());

            const allowedTags = new Set(["b", "strong", "i", "em", "u", "br", "p", "div", "span", "ul", "ol", "li", "sub", "sup"]);
            const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT);
            const elements = [];
            while (walker.nextNode()) {
                elements.push(walker.currentNode);
            }

            elements.forEach((el) => {
                const tag = (el.tagName || "").toLowerCase();
                if (!allowedTags.has(tag)) {
                    const parent = el.parentNode;
                    if (!parent) return;
                    while (el.firstChild) parent.insertBefore(el.firstChild, el);
                    parent.removeChild(el);
                    return;
                }

                Array.from(el.attributes).forEach((attr) => {
                    const name = String(attr.name || "").toLowerCase();
                    if (name.startsWith("on") || name === "id" || name === "class") {
                        el.removeAttribute(attr.name);
                    }
                    if ((name === "href" || name === "src") && /^\s*javascript:/i.test(String(attr.value || ""))) {
                        el.removeAttribute(attr.name);
                    }
                    if (name === "style") {
                        const styleText = String(attr.value || "");
                        const allowed = [];
                        styleText.split(";").forEach((decl) => {
                            const parts = decl.split(":");
                            if (parts.length < 2) return;
                            const prop = String(parts[0] || "").trim().toLowerCase();
                            const val = String(parts.slice(1).join(":") || "").trim().toLowerCase();
                            if (prop === "text-align" && /^(left|right|center|justify)$/.test(val)) {
                                allowed.push(`text-align:${val}`);
                                return;
                            }
                            if (prop === "text-justify" && /^(auto|inter-word|inter-character|none)$/.test(val)) {
                                allowed.push(`text-justify:${val}`);
                            }
                        });

                        if (allowed.length > 0) {
                            el.setAttribute("style", allowed.join(";"));
                        } else {
                            el.removeAttribute("style");
                        }
                    }
                });
            });

            return template.innerHTML;
        }

        function formatPassageText(text) {
            const trimmed = String(text || "").trim();

            if (isRichText(trimmed)) {
                return sanitizeRichHtml(trimmed);
            }

            // Plain text: preserve headings, bullets, and blank-line paragraph breaks
            const lines = trimmed.split(/\r?\n/);
            let html = '';
            let listItems = [];

            const flushList = () => {
                if (!listItems.length) return;
                html += `<ul>${listItems.map(li => `<li>${li}</li>`).join('')}</ul>\n`;
                listItems = [];
            };

            lines.forEach(line => {
                const l = line.trim();
                if (!l) {
                    flushList();
                    return; // blank line = end current block
                }
                const bulletMatch = l.match(/^[•\-\*]\s+(.+)$/);
                if (bulletMatch) {
                    listItems.push(escapeHtml(bulletMatch[1]));
                } else {
                    flushList();
                    // Short lines all-caps or title-case without period at end = treated as heading
                    const isHeading = l.length < 60 && /^[A-Z]/.test(l) && !/[.!?]$/.test(l);
                    if (isHeading) {
                        html += `<p><strong>${escapeHtml(l)}</strong></p>\n`;
                    } else {
                        html += `<p>${escapeHtml(l)}</p>\n`;
                    }
                }
            });

            flushList();
            return html;
        }

        function extractBlankAnswer(text) {
            const match = String(text || "").match(/\[\[(.+?)\]\]/);
            return match ? match[1].trim() : "";
        }

        function formatQuestionText(text) {
            return escapeHtml(String(text || "")).replace(/\r?\n/g, "<br>");
        }

        function renderQuestionTextBlock(text, textHtml = "") {
            const rich = String(textHtml || "").trim();
            if (rich && isRichText(rich)) {
                return sanitizeRichHtml(rich);
            }

            const rawText = String(text || "");
            const inlineBulletMatches = rawText.match(/\s(?:-|\*|•)\s+[A-Z0-9]/g);
            const normalizedText = !/\r?\n/.test(rawText) && inlineBulletMatches && inlineBulletMatches.length >= 2
                ? rawText.replace(/\s([\-\*•])\s+/g, "\n$1 ")
                : rawText;
            const lines = normalizedText.split(/\r?\n/);
            const chunks = [];
            let listItems = [];

            const flushList = () => {
                if (!listItems.length) return;
                chunks.push(`<ul class="question-bullet-list">${listItems.map((item) => `<li>${item}</li>`).join("")}</ul>`);
                listItems = [];
            };

            lines.forEach((line) => {
                const bulletMatch = line.match(/^\s*(?:[-*•])\s+(.+)$/);
                if (bulletMatch) {
                    listItems.push(formatQuestionText(bulletMatch[1]));
                    return;
                }

                flushList();
                chunks.push(formatQuestionText(line));
            });

            flushList();
            return chunks.join("<br>");
        }

        function normalizeInstructionText(value) {
            let text = String(value || "").replace(/\r/g, "");
            text = text
                .replace(/<br\s*\/?\s*>/gi, "\n")
                .replace(/<\/(p|div|li|h1|h2|h3|h4|h5|h6)>/gi, "\n")
                .replace(/<li[^>]*>/gi, "- ")
                .replace(/<[^>]+>/g, "");
            return text
                .split("\n")
                .map((line) => line.replace(/\s+$/g, ""))
                .join("\n")
                .trim();
        }

        function emphasizeUppercaseTerms(text) {
            const escaped = escapeHtml(String(text || ""));
            return escaped.replace(/\b([A-Z]{2,}(?:\s+[A-Z]{2,})*)\b/g, "<strong>$1</strong>");
        }

        function renderInstructionBlock(value) {
            const normalized = normalizeInstructionText(value);
            if (!normalized) return "";
            return emphasizeUppercaseTerms(normalized);
        }

        function stripMatchingInstructionOptions(value) {
            const normalized = normalizeInstructionText(value);
            if (!normalized) return "";
            const lines = normalized.split("\n");
            const cutIndex = lines.findIndex((line) => {
                const text = String(line || "").trim();
                return /List\s+of\s+Headings?/i.test(text)
                    || /^\s*(?:i{1,3}|iv|v|vi{0,3}|ix|x|xi|xii)\.\s+.+$/i.test(text);
            });
            return (cutIndex >= 0 ? lines.slice(0, cutIndex) : lines).join("\n").trim();
        }

        function renderInlineBlankText(text, answer, inputName, textHtml = "") {
            const plainSource = String(text || "");
            const richSource = String(textHtml || "").trim();
            const source = richSource || plainSource;
            const numberedDefs = extractNumberedBlankDefs(plainSource || source);
            if (numberedDefs.length > 0) {
                const tokens = [];
                const withTokens = source.replace(/(\d+)\s((?:_\s*){2,})/g, (_, number, underscoresRaw) => {
                    const underscores = String(underscoresRaw || "").replace(/\s+/g, "");
                    const token = `@@NUMBERED_BLANK_${tokens.length}@@`;
                    tokens.push({
                        token,
                        html: `<span class="numbered-blank"><span class="blank-number">${escapeHtml(number)}</span><input type="text" name="${inputName}__${number}" data-question-base="${inputName}" data-blank-number="${number}" class="inline-input numbered-inline-input" style="width:${Math.max(4, Math.floor(underscores.length / 2) * 4)}ch" placeholder="..."></span>`
                    });
                    return token;
                });
                let rendered = richSource && isRichText(withTokens) ? sanitizeRichHtml(withTokens) : renderQuestionTextBlock(withTokens);
                tokens.forEach(({ token, html }) => {
                    rendered = rendered.split(token).join(html);
                });
                return rendered;
            }

            const blankAnswer = String(answer || extractBlankAnswer(text) || "").trim();
            const blankId = `${inputName}_blank`;
            const blankToken = "@@INLINE_BLANK@@";

            if (blankAnswer) {
                const index = source.indexOf(blankAnswer);
                if (index >= 0) {
                    const withToken = `${source.slice(0, index)}${blankToken}${source.slice(index + blankAnswer.length)}`;
                    const rendered = richSource && isRichText(withToken) ? sanitizeRichHtml(withToken) : renderQuestionTextBlock(withToken);
                    return rendered.split(blankToken).join(`<input type="text" name="${inputName}" id="${blankId}" class="inline-input" placeholder="...">`);
                }
            }

            const withToken = source.replace(/\[\[(.+?)\]\]/g, blankToken);
            const rendered = richSource && isRichText(withToken) ? sanitizeRichHtml(withToken) : renderQuestionTextBlock(withToken);
            return rendered.split(blankToken).join(`<input type="text" name="${inputName}" id="${blankId}" class="inline-input" placeholder="...">`);
        }

        function stripLeadingQuestionNumber(text) {
            return String(text || "").replace(/^\s*\d+\s*[.)]\s*/, "");
        }

        function renderQuestionTextWithBadge(number, contentHtml) {
            return `<div class="question-text-row"><span class="blank-number">${escapeHtml(number)}</span><p class="question-text">${contentHtml}</p></div>`;
        }

        function getCorrectTextAnswer(q) {
            const numberedDefs = extractNumberedBlankDefs(q.text);
            if (numberedDefs.length > 0) {
                return JSON.stringify(parseNumberedBlankAnswerMap(q.answer));
            }
            return String(q.answer || extractBlankAnswer(q.text) || "").trim();
        }

        function extractNumberedBlankDefs(value) {
            const defs = [];
            const regex = /(\d+)\s((?:_\s*){2,})/g;
            const text = String(value || "");
            let match;
            while ((match = regex.exec(text)) !== null) {
                const number = match[1];
                const underscores = String(match[2] || "").replace(/\s+/g, "");
                defs.push({
                    number,
                    underscores: underscores.length,
                    maxWords: Math.max(1, Math.floor(underscores.length / 2))
                });
            }
            return defs;
        }

        function parseNumberedBlankAnswerMap(raw) {
            const text = String(raw || "").trim();
            if (!text || !text.startsWith("{")) return {};
            try {
                const parsed = JSON.parse(text);
                if (parsed && typeof parsed === "object") {
                    if (parsed.answers && typeof parsed.answers === "object") return parsed.answers;
                    return parsed;
                }
            } catch (_) {}
            return {};
        }

        function parseStoredOptions(value) {
            if (Array.isArray(value)) {
                return value.map((item) => String(item || "").trim()).filter(Boolean);
            }
            const text = String(value || "").trim();
            if (!text) return [];
            if (text.startsWith("[")) {
                try {
                    const parsed = JSON.parse(text);
                    if (Array.isArray(parsed)) {
                        return parsed.map((item) => String(item || "").trim()).filter(Boolean);
                    }
                } catch (_) {}
            }
            return text.split(",").map((item) => item.trim()).filter(Boolean);
        }

        function renderFillPassageGroup(group, gIndex, passageIndex) {
            const bodyText = String(group.passageBody || "");
            const passageStart = Number(group.passageStart || 1);
            const qCount = (group.questions || []).length;
            const lines = bodyText.split(/\r?\n/);
            let html = '<div class="fill-passage-body">';
            let listItems = [];

            const flushList = () => {
                if (!listItems.length) return;
                html += `<ul>${listItems.map(li => `<li>${li}</li>`).join('')}</ul>`;
                listItems = [];
            };

            const replaceInlineBlanks = (text) => {
                // Match N. ______ (with period) or N ______ (without period)
                return escapeHtml(text).replace(/(\d+)\s*\.?\s*((?:_{2,}))/g, (_, num, blanks) => {
                    const qIdx = Number(num) - passageStart;
                    if (qIdx < 0 || qIdx >= qCount) return escapeHtml(_);
                    // Name must match what submitTest expects: base__num
                    const baseKey = `q_${passageIndex}_${gIndex}_${qIdx}`;
                    const inputName = `${baseKey}__${num}`;
                    return `<span class="numbered-blank"><span class="blank-number">${num}</span><input type="text" name="${inputName}" data-question-base="${baseKey}" data-blank-number="${num}" class="inline-input numbered-inline-input" style="width:${Math.max(80, blanks.length * 10)}px" placeholder="..."></span>`;
                });
            };

            lines.forEach(line => {
                const l = line.trim();
                if (!l) { flushList(); return; }
                const bulletMatch = l.match(/^[•\-\*]\s+(.+)$/);
                if (bulletMatch) {
                    listItems.push(replaceInlineBlanks(bulletMatch[1]));
                } else {
                    flushList();
                    const hasBlanks = /\d+\s*\.?\s*_{2,}/.test(l);
                    if (!hasBlanks && l.length < 70 && /^[A-Z\(]/.test(l)) {
                        html += `<p><strong>${escapeHtml(l)}</strong></p>`;
                    } else {
                        html += `<p>${replaceInlineBlanks(l)}</p>`;
                    }
                }
            });

            flushList();
            html += '</div>';
            return html;
        }

        function renderTest() {
            if (!currentProblem) return;

            const OLD_DEFAULTS = ["IELTS Academic Reading", "IELTS Reading"];
            const rawTitle = (currentProblem.title || "").trim();
            document.getElementById('display-title').innerText = (!rawTitle || OLD_DEFAULTS.includes(rawTitle)) ? "Reading Test" : rawTitle;
            const passages = getProblemPassages();
            if (currentPartIndex < 0 || currentPartIndex >= passages.length) {
                currentPartIndex = 0;
            }

            const activePassage = passages[currentPartIndex] || passages[0] || { title: "Passage", content: "", questionGroups: [] };
            const activeGroups = getPassageQuestionGroups(activePassage, currentProblem.questionGroups || []);

            document.getElementById('display-passage-title').innerText = `Part ${currentPartIndex + 1}`;
            // If all groups are fill-passage groups (have passageBody), the reading content
            // is already embedded in those groups — skip the main passage content card.
            const allFillPassage = activeGroups.length > 0 && activeGroups.every(g => !!g.passageBody);
            document.getElementById('display-passage-content').innerHTML = allFillPassage ? '' : `
                <section class="reading-passage-card">
                    <h3 class="reading-passage-title">${activePassage.title || `Passage ${currentPartIndex + 1}`}</h3>
                    <div class="reading-passage-content">${formatPassageText(activePassage.content || "")}</div>
                </section>
            `;

            const container = document.getElementById('dynamic-questions-container');
            let absoluteQNum = 1;
            // Show passage title at top of questions area when content card is hidden
            let html = allFillPassage
                ? `<section class="reading-passage-card" style="margin-bottom:1rem"><h3 class="reading-passage-title">${escapeHtml(activePassage.title || `Passage ${currentPartIndex + 1}`)}</h3></section>`
                : '';
            const typeMeta = [];

            activeGroups.forEach((group, gIndex) => {
                const groupQuestionLabels = [];
                const firstQ = (group.questions || [])[0] || {};
                const isInlineFillPassage = group.passageBody
                    && (firstQ.type === 'fill-in-the-blank' || firstQ.type === 'text' || firstQ.type === 'short-answer');

                html += `<div class="question-group" id="group_${currentPartIndex}_${gIndex}">`;
                if(group.title) html += `<div class="question-group-title">${group.title}</div>`;
                // Skip instruction for fill-passage groups — the passageBody already contains the full text
                if(group.instruction && !isInlineFillPassage) {
                    const isMatchingGroup = firstQ.type === 'matching-headings';
                    const instructionSource = isMatchingGroup
                        ? stripMatchingInstructionOptions(group.instruction)
                        : group.instruction;
                    if (String(instructionSource || "").trim()) {
                        html += `<div class="instruction">${renderInstructionBlock(instructionSource)}</div>`;
                    }
                }

                if (isInlineFillPassage) {
                    // Render as one passage block with inline input boxes
                    const passageStart = Number(group.passageStart || 1);
                    group.questions.forEach((q, qIdx) => {
                        const qNumber = passageStart + qIdx;
                        groupQuestionLabels.push(String(qNumber));
                    });
                    html += renderFillPassageGroup(group, gIndex, currentPartIndex);
                } else {
                group.questions.forEach((q, qIndex) => {
                    const inputName = `q_${currentPartIndex}_${gIndex}_${qIndex}`;
                    const blockId = `block_${inputName}`;
                    const questionDisplayNumber = extractQuestionDisplayNumber(q, absoluteQNum);
                    if (q.type === 'matching-headings') {
                        const matching = normalizeMatchingHeadings(q);
                        matching.rows.forEach((row) => {
                            groupQuestionLabels.push(String(row.number));
                        });
                    } else {
                    const numberedDefs = extractNumberedBlankDefs(q.text);

                    if ((q.type === 'text' || q.type === 'fill-in-the-blank' || q.type === 'short-answer') && numberedDefs.length > 0) {
                        numberedDefs.forEach((def) => {
                            groupQuestionLabels.push(String(def.number));
                        });
                    } else {
                        const questionLabel = extractQuestionDisplayNumber(q, absoluteQNum);
                        groupQuestionLabels.push(String(questionLabel));
                        absoluteQNum++;
                    }
                    }

                    html += `<div class="question-block" id="${blockId}">`;
                    
                    if (q.type === 'radio') {
                        html += renderQuestionTextWithBadge(
                            questionDisplayNumber,
                            renderQuestionTextBlock(stripLeadingQuestionNumber(q.text), stripLeadingQuestionNumber(q.textHtml))
                        );
                        html += `<div class="options">`;
                        const optionsArray = parseStoredOptions(q.options);
                        const isBinaryOptionSet = optionsArray.every((opt) => /^(true|false|not given|yes|no)$/i.test(String(opt || "").trim()));
                        optionsArray.forEach((opt, optIdx) => {
                            if(opt) {
                                const safeOpt = escapeHtml(opt);
                                const alpha = String.fromCharCode(65 + optIdx);
                                const startsWithAlpha = /^[A-H][\.)]\s+/i.test(String(opt || "").trim());
                                const alphaHtml = !isBinaryOptionSet && !startsWithAlpha ? `<span class="option-alpha">${alpha}.</span>` : "";
                                html += `<label class="option-label">
                                            <input type="radio" name="${inputName}" value="${safeOpt}">
                                            <span class="custom-radio"></span>${alphaHtml} ${safeOpt}
                                         </label>`;
                            }
                        });
                        html += `</div>`;
                    } else if (q.type === 'fill-in-the-blank' || q.type === 'text') {
                        const hasInlineBlank = /\[\[(.+?)\]\]/.test(q.text || "");
                        const hasAnswer = String(q.answer || "").trim().length > 0;
                        const isStandaloneFillBlank = (q.type === 'fill-in-the-blank' || q.type === 'text')
                            && extractNumberedBlankDefs(q.text).length === 0
                            && (hasInlineBlank || q.type === 'fill-in-the-blank' || hasAnswer);
                        if (hasInlineBlank || q.type === 'fill-in-the-blank' || hasAnswer) {
                            const inlineHtml = renderInlineBlankText(
                                isStandaloneFillBlank ? stripLeadingQuestionNumber(q.text) : q.text,
                                q.answer,
                                inputName,
                                isStandaloneFillBlank ? stripLeadingQuestionNumber(q.textHtml) : q.textHtml
                            );
                            if (isStandaloneFillBlank) {
                                html += renderQuestionTextWithBadge(questionDisplayNumber, inlineHtml);
                            } else {
                                html += `<p class="question-text">${inlineHtml}</p>`;
                            }
                        } else {
                            html += renderQuestionTextWithBadge(
                                questionDisplayNumber,
                                renderQuestionTextBlock(stripLeadingQuestionNumber(q.text), stripLeadingQuestionNumber(q.textHtml))
                            );
                            html += `<input type="text" name="${inputName}" class="short-answer-input" placeholder="Type your answer...">`;
                        }
                    } else if (q.type === 'short-answer') {
                        // Standalone short-answer: question text + separate input box below
                        html += renderQuestionTextWithBadge(
                            questionDisplayNumber,
                            renderQuestionTextBlock(stripLeadingQuestionNumber(q.text), stripLeadingQuestionNumber(q.textHtml))
                        );
                        html += `<input type="text" name="${inputName}" class="short-answer-input" placeholder="Type your answer...">`;
                    } else if (q.type === 'matching-headings') {
                        const matching = normalizeMatchingHeadings(q);
                        html += `<div class="matching-headings-legend"><h4>List of Headings</h4>${matching.options.map((opt) => `<div class="matching-headings-legend-row"><span class="matching-heading-label">${escapeHtml(opt.label)}</span><span>${escapeHtml(opt.text)}</span></div>`).join("")}</div>`;
                        matching.rows.forEach((row) => {
                            const rowName = `${inputName}__mh__${row.number}`;
                            html += `<div class="matching-heading-row"><p class="question-text"><strong>${escapeHtml(row.number)}.</strong> ${escapeHtml(row.prompt)}</p><select name="${rowName}"><option value="">Select heading</option>${matching.options.map((opt) => `<option value="${escapeHtml(opt.id)}">${escapeHtml(opt.label)} ${escapeHtml(opt.text)}</option>`).join("")}</select></div>`;
                        });
                    }

                    html += `</div>`;
                });
                } // end else (non-fill-passage)

                const firstLabel = groupQuestionLabels[0] || String(gIndex + 1);
                const lastLabel = groupQuestionLabels[groupQuestionLabels.length - 1] || firstLabel;
                const firstQuestion = (group.questions || [])[0] || {};
                typeMeta.push({
                    groupIndex: gIndex,
                    typeLabel: getQuestionTypeLabel(firstQuestion),
                    startLabel: firstLabel,
                    endLabel: lastLabel
                });
                html += `</div>`;
            });

            container.innerHTML = html;
            renderReadingOverview(passages, typeMeta);
            hydrateInputsFromState();
            attachTrackingListeners();
            updateProgressInit();

            if (pendingFocusInputName) {
                const baseInput = pendingFocusInputName.includes('__') ? pendingFocusInputName.split('__')[0] : pendingFocusInputName;
                scrollToQuestion(`block_${baseInput}`);
                pendingFocusInputName = null;
            }
        }

        function toggleNavigator() {
            const nav = document.getElementById('questionNavigator');
            nav.classList.toggle('open');
        }

        function attachTrackingListeners() {
            const allInputs = document.querySelectorAll('#dynamic-questions-container input, #dynamic-questions-container select');
            allInputs.forEach(input => {
                const eventType = input.tagName === 'SELECT' || input.type === 'radio' ? 'change' : 'input';
                input.addEventListener(eventType, function() {
                    updateTracker(this.name);
                });
            });
        }

        function updateTracker(inputName) {
            const radioChecked = document.querySelector(`input[name="${inputName}"]:checked`);
            const blankInputs = document.querySelectorAll(`input[data-question-base="${inputName}"]`);
            const textInput = document.querySelector(`input[type="text"][name="${inputName}"]`);
            const selectInput = document.querySelector(`select[name="${inputName}"]`);

            let isAnswered = false;
            if(radioChecked) isAnswered = true;
            if(blankInputs.length > 0) {
                isAnswered = Array.from(blankInputs).every((input) => input.value.trim() !== '');
            } else if(textInput && textInput.value.trim() !== '') {
                isAnswered = true;
            } else if (selectInput && String(selectInput.value || '').trim() !== '') {
                isAnswered = true;
            }

            if (isAnswered) {
                if (radioChecked) answerState[inputName] = String(radioChecked.value || "");
                else if (textInput) answerState[inputName] = String(textInput.value || "");
                else if (selectInput) answerState[inputName] = String(selectInput.value || "");
            } else if (blankInputs.length === 0) {
                answerState[inputName] = "";
            }

            renderReadingOverview(getProblemPassages(), buildQuestionTypeMeta(getPassageQuestionGroups(getProblemPassages()[currentPartIndex] || {}, currentProblem?.questionGroups || [])));
            updateProgressInit();
        }

        function updateProgressInit() {
            return;
        }

        function scrollToQuestion(blockId) {
            const element = document.getElementById(blockId);
            const container = document.getElementById('rightPanel');
            
            if(element && container) {
                const navHeight = 0;
                const targetPos = element.offsetTop - navHeight - 60;
                
                container.scrollTo({ top: targetPos, behavior: 'smooth' });

                element.style.backgroundColor = '#eff6ff';
                setTimeout(() => {
                    element.style.backgroundColor = 'transparent';
                }, 1500);
            }
        }

        let currentZoom = 1.0;
        function adjustTextSize(change) {
            currentZoom += change;
            if (currentZoom < 0.8) currentZoom = 0.8;
            if (currentZoom > 1.6) currentZoom = 1.6;
            document.documentElement.style.setProperty('--text-zoom', currentZoom);
        }

        const resizer = document.getElementById('dragMe');
        const leftPanel = document.getElementById('leftPanel');
        let x = 0; let leftWidth = 0;

        document.addEventListener('click', function(event) {
            const tracker = document.getElementById('headerTracker');
            if (!tracker) return;
            if (trackerPopupPartIndex === null) return;
            if (tracker.contains(event.target)) return;
            trackerPopupPartIndex = null;
            renderPartStrip(getProblemPassages());
        });

        const toggleTypeTrackerBtn = document.getElementById('toggleTypeTrackerBtn');
        if (toggleTypeTrackerBtn) {
            toggleTypeTrackerBtn.addEventListener('click', function() {
                isTypeTrackerCollapsed = !isTypeTrackerCollapsed;
                renderReadingOverview(getProblemPassages(), buildQuestionTypeMeta(getPassageQuestionGroups(getProblemPassages()[currentPartIndex] || {}, currentProblem?.questionGroups || [])));
            });
        }

        window.addEventListener('resize', syncPanelViewportLayout);

        const prevPassageBtn = document.getElementById('prevPassageBtn');
        if (prevPassageBtn) {
            prevPassageBtn.addEventListener('click', goToPrevPassage);
        }

        const nextPassageBtn = document.getElementById('nextPassageBtn');
        if (nextPassageBtn) {
            nextPassageBtn.addEventListener('click', goToNextPassage);
        }

        resizer.addEventListener('mousedown', function(e) {
            x = e.clientX; leftWidth = leftPanel.getBoundingClientRect().width;
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
            resizer.classList.add('resizing');
            document.body.style.userSelect = 'none';
        });

        const mouseMoveHandler = function(e) {
            const containerWidth = resizer.parentNode.getBoundingClientRect().width;
            const newLeftWidth = ((leftWidth + (e.clientX - x)) * 100) / containerWidth;
            if (newLeftWidth > 25 && newLeftWidth < 75) leftPanel.style.width = `${newLeftWidth}%`;
        };
        const mouseUpHandler = function() {
            document.removeEventListener('mousemove', mouseMoveHandler);
            document.removeEventListener('mouseup', mouseUpHandler);
            resizer.classList.remove('resizing');
            document.body.style.userSelect = '';
        };

        let timeInSeconds = 3600;
        const timerElement = document.getElementById('timer');
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timeInSeconds = 3600;
            timerElement.classList.remove('warning');
            
            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeInSeconds / 60);
                let seconds = timeInSeconds % 60;
                if (seconds < 10) seconds = '0' + seconds;
                timerElement.textContent = `${minutes}:${seconds}`;
                if (timeInSeconds <= 300) timerElement.classList.add('warning');
                
                if (timeInSeconds > 0) {
                    timeInSeconds--;
                } else {
                    clearInterval(timerInterval);
                    alert("Time is up! Submitting your test.");
                    submitTest(true);
                }
            }, 1000);
        }

        function goToNextModule() {
            window.location.href = NEXT_URL;
        }

        function recordDailyModuleResult(moduleKey, scoreValue, extras) {
            if (!DAY_VALUE) {
                return;
            }

            const safeExtras = extras || {};
            const store = JSON.parse(localStorage.getItem(DAILY_TEST_KEY) || "{}");
            if (!store[DAY_VALUE]) {
                store[DAY_VALUE] = {
                    date: DAY_VALUE,
                    modules: {
                        listening: { taken: false, score: null, attempts: 0, lastTakenAt: null, history: [] },
                        reading: { taken: false, score: null, attempts: 0, lastTakenAt: null, history: [] },
                        writing: { taken: false, score: null, attempts: 0, lastTakenAt: null, history: [] },
                        speaking: { taken: false, score: null, attempts: 0, lastTakenAt: null, history: [] }
                    }
                };
            }

            const dateEntry = store[DAY_VALUE];
            if (!dateEntry.modules[moduleKey]) {
                dateEntry.modules[moduleKey] = { taken: false, score: null, attempts: 0, lastTakenAt: null, history: [] };
            }

            const moduleEntry = dateEntry.modules[moduleKey];
            moduleEntry.taken = true;
            moduleEntry.score = scoreValue;
            moduleEntry.attempts = (moduleEntry.attempts || 0) + 1;
            moduleEntry.lastTakenAt = new Date().toISOString();
            if (!Array.isArray(moduleEntry.history)) {
                moduleEntry.history = [];
            }
            moduleEntry.history.push({
                score: scoreValue,
                timestamp: moduleEntry.lastTakenAt,
                details: safeExtras
            });

            localStorage.setItem(DAILY_TEST_KEY, JSON.stringify(store));
        }

        function submitTest(isAutoContinue) {
            clearInterval(timerInterval);
            snapshotCurrentAnswers();

            const correctAnswers = {};
            const questionMeta = {};
            const passages = getProblemPassages();
            passages.forEach((passage, pIndex) => {
                const groups = getPassageQuestionGroups(passage, currentProblem.questionGroups || []);
                groups.forEach((group, gIndex) => {
                    group.questions.forEach((q, qIndex) => {
                        const key = `q_${pIndex}_${gIndex}_${qIndex}`;
                        if (q.type === 'matching-headings') {
                            const matching = normalizeMatchingHeadings(q);
                            const answerMap = parseMatchingHeadingsAnswerMap(q.answer);
                            matching.rows.forEach((row) => {
                                const answerKey = `${key}__mh__${row.number}`;
                                const correctOptionId = String(answerMap[row.number] || row.answerOptionId || "").trim();
                                correctAnswers[answerKey] = correctOptionId.toLowerCase();
                                const optionMeta = matching.optionMap.get(correctOptionId);
                                questionMeta[answerKey] = {
                                    text: `${row.number}. ${row.prompt}`,
                                    correctAnswer: optionMeta ? `${optionMeta.label} ${optionMeta.text}`.trim() : correctOptionId
                                };
                            });
                            return;
                        }
                        const numberedDefs = extractNumberedBlankDefs(q.text);
                        const numberedAnswers = parseNumberedBlankAnswerMap(q.answer);

                        if (numberedDefs.length > 0) {
                            numberedDefs.forEach((def) => {
                                const answerKey = `${key}__${def.number}`;
                                const correctAnswer = String(numberedAnswers[def.number] || "").trim();
                                correctAnswers[answerKey] = correctAnswer.toLowerCase();
                                questionMeta[answerKey] = {
                                    text: `${q.text || `Question ${qIndex + 1}`} (${def.number})`,
                                    correctAnswer
                                };
                            });
                        } else {
                            correctAnswers[key] = getCorrectTextAnswer(q).toLowerCase();
                            questionMeta[key] = {
                                text: q.text || `Question ${qIndex + 1}`,
                                correctAnswer: getCorrectTextAnswer(q)
                            };
                        }
                    });
                });
            });

            let score = 0;
            const totalQuestions = Object.keys(correctAnswers).length;
            const answerDetails = [];

            for (const [inputName, answerLowerCase] of Object.entries(correctAnswers)) {
                const rawUserValue = String(answerState[inputName] || "").trim();
                const userValue = rawUserValue ? rawUserValue.toLowerCase() : null;

                if (userValue === answerLowerCase) {
                    score++;
                }

                answerDetails.push({
                    question: questionMeta[inputName]?.text || inputName,
                    userAnswer: userValue || "",
                    correctAnswer: questionMeta[inputName]?.correctAnswer || "",
                    isCorrect: userValue === answerLowerCase
                });
            }

            const scorePercentage = totalQuestions > 0 ? Math.round((score / totalQuestions) * 100) : 0;
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            
            if (score === totalQuestions && totalQuestions > 0) {
                resultDiv.innerHTML = ` Perfect! You scored ${score}/${totalQuestions} (${scorePercentage}%)`;
                resultDiv.className = 'result-good';
            } else {
                resultDiv.innerHTML = `Score: ${score}/${totalQuestions} (${scorePercentage}%)`;
                resultDiv.className = 'result-bad';
            }

            // Save test results
            const results = JSON.parse(localStorage.getItem(TEST_RESULTS_KEY) || "{}");
            results["reading"] = {
                timestamp: new Date().toISOString(),
                score: scorePercentage,
                total: 100,
                correct: score,
                questions: totalQuestions,
                timeSpent: timerElement.textContent
            };

            const aiReviewBoxId = `ai-review-reading-${Date.now()}`;
            resultDiv.insertAdjacentHTML("beforeend", `<div id="${aiReviewBoxId}" style="margin-top:10px;font-size:0.9rem;">Analyzing with AI reviewer...</div>`);

            requestAiReview({
                module: "reading",
                promptTitle: currentProblem.title || "Reading Test",
                passageTitle: currentProblem.passageTitle || "",
                passageExcerpt: String(currentProblem.passageContent || "").slice(0, 1200),
                score: scorePercentage,
                totalQuestions: totalQuestions,
                correct: score,
                answers: answerDetails
            }).then((review) => {
                results["reading"].aiReview = review;
                localStorage.setItem(TEST_RESULTS_KEY, JSON.stringify(results));
                const reviewBox = document.getElementById(aiReviewBoxId);
                if (reviewBox) {
                    reviewBox.outerHTML = formatAiReviewHtml(review);
                }
            }).catch((error) => {
                const reviewBox = document.getElementById(aiReviewBoxId);
                if (reviewBox) {
                    reviewBox.textContent = `AI review unavailable: ${error.message}`;
                }
            });
            localStorage.setItem(TEST_RESULTS_KEY, JSON.stringify(results));
            recordDailyModuleResult("reading", scorePercentage, {
                correct: score,
                questions: totalQuestions,
                timeSpent: timerElement.textContent
            });
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Test Submitted ';
            const continueBtn = document.getElementById('continueBtn');
            
            document.querySelectorAll('input[type="radio"], input[type="text"]').forEach(input => {
                input.disabled = true;
            });

            if (PACKAGE_MODE) {
                if (isAutoContinue) {
                    setTimeout(goToNextModule, 900);
                } else {
                    continueBtn.style.display = 'block';
                }
            } else {
                continueBtn.style.display = 'block';
            }
        }

        function goBackToDeveloper() {
            const target = RETURN_TO || "study-plan.html";
            if(confirm("Leave test and go back?")) {
                window.location.href = target;
            }
        }

        function initializeBackToDeveloper() {
            const btn = document.getElementById("backToDeveloperBtn");
            if (!btn) return;
            btn.style.display = "inline-flex";
            btn.textContent = RETURN_TO ? "Back" : "Back to Study Plan";
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function formatAiReviewHtml(review) {
            if (!review) {
                return '<div style="margin-top:10px;font-size:0.9rem;">AI review unavailable.</div>';
            }

            const strengths = Array.isArray(review.strengths) ? review.strengths : [];
            const improvements = Array.isArray(review.improvements) ? review.improvements : [];
            const nextSteps = Array.isArray(review.nextSteps) ? review.nextSteps : [];

            return `
                <div style="margin-top:10px;padding:12px;border:1px solid #bbf7d0;border-radius:10px;background:#f0fdf4;color:#14532d;">
                    <strong>AI Review ${review.estimatedBand ? `(Band ${escapeHtml(review.estimatedBand)})` : ""}</strong>
                    <div style="margin-top:6px;line-height:1.5;">${escapeHtml(review.summary || "No summary returned.")}</div>
                    ${strengths.length ? `<div style="margin-top:8px;"><strong>Strengths:</strong><ul style="margin:4px 0 0 18px;">${strengths.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>` : ""}
                    ${improvements.length ? `<div style="margin-top:8px;"><strong>Needs improvement:</strong><ul style="margin:4px 0 0 18px;">${improvements.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>` : ""}
                    ${nextSteps.length ? `<div style="margin-top:8px;"><strong>Next steps:</strong><ul style="margin:4px 0 0 18px;">${nextSteps.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>` : ""}
                </div>
            `;
        }

        async function requestAiReview(payload) {
            const response = await fetch(AI_REVIEW_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || `AI review failed (${response.status})`);
            }

            return response.json();
        }

        // Initialize
        (async () => {
            initializeBackToDeveloper();
            await loadProblem();
            startTimer();
        })();
    </script>
</body>
