<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Test - IELTS Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1f745e;
            --primary-hover: #185947;
            --bg-body: #f3f7f5;
            --bg-surface: #ffffff;
            --text-main: #182621;
            --text-muted: #5a6d66;
            --border-color: #d8e4de;
            --danger: #c44444;
            --success: #1f9d63;
            --text-zoom: 1;
            --overview-height: 96px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }
        h1, h2, h3, h4, .header-title, .question-group-title { font-family: 'Sora', sans-serif; letter-spacing: -0.01em; }

        /* Compact controls */
        .header-title { font-size: 1rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 14px; }
        .text-controls { display: flex; gap: 5px; background: var(--bg-body); padding: 4px; border-radius: 6px; border: 1px solid var(--border-color); }
        .text-btn { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 4px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; color: var(--text-main); transition: background 0.2s; }
        .text-btn:hover { background: #e2e8f0; }
        .timer-container { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .back-dev-btn {
            background: #ebf8f0;
            color: var(--primary);
            border: 1px solid #b8ddca;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .back-dev-btn:hover { background: #ddf1e7; }
        #timer { background: var(--bg-body); color: var(--primary); padding: 6px 16px; border-radius: 999px; border: 1px solid var(--border-color); font-variant-numeric: tabular-nums; transition: all 0.3s ease; }
        #timer.warning { color: white; background: var(--danger); border-color: var(--danger); }

        /* Layout */
        .container { display: flex; flex-wrap: wrap; flex: 1; overflow: visible; padding: 24px 20px; gap: 10px; max-width: 1600px; margin: 0 auto; width: 100%; min-height: 0; }
        .panel { background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow-y: auto; max-height: calc(100vh - var(--overview-height) - 48px); padding: 40px; position: relative; scroll-behavior: smooth; }
        .passage-section { width: 50%; }
        .question-section { flex: 1; }

        .header-center { display: none; }

        .reading-overview {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            padding: 10px 18px;
            position: sticky;
            top: 0;
            z-index: 22;
        }

        .overview-top {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 14px;
            align-items: center;
        }

        .overview-main-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.1;
        }

        .overview-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .overview-sub-title {
            font-size: 0.76rem;
            color: #8b98a5;
            margin-top: 2px;
        }

        .passage-progress-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .passage-progress-card {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fbfdfc;
            padding: 6px 10px;
            min-width: 132px;
            cursor: pointer;
        }

        .passage-progress-card.active {
            border-color: var(--primary);
            background: #edf8f2;
        }

        .passage-progress-ring {
            --pct: 0%;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: conic-gradient(var(--primary) var(--pct), #dde7e2 0);
            flex-shrink: 0;
        }

        .passage-progress-ring::before {
            content: "";
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-surface);
            border: 1px solid #e7efeb;
        }

        .passage-progress-value {
            position: absolute;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--primary);
        }

        .passage-progress-meta {
            min-width: 0;
        }

        .passage-progress-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: #334155;
            text-transform: uppercase;
        }

        .passage-progress-count {
            font-size: 0.72rem;
            color: #6b7280;
        }

        .overview-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .overview-btn {
            border: 1px solid var(--border-color);
            background: #fff;
            color: #334155;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 0.76rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .tracker-toggle-btn {
            padding: 7px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tracker-toggle-btn img { display: block; }

        .overview-btn:hover { background: #f5f9f7; }
        .overview-btn.primary { border-color: #9ec8af; background: #ebf8f0; color: #1f745e; }

        .overview-bottom {
            margin-top: 8px;
            border-top: 1px dashed #e2ebe6;
            padding-top: 8px;
        }

        .question-type-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .question-type-chip {
            border: 1px solid #cdd8d2;
            border-radius: 999px;
            padding: 6px 10px;
            background: #f7fbf9;
            color: #334155;
            font-size: 0.74rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .question-type-chip.active {
            border-color: var(--primary);
            background: #edf8f2;
            color: var(--primary);
        }

        .part-strip-global {
            position: fixed;
            left: 20px;
            right: 20px;
            bottom: 10px;
            z-index: 25;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            padding: 8px 12px;
            padding-top: 0;
            pointer-events: none;
        }

        .resizer { width: 8px; background: transparent; cursor: col-resize; border-radius: 4px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
        .resizer:hover, .resizer:active, .resizer.resizing { background: #cbd5e1; }
        .resizer::after { content: ""; height: 40px; width: 2px; background: #94a3b8; border-radius: 2px; }

        .panel::-webkit-scrollbar { width: 8px; }
        .panel::-webkit-scrollbar-track { background: transparent; }
        .panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .panel::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Typography */
        .passage-section h2 { font-size: calc(1.25rem * var(--text-zoom)); font-weight: 700; margin-bottom: 24px; color: var(--text-main); border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }
        .passage-section p { margin-bottom: 20px; font-size: calc(0.85rem * var(--text-zoom)); line-height: 1.8; color: #334155; text-align: justify; }
        .passage-section p strong { font-size: calc(1.0rem * var(--text-zoom)); color: var(--primary); margin-right: 8px; }
        .reading-passage-card { margin-bottom: 28px; }
        .reading-passage-card:last-child { margin-bottom: 0; }
        .reading-passage-title { font-size: calc(1.25rem * var(--text-zoom)); font-weight: 700; color: var(--text-main); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--bg-body); }
        .reading-passage-content p:last-child { margin-bottom: 0; }

        /* Question Navigator */
        .question-navigator { background: var(--bg-surface); border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 30px; position: sticky; top: -10px; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .nav-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; }
        .nav-header:hover { background: var(--bg-body); border-radius: 8px 8px 0 0; }
        .question-navigator.open .nav-header { border-bottom-color: var(--border-color); }
        .nav-title-wrapper { display: flex; align-items: center; gap: 10px; }
        .nav-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-progress { font-size: 0.85rem; font-weight: 600; color: var(--primary); background: #edf8f2; padding: 2px 8px; border-radius: 12px; }
        .nav-toggle-btn { background: none; border: none; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; transition: transform 0.3s ease; pointer-events: none; }
        .question-navigator.open .nav-toggle-btn { transform: rotate(180deg); }
        .nav-content { padding: 0 20px; max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease; }
        .question-navigator.open .nav-content { padding: 15px 20px; max-height: 500px; opacity: 1; }
        
        .nav-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .nav-item { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid var(--border-color); font-weight: 600; font-size: 0.95rem; color: var(--text-main); cursor: pointer; background: var(--bg-body); transition: all 0.2s; }
        .nav-item:hover { border-color: var(--primary); }
        .nav-item.answered { background: var(--primary); color: white; border-color: var(--primary); }

        .part-strip {
            margin-top: 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            align-items: center;
            pointer-events: auto;
        }
        .part-card {
            min-width: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            padding: 2px 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 52px;
        }
        .part-card + .part-card {
            border-left: 1px solid var(--border-color);
            padding-left: 16px;
            margin-left: 4px;
        }
        .part-card:hover { opacity: 0.9; }
        .part-card.active {
            cursor: default;
            justify-content: flex-start;
            text-align: left;
        }
        .part-card.inactive {
            justify-content: center;
            text-align: center;
        }
        .part-title {
            font-family: 'Sora', sans-serif;
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
            white-space: nowrap;
        }
        .part-meta {
            color: var(--text-muted);
            font-size: 2rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .part-mini-nav {
            display: flex;
            flex-wrap: nowrap;
            gap: 2px;
            overflow-x: auto;
            padding-bottom: 2px;
        }
        .part-mini-chip {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-main);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }
        .part-mini-chip:hover { background: #edf8f2; }
        .part-mini-chip.current {
            border-color: #58a884;
            background: #edf8f2;
        }
        .part-mini-chip.answered {
            color: var(--primary);
        }

        /* Questions */
        .question-group { margin-bottom: 40px; }
        .question-group-title { font-size: calc(1.0rem * var(--text-zoom)); font-weight: 600; background: var(--bg-body); padding: 10px 15px; border-radius: 6px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
        .instruction { font-style: italic; color: var(--text-muted); margin-bottom: 20px; font-size: calc(0.95rem * var(--text-zoom)); overflow-wrap: break-word; word-break: break-word; white-space: pre-line; }
        .question-block { margin-bottom: 16px; line-height: 1.6; padding: 14px 14px 12px; border-radius: 10px; border: 1px solid #dde6e1; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.03); transition: background-color 0.5s ease; overflow-wrap: break-word; word-break: break-word; }
        .question-text-row { display: flex; align-items: flex-start; gap: 10px; }
        .question-text { font-weight: 500; margin-bottom: 12px; font-size: calc(0.85rem * var(--text-zoom)); }
        .question-text-row .question-text { flex: 1; margin-bottom: 0; }
        .question-text .question-bullet-list { margin: 8px 0; padding-left: 0; list-style: none; }
        .question-text .question-bullet-list li { margin: 4px 0; padding-left: 1.1em; position: relative; }
        .question-text .question-bullet-list li::before { content: "•"; position: absolute; left: 0; top: 0; color: currentColor; }
        .question-text ol, .question-text ul { padding-left: 1.8em; margin: 6px 0; }
        .question-text ol li, .question-text ul li { margin: 3px 0; }
        .reading-passage-content ol, .reading-passage-content ul { padding-left: 1.8em; margin: 8px 0 16px; }
        .reading-passage-content ol li, .reading-passage-content ul li { margin: 4px 0; font-size: calc(0.85rem * var(--text-zoom)); line-height: 1.8; color: #334155; }

        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .option-label { display: flex; align-items: center; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; background: var(--bg-surface); font-size: calc(0.95rem * var(--text-zoom)); }
        .option-label:hover { background: var(--bg-body); border-color: #cbd5e1; }
        .option-label input[type="radio"] { display: none; }
        .custom-radio { width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 50%; margin-right: 12px; position: relative; flex-shrink: 0; transition: all 0.2s ease; }
        .option-alpha { display: inline-flex; width: 24px; font-weight: 700; color: #334155; margin-right: 8px; flex-shrink: 0; }
        .option-label input[type="radio"]:checked + .custom-radio { border-color: var(--primary); }
        .option-label input[type="radio"]:checked + .custom-radio::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }
        .option-label:has(input[type="radio"]:checked) { border-color: var(--primary); background: #edf8f2; }

        /* Inputs */
        .short-answer-input { width: 100%; max-width: 400px; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: calc(0.95rem * var(--text-zoom)); font-family: 'Poppins', sans-serif; transition: border-color 0.2s; background: var(--bg-surface); margin-top: 10px; }
        .short-answer-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(17, 75, 58, 0.1); }
        
        .inline-input { 
            display: inline-block; min-width: 150px; padding: 4px 8px; margin: 0 5px; 
            border: none; border-bottom: 2px solid var(--border-color); border-radius: 0; 
            background: transparent; font-size: inherit; font-family: inherit; 
            text-align: center; color: var(--primary); font-weight: 600; transition: all 0.2s; 
        }
        .inline-input:focus { outline: none; border-bottom-color: var(--primary); background: #edf8f2; }

        /* Numbered fill-in-the-blank passage block */
        .fill-passage-body { line-height: 2; font-size: calc(0.85rem * var(--text-zoom)); }
        .fill-passage-body p { margin: 0.3em 0; }
        .fill-passage-body ul { list-style: disc; padding-left: 1.5em; margin: 0.2em 0; }
        .fill-passage-body li { margin: 0.2em 0; }
        .fill-passage-body strong { font-weight: 700; }
        .numbered-blank {
            display: inline-flex; align-items: center; gap: 4px; vertical-align: middle;
        }
        .blank-number {
            display: inline-flex; align-items: center; justify-content: center;
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--teal-900, #114b3a); color: #fff;
            font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
        }
        .numbered-inline-input {
            min-width: 100px; max-width: 160px;
        }

        .matching-headings-legend {
            margin-bottom: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            background: #fafdfc;
        }

        .matching-headings-legend h4 {
            margin-bottom: 8px;
            font-size: calc(1rem * var(--text-zoom));
            font-weight: 700;
        }

        .matching-headings-legend-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 8px;
            margin-bottom: 4px;
        }

        .matching-heading-label {
            font-weight: 700;
            color: var(--text-main);
            min-width: 26px;
        }

        .matching-heading-row {
            margin-bottom: 10px;
        }

        .matching-heading-row select {
            width: 100%;
            max-width: 320px;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-surface);
            font-size: calc(0.95rem * var(--text-zoom));
        }

        /* Submit */
        .submit-area { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .submit-btn { background-color: var(--primary); color: white; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: background-color 0.2s ease; }
        .submit-btn:hover { background-color: var(--primary-hover); }
        .submit-btn:disabled { background-color: var(--text-muted); cursor: not-allowed; }
        #result { margin-top: 20px; padding: 16px; border-radius: 8px; font-weight: 600; font-size: 1.1rem; text-align: center; display: none; }
        .result-good { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .result-bad { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 16px 12px 16px; }
            .passage-section, .question-section { width: 100% !important; flex: none; }
            .panel { max-height: calc(100vh - 188px); }
            .resizer { display: none; }
            .question-navigator { top: 0; }
            .part-strip-global { left: 12px; right: 12px; bottom: 8px; }
            .part-strip { grid-template-columns: 1fr; gap: 8px; }
            .part-card + .part-card { border-left: none; padding-left: 4px; margin-left: 0; border-top: 1px solid var(--border-color); padding-top: 10px; }
            .part-title { font-size: 1.2rem; }
            .part-meta { font-size: 1rem; }
            .part-mini-chip { width: 30px; height: 30px; font-size: 0.95rem; }
            .overview-top { grid-template-columns: 1fr; align-items: stretch; }
            .overview-actions { justify-content: flex-start; }
        }
    </style>
</head>
<body>


    <section class="reading-overview" id="readingOverview">
        <div class="overview-top">
            <div>
                <div class="overview-title-row">
                    <div class="overview-main-title" id="display-title">Reading Test</div>
                    <div class="text-controls" title="Adjust Text Size">
                        <button class="text-btn" onclick="adjustTextSize(-0.1)">A</button>
                        <button class="text-btn" onclick="adjustTextSize(+0.1)">A+</button>
                    </div>
                </div>
                <div class="overview-sub-title" id="overviewDate">-</div>
            </div>

            <div class="passage-progress-strip" id="passageProgressStrip"></div>

            <div class="overview-actions">
                <button id="backToDeveloperBtn" class="back-dev-btn" type="button" onclick="goBackToDeveloper()">Back</button>
                <div class="timer-container">
                    <span>Time left:</span>
                    <span id="timer">60:00</span>
                </div>
                <button type="button" class="overview-btn tracker-toggle-btn" id="toggleTypeTrackerBtn"><img src="asset/icon/closed-hide-tracker.png" alt="Hide Tracker" id="trackerToggleIcon" style="width:16px;height:16px;"></button>
                <button type="button" class="overview-btn" id="prevPassageBtn">← Home</button>
                <button type="button" class="overview-btn" id="nextPassageBtn">Passage 2 →</button>
            </div>
        </div>
        <div class="overview-bottom" id="overviewBottom">
            <div class="question-type-strip" id="questionTypeStrip"></div>
        </div>
    </section>

    <div class="container">
        <div class="panel passage-section" id="leftPanel">
            <h2 id="display-passage-title">Passage Title</h2>
            <div id="display-passage-content"></div>
        </div>

        <div class="resizer" id="dragMe"></div>

        <div class="panel question-section" id="rightPanel">
            <form id="ieltsForm">
                <div id="dynamic-questions-container"></div>

                <div class="submit-area">
                    <button type="button" class="submit-btn" id="submitBtn" onclick="submitTest()">Submit Answers</button>
                    <button type="button" class="submit-btn" id="continueBtn" onclick="goToNextModule()" style="display: none; margin-top: 10px;">Continue To Writing</button>
                    <div id="result"></div>
                </div>
            </form>
        </div>

        <!-- Removed old tracker below, now handled in header -->
        <style>
            .header-center {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
            }
            .header-tracker {
                display: flex;
                gap: 18px;
                align-items: flex-end;
                position: relative;
                z-index: 30;
            }
            .tracker-part-box {
                background: var(--bg-surface);
                border: 2px solid var(--border-color);
                border-radius: 16px 16px 10px 10px;
