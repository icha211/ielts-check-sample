<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Speaking Set | IELTS Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f8f5;--surface:#fff;--text:#182621;--muted:#5a6d66;--teal:#114b3a;--teal2:#1f745e;--border:#d8e4de;--radius:14px;--shadow:0 14px 32px rgba(17,75,58,.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Poppins,sans-serif;color:var(--text);background:radial-gradient(circle at 5% 0%,rgba(76,163,255,.12),transparent 34%),radial-gradient(circle at 95% 5%,rgba(17,75,58,.12),transparent 30%),var(--bg)}
    h1,h2,h3{font-family:Sora,sans-serif;letter-spacing:-.01em}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 16px 36px;display:grid;gap:14px}
    .topbar,.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:16px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(140deg,#fff,#edf8f2)}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:36px;height:36px;border:1px solid var(--border);border-radius:11px;padding:4px;object-fit:contain;background:#fff}.brand p{color:var(--muted);font-size:.85rem;margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:10px;padding:10px 13px;font-size:.84rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .2s ease}
    .btn:hover{transform:translateY(-2px)} .btn-main{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}.btn-alt{background:#fff;color:var(--teal);border:1px solid var(--border)}
    .field{margin-bottom:10px}.field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:Poppins,sans-serif;font-size:.9rem;background:#fff}
    .field textarea{min-height:95px;resize:vertical}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .settings-box{border:1px solid #cfe1f7;border-radius:var(--radius);background:linear-gradient(180deg,#f4f9ff,#eef6ff);padding:12px;margin-bottom:12px}
    .settings-box h3{color:#1f4f95}
    .part-box{border:1px solid #d7e7da;border-radius:var(--radius);background:linear-gradient(180deg,#f8fff9,#f2fbf4);padding:12px;margin-bottom:10px}
    .part-box h4{color:var(--teal);margin-bottom:8px}
    .footer{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .toast{position:fixed;right:12px;bottom:12px;background:#123e32;color:#fff;border-radius:10px;padding:10px 14px;font-size:.83rem;display:none;z-index:20}
    @media (max-width:900px){.row2,.footer{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <section class="topbar">
    <div class="brand"><img src="logo.png" alt="IELTS Check logo"><div><h1>Create Speaking Problem Set</h1><p>Create page only. User view is separate in speaking test page.</p></div></div>
    <div class="actions">
      <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
      <a class="btn btn-alt" href="developer-edit-speaking.html">Open Edit Page</a>
      <a class="btn btn-alt" href="speaking-test.html?returnTo=developer-create-speaking.html" target="_blank">Open Real User View</a>
      <button class="btn btn-main" type="button" id="saveTop">Save Speaking Set</button>
    </div>
  </section>

  <section class="panel">
    <div class="settings-box">
      <h3 style="margin-bottom:10px;">Speaking Set Information</h3>
      <div class="row2">
        <div class="field"><label>Set Title</label><input type="text" id="setTitle" placeholder="IELTS Academic Speaking"></div>
        <div class="field"><label>Set Date</label><input type="date" id="setDate"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Difficulty</label><select id="difficultyLevel"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div>
        <div class="field"><label>Level</label><select id="setLevel"><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select></div>
      </div>
    </div>

    <div class="part-box">
      <h4>Part 1: Introduction & Interview</h4>
      <div class="field"><label>Description</label><textarea id="p1Desc"></textarea></div>
      <div class="field"><label>Questions (one per line)</label><textarea id="p1Questions"></textarea></div>
    </div>

    <div class="part-box">
      <h4>Part 2: Long Turn (Cue Card)</h4>
      <div class="field"><label>Description</label><textarea id="p2Desc"></textarea></div>
      <div class="field"><label>Cue Prompt</label><textarea id="p2Prompt"></textarea></div>
      <div class="field"><label>Cue Points (one per line)</label><textarea id="p2Points"></textarea></div>
    </div>

    <div class="part-box">
      <h4>Part 3: Discussion</h4>
      <div class="field"><label>Description</label><textarea id="p3Desc"></textarea></div>
      <div class="field"><label>Questions (one per line)</label><textarea id="p3Questions"></textarea></div>
    </div>

    <div class="footer">
      <button class="btn btn-main" type="button" id="saveBottom">Save Speaking Set</button>
      <button class="btn btn-alt" type="button" id="resetBtn">Reset Draft</button>
    </div>
  </section>
</main>
<div class="toast" id="toast"></div>

<script src="storage-sync.js"></script>
<script>
const STORAGE_KEY = "prephaven_problems_speaking_v1";
function toast(m){const b=document.getElementById("toast");b.textContent=m;b.style.display="block";setTimeout(()=>b.style.display="none",2200);} 
function readProblems(){return [];}
async function writeProblems(v){await storageSync.saveProblemsByModule("speaking",v).catch(err=>{console.error("Error saving problems:",err);});}
function setDefaultDate(){document.getElementById("setDate").value=new Date().toISOString().split("T")[0];}
function setInitialDate(){const params=new URLSearchParams(window.location.search);const incoming=params.get("date");const value=incoming&&/^\d{4}-\d{2}-\d{2}$/.test(incoming)?incoming:new Date().toISOString().split("T")[0];document.getElementById("setDate").value=value;}
function toLines(text){return String(text||"").split(/\n+/).map((v)=>v.trim()).filter(Boolean);} 

async function save(){
  const title=document.getElementById("setTitle").value.trim();
  const scheduledDate=document.getElementById("setDate").value;
  const difficulty=document.getElementById("difficultyLevel").value;
  const level=Number(document.getElementById("setLevel").value||1);
  const p1Desc=document.getElementById("p1Desc").value.trim();
  const p1Questions=toLines(document.getElementById("p1Questions").value);
  const p2Desc=document.getElementById("p2Desc").value.trim();
  const p2Prompt=document.getElementById("p2Prompt").value.trim();
  const p2Points=toLines(document.getElementById("p2Points").value);
  const p3Desc=document.getElementById("p3Desc").value.trim();
  const p3Questions=toLines(document.getElementById("p3Questions").value);

  if(!title||!scheduledDate||!p1Questions.length||!p2Prompt||!p2Points.length||!p3Questions.length){toast("Fill title/date and all speaking parts");return;}

  const problem = {
    moduleId:"speaking", icon:"🗣️", moduleName:"Speaking", title, difficulty, level, scheduledDate,
    parts:[
      { partNumber:1, title:"Part 1: Introduction & Interview", duration:"4-5 minutes", description:p1Desc||"The examiner asks general questions about familiar topics.", questions:p1Questions },
      { partNumber:2, title:"Part 2: Long Turn (Cue Card)", duration:"3-4 minutes", description:p2Desc||"You receive a cue card and have 1 minute to prepare, then speak for 2 minutes.", cueCard:{ prompt:p2Prompt, points:p2Points } },
      { partNumber:3, title:"Part 3: Discussion", duration:"4-5 minutes", description:p3Desc||"The examiner asks follow-up questions related to Part 2.", questions:p3Questions }
    ],
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), id:`problem_${Date.now()}`
  };

  await storageSync.addProblem("speaking",problem);toast("Speaking set saved");
}

function reset(){document.getElementById("setTitle").value="";document.getElementById("difficultyLevel").value="beginner";document.getElementById("setLevel").value="1";document.getElementById("p1Desc").value="";document.getElementById("p1Questions").value="";document.getElementById("p2Desc").value="";document.getElementById("p2Prompt").value="";document.getElementById("p2Points").value="";document.getElementById("p3Desc").value="";document.getElementById("p3Questions").value="";setDefaultDate();}

document.getElementById("saveTop").addEventListener("click",save);
document.getElementById("saveBottom").addEventListener("click",save);
document.getElementById("resetBtn").addEventListener("click",reset);
setInitialDate();
</script>
</body>
</html>
