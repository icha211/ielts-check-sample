<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Speaking Set | IELTS Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3f8f5;--surface:#fff;--text:#182621;--muted:#5a6d66;--teal:#114b3a;--teal2:#1f745e;--border:#d8e4de;--radius:14px;--shadow:0 14px 32px rgba(17,75,58,.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Poppins,sans-serif;color:var(--text);background:radial-gradient(circle at 5% 0%,rgba(76,163,255,.12),transparent 34%),radial-gradient(circle at 95% 5%,rgba(17,75,58,.12),transparent 30%),var(--bg)}
    h1,h2,h3{font-family:Sora,sans-serif;letter-spacing:-.01em}
    .wrap{max-width:1120px;margin:0 auto;padding:22px 16px 36px;display:grid;gap:14px}
    .topbar,.panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:16px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(140deg,#fff,#edf8f2)}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:36px;height:36px;border:1px solid var(--border);border-radius:11px;padding:4px;object-fit:contain;background:#fff}.brand p{color:var(--muted);font-size:.85rem;margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;border-radius:10px;padding:10px 13px;font-size:.84rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .2s ease}
    .btn:hover{transform:translateY(-2px)} .btn-main{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}.btn-alt{background:#fff;color:var(--teal);border:1px solid var(--border)}
    .field{margin-bottom:10px}.field label{display:block;font-size:.84rem;font-weight:700;margin-bottom:6px}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:Poppins,sans-serif;font-size:.9rem;background:#fff}
    .field textarea{min-height:95px;resize:vertical}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .settings-box{border:1px solid #cfe1f7;border-radius:var(--radius);background:linear-gradient(180deg,#f4f9ff,#eef6ff);padding:12px;margin-bottom:12px}
    .settings-box h3{color:#1f4f95}
    .part-box{border:1px solid #d7e7da;border-radius:var(--radius);background:linear-gradient(180deg,#f8fff9,#f2fbf4);padding:12px;margin-bottom:10px}
    .part-box h4{color:var(--teal);margin-bottom:8px}
    .footer{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .toast{position:fixed;right:12px;bottom:12px;background:#123e32;color:#fff;border-radius:10px;padding:10px 14px;font-size:.83rem;display:none;z-index:20}
    .rich-editor-toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:#f9fafb;border:1px solid var(--border);border-bottom:none;border-radius:14px 14px 0 0;align-items:center}
    .toolbar-group{display:flex;gap:4px;border-right:1px solid var(--border);padding-right:6px}
    .toolbar-group:last-child{border-right:none}
    .toolbar-btn{width:32px;height:32px;padding:0;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .toolbar-btn:hover{background:#f0f4f2;border-color:#8b5c00}
    .toolbar-btn.active{background:#8b5c00;color:#fff;border-color:#8b5c00}
    .toolbar-select,.toolbar-color{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:#fff;cursor:pointer}
    .rich-editor-content{min-height:80px;padding:12px;border:1px solid var(--border);border-radius:0 0 14px 14px;background:#fff;font-family:Poppins,sans-serif;font-size:.9rem;line-height:1.5;outline:none;overflow-y:auto}
    .rich-editor-content:focus{border-color:#8b5c00;box-shadow:0 0 0 3px rgba(139,92,0,.1)}
    .spacing-control{display:flex;align-items:center;gap:8px;font-size:.85rem}
    .spacing-control input[type="range"]{width:80px;height:4px;cursor:pointer}
    .spacing-control input[type="number"]{width:45px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.8rem}
    @media (max-width:900px){.row2,.footer{grid-template-columns:1fr}.rich-editor-toolbar{flex-direction:column;align-items:flex-start}.toolbar-group{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:6px;margin-bottom:6px;width:100%}}
  </style>
</head>
<body>
<main class="wrap">
  <section class="topbar">
    <div class="brand"><img src="logo.png" alt="IELTS Check logo"><div><h1>Create Speaking Problem Set</h1><p>Create page only. User view is separate in speaking test page.</p></div></div>
    <div class="actions">
      <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
      <a class="btn btn-alt" href="developer-edit-speaking.html">Open Edit Page</a>
      <a class="btn btn-alt" href="speaking-test.html?returnTo=developer-create-speaking.html" target="_blank">Open Real User View</a>
      <button class="btn btn-main" type="button" id="saveTop">Save Speaking Set</button>
    </div>
  </section>

  <section class="panel">
    <div class="settings-box">
      <h3 style="margin-bottom:10px;">Speaking Set Information</h3>
      <div class="row2">
        <div class="field"><label>Set Title</label><input type="text" id="setTitle" placeholder="IELTS Academic Speaking"></div>
        <div class="field"><label>Set Date</label><input type="date" id="setDate"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Difficulty</label><select id="difficultyLevel"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div>
        <div class="field"><label>Level</label><select id="setLevel"><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select></div>
      </div>
    </div>

    <div class="part-box">
      <h4>Part 1: Introduction & Interview</h4>
      <div class="field"><label>Description</label><div id="p1DescEditor"></div><input type="hidden" id="p1Desc"></div>
      <div class="field"><label>Questions (one per line)</label><textarea id="p1Questions"></textarea></div>
    </div>

    <div class="part-box">
      <h4>Part 2: Long Turn (Cue Card)</h4>
      <div class="field"><label>Description</label><div id="p2DescEditor"></div><input type="hidden" id="p2Desc"></div>
      <div class="field"><label>Cue Prompt</label><div id="p2PromptEditor"></div><input type="hidden" id="p2Prompt"></div>
      <div class="field"><label>Cue Points (one per line)</label><textarea id="p2Points"></textarea></div>
    </div>

    <div class="part-box">
      <h4>Part 3: Discussion</h4>
      <div class="field"><label>Description</label><div id="p3DescEditor"></div><input type="hidden" id="p3Desc"></div>
      <div class="field"><label>Questions (one per line)</label><textarea id="p3Questions"></textarea></div>
    </div>

    <div class="footer">
      <button class="btn btn-main" type="button" id="saveBottom">Save Speaking Set</button>
      <button class="btn btn-alt" type="button" id="resetBtn">Reset Draft</button>
    </div>
  </section>
</main>
<div class="toast" id="toast"></div>

<script src="storage-sync.js"></script>
<script>
const STORAGE_KEY = "prephaven_problems_speaking_v1";
function execCommand(cmd, value = null) { document.execCommand(cmd, false, value); }
function updateToolbarState(editor) { const toolbar = editor.previousElementSibling; if (!toolbar || !toolbar.classList.contains("rich-editor-toolbar")) return; const btnStates = { bold: document.queryCommandState("bold"), italic: document.queryCommandState("italic"), underline: document.queryCommandState("underline") }; ["bold", "italic", "underline"].forEach(cmd => { const btn = toolbar.querySelector(`[data-cmd="${cmd}"]`); if (btn) btn.classList.toggle("active", btnStates[cmd]); }); }
function createRichEditorMarkup(editorId, placeholder = "") { return `<div class="rich-editor-toolbar" id="${editorId}Toolbar"><div class="toolbar-group"><button type="button" class="toolbar-btn" data-cmd="bold" title="Bold"><strong>B</strong></button><button type="button" class="toolbar-btn" data-cmd="italic" title="Italic"><em>I</em></button><button type="button" class="toolbar-btn" data-cmd="underline" title="Underline"><u>U</u></button></div><div class="toolbar-group"><button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h1" title="Heading 1">H1</button><button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h2" title="Heading 2">H2</button><button type="button" class="toolbar-btn" data-cmd="formatBlock" data-value="h3" title="Heading 3">H3</button><select class="toolbar-select" id="${editorId}FontSize" title="Font Size"><option value="">Normal</option><option value="1">12px</option><option value="2">14px</option><option value="3">18px</option><option value="4">24px</option><option value="5">32px</option></select></div><div class="toolbar-group"><input type="color" class="toolbar-color" id="${editorId}TextColor" title="Text Color" value="#000000"><input type="color" class="toolbar-color" id="${editorId}BgColor" title="Highlight Color" value="#FFFF00"></div><div class="toolbar-group"><button type="button" class="toolbar-btn" data-cmd="justifyLeft" title="Align Left">?</button><button type="button" class="toolbar-btn" data-cmd="justifyCenter" title="Align Center">?</button><button type="button" class="toolbar-btn" data-cmd="justifyRight" title="Align Right">?</button><button type="button" class="toolbar-btn" data-cmd="justifyFull" title="Justify">=</button></div><div class="toolbar-group spacing-control"><label>Letter:</label><input type="range" id="${editorId}LetterSpace" min="-2" max="10" step="0.5" value="0"><input type="number" id="${editorId}LetterSpaceNum" min="-2" max="10" step="0.5" value="0"><label style="margin-left:12px;">Line:</label><input type="range" id="${editorId}LineSpace" min="1" max="3" step="0.1" value="1.5"><input type="number" id="${editorId}LineSpaceNum" min="1" max="3" step="0.1" value="1.5"></div></div><div contenteditable="true" class="rich-editor-content" id="${editorId}Content" placeholder="${placeholder}"></div><input type="hidden" id="${editorId}" value="">`; }
function bindRichEditorToolbar(editorId) { const toolbar = document.getElementById(editorId + "Toolbar"); const editor = document.getElementById(editorId + "Content"); if (!toolbar || !editor) return; toolbar.querySelectorAll("[data-cmd]").forEach(btn => { btn.addEventListener("click", (e) => { e.preventDefault(); const cmd = btn.dataset.cmd; const value = btn.dataset.value || null; execCommand(cmd, value); editor.focus(); updateToolbarState(editor); }); }); const fontSizeSelect = document.getElementById(editorId + "FontSize"); fontSizeSelect?.addEventListener("change", (e) => { if (e.target.value) execCommand("fontSize", e.target.value); editor.focus(); }); document.getElementById(editorId + "TextColor")?.addEventListener("change", (e) => { execCommand("foreColor", e.target.value); editor.focus(); }); document.getElementById(editorId + "BgColor")?.addEventListener("change", (e) => { execCommand("backColor", e.target.value); editor.focus(); }); const letterSpaceRange = document.getElementById(editorId + "LetterSpace"); const letterSpaceNum = document.getElementById(editorId + "LetterSpaceNum"); if (letterSpaceRange && letterSpaceNum) { const updateLetterSpace = (val) => { editor.style.letterSpacing = val + "px"; letterSpaceRange.value = val; letterSpaceNum.value = val; }; letterSpaceRange.addEventListener("input", (e) => updateLetterSpace(e.target.value)); letterSpaceNum.addEventListener("input", (e) => updateLetterSpace(e.target.value)); } const lineSpaceRange = document.getElementById(editorId + "LineSpace"); const lineSpaceNum = document.getElementById(editorId + "LineSpaceNum"); if (lineSpaceRange && lineSpaceNum) { const updateLineSpace = (val) => { editor.style.lineHeight = val; lineSpaceRange.value = val; lineSpaceNum.value = val; }; lineSpaceRange.addEventListener("input", (e) => updateLineSpace(e.target.value)); lineSpaceNum.addEventListener("input", (e) => updateLineSpace(e.target.value)); } editor.addEventListener("blur", () => { const hiddenInput = document.getElementById(editorId); if (hiddenInput) hiddenInput.value = editor.innerHTML; }); editor.addEventListener("input", () => { const hiddenInput = document.getElementById(editorId); if (hiddenInput) hiddenInput.value = editor.innerHTML; }); }
function toast(m){const b=document.getElementById("toast");b.textContent=m;b.style.display="block";setTimeout(()=>b.style.display="none",2200);} 
function readProblems(){return [];}
async function writeProblems(v){await storageSync.saveProblemsByModule("speaking",v).catch(err=>{console.error("Error saving problems:",err);});}
function setDefaultDate(){document.getElementById("setDate").value=new Date().toISOString().split("T")[0];}
function setInitialDate(){const params=new URLSearchParams(window.location.search);const incoming=params.get("date");const value=incoming&&/^\d{4}-\d{2}-\d{2}$/.test(incoming)?incoming:new Date().toISOString().split("T")[0];document.getElementById("setDate").value=value;}
function toLines(text){return String(text||"").split(/\n+/).map((v)=>v.trim()).filter(Boolean);} 

async function save(){
  const title=document.getElementById("setTitle").value.trim();
  const scheduledDate=document.getElementById("setDate").value;
  const difficulty=document.getElementById("difficultyLevel").value;
  const level=Number(document.getElementById("setLevel").value||1);
  const p1Desc=document.getElementById("p1Desc").value;
  const p1Questions=toLines(document.getElementById("p1Questions").value);
  const p2Desc=document.getElementById("p2Desc").value;
  const p2Prompt=document.getElementById("p2Prompt").value;
  const p2Points=toLines(document.getElementById("p2Points").value);
  const p3Desc=document.getElementById("p3Desc").value;
  const p3Questions=toLines(document.getElementById("p3Questions").value);

  if(!title||!scheduledDate||!p1Questions.length||!p2Prompt||!p2Points.length||!p3Questions.length){toast("Fill title/date and all speaking parts");return;}

  const problem = {
    moduleId:"speaking", icon:"🗣️", moduleName:"Speaking", title, difficulty, level, scheduledDate,
    parts:[
      { partNumber:1, title:"Part 1: Introduction & Interview", duration:"4-5 minutes", description:p1Desc||"The examiner asks general questions about familiar topics.", questions:p1Questions },
      { partNumber:2, title:"Part 2: Long Turn (Cue Card)", duration:"3-4 minutes", description:p2Desc||"You receive a cue card and have 1 minute to prepare, then speak for 2 minutes.", cueCard:{ prompt:p2Prompt, points:p2Points } },
      { partNumber:3, title:"Part 3: Discussion", duration:"4-5 minutes", description:p3Desc||"The examiner asks follow-up questions related to Part 2.", questions:p3Questions }
    ],
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), id:`problem_${Date.now()}`
  };

  await storageSync.addProblem("speaking",problem);toast("Speaking set saved");
}

function reset(){document.getElementById("setTitle").value="";document.getElementById("difficultyLevel").value="beginner";document.getElementById("setLevel").value="1";document.getElementById("p1Desc").value=""; document.getElementById("p1DescContent").innerHTML="";document.getElementById("p1Questions").value="";document.getElementById("p2Desc").value=""; document.getElementById("p2DescContent").innerHTML="";document.getElementById("p2Prompt").value=""; document.getElementById("p2PromptContent").innerHTML="";document.getElementById("p2Points").value="";document.getElementById("p3Desc").value=""; document.getElementById("p3DescContent").innerHTML="";document.getElementById("p3Questions").value="";setDefaultDate();}

document.getElementById("saveTop").addEventListener("click",save);
document.getElementById("saveBottom").addEventListener("click",save);
document.getElementById("resetBtn").addEventListener("click",reset);
document.getElementById("p1DescEditor").innerHTML = createRichEditorMarkup("p1Desc", "Part 1 description"); bindRichEditorToolbar("p1Desc");
document.getElementById("p2DescEditor").innerHTML = createRichEditorMarkup("p2Desc", "Part 2 description"); bindRichEditorToolbar("p2Desc");
document.getElementById("p2PromptEditor").innerHTML = createRichEditorMarkup("p2Prompt", "Cue card prompt (HTML allowed)"); bindRichEditorToolbar("p2Prompt");
document.getElementById("p3DescEditor").innerHTML = createRichEditorMarkup("p3Desc", "Part 3 description"); bindRichEditorToolbar("p3Desc");
setInitialDate();
</script>
</body>
</html>
