<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Reading Set | IELTS Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f8f5;
            --surface: #ffffff;
            --text: #182621;
            --muted: #5a6d66;
            --teal-900: #114b3a;
            --teal-700: #1f745e;
            --border: #d8e4de;
            --danger: #c44444;
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow: 0 14px 32px rgba(17, 75, 58, 0.09);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 5% 0%, rgba(76, 163, 255, 0.12), transparent 34%),
                radial-gradient(circle at 95% 5%, rgba(17, 75, 58, 0.12), transparent 30%),
                var(--bg);
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: "Sora", sans-serif; letter-spacing: -0.01em; }

        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 22px 16px 36px;
            display: grid;
            gap: 14px;
        }

        .topbar {
            background: linear-gradient(140deg, #ffffff, #edf8f2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .brand { display: flex; align-items: center; gap: 10px; }

        .brand img {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 4px;
            object-fit: contain;
            background: #fff;
        }

        .brand p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

        .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 13px;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn-main { background: linear-gradient(135deg, var(--teal-900), var(--teal-700)); color: #fff; }
        .btn-alt { background: #fff; color: var(--teal-900); border: 1px solid var(--border); }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 16px;
        }

        .settings-box {
            border: 1px solid #cfe1f7;
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #f4f9ff, #eef6ff);
            padding: 12px;
            margin-bottom: 12px;
        }

        .settings-box h3 {
            color: #1f4f95;
        }

        .questions-box {
            border: 1px solid #d7e7da;
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #f8fff9, #f2fbf4);
            padding: 12px;
        }

        .questions-box h3 {
            color: var(--teal-900);
        }

        .row2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .field { margin-bottom: 10px; }

        .field label {
            display: block;
            font-size: 0.84rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-family: "Poppins", sans-serif;
            font-size: 0.9rem;
            background: #fff;
        }

        .field textarea { min-height: 110px; resize: vertical; }
        .helper { color: var(--muted); font-size: 0.78rem; margin-top: 4px; }

        .group-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #fff, #f8fcfa);
            padding: 12px;
            margin-bottom: 10px;
        }

        .group-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.72rem;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: 700;
            background: rgba(17, 75, 58, 0.1);
            color: var(--teal-900);
        }

        .question-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
            padding: 10px;
            margin-bottom: 10px;
        }

        .question-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .option-item {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
        }

        .option-item strong {
            font-size: 0.78rem;
            color: var(--muted);
            min-width: 18px;
        }

        .answer-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .answer-choice {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            background: #fff;
            user-select: none;
        }

        .answer-choice.active {
            border-color: var(--teal-900);
            background: rgba(17, 75, 58, 0.12);
            color: var(--teal-900);
            font-weight: 700;
        }

        .inline-btn {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 10px;
            padding: 7px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
        }

        .inline-btn.danger { color: var(--danger); border-color: #ffd1d1; background: #fff5f5; }

        .sticky-actions {
            position: sticky;
            bottom: 10px;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(9px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .toast {
            position: fixed;
            right: 12px;
            bottom: 12px;
            background: #123e32;
            color: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.83rem;
            display: none;
            z-index: 20;
        }

        @media (max-width: 900px) {
            .row2 { grid-template-columns: 1fr; }
            .sticky-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="topbar">
            <div class="brand">
                <img src="logo.png" alt="IELTS Check logo">
                <div>
                    <h1>Create Reading Problem Set</h1>
                    <p>Create page only. User view is fully separate in reading test page with real UI.</p>
                </div>
            </div>
            <div class="actions">
                <a class="btn btn-alt" href="developer.html">Back Dashboard</a>
                <a class="btn btn-alt" href="developer-edit.html">Open Edit Page</a>
                <a class="btn btn-alt" href="reading-test.html?returnTo=developer-create.html" target="_blank">Open Real User View</a>
                <button class="btn btn-main" type="button" id="saveTop">Save Reading Set</button>
            </div>
        </section>

        <section class="panel">
            <div class="settings-box">
                <h3 style="margin-bottom: 10px;">Reading Set Information</h3>

                <div class="row2">
                    <div class="field">
                        <label>Set Title</label>
                        <input type="text" id="setTitle" placeholder="IELTS Academic Reading">
                    </div>
                    <div class="field">
                        <label>Set Date</label>
                        <input type="date" id="setDate">
                    </div>
                </div>

                <div class="row2">
                    <div class="field">
                        <label>Difficulty</label>
                        <select id="difficultyLevel">
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Level</label>
                        <select id="setLevel">
                            <option value="1">Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label>Passage Title</label>
                    <input type="text" id="passageTitle" placeholder="The History of the Bicycle">
                </div>

                <div class="field">
                    <label>Passage Content</label>
                    <textarea id="passageContent" placeholder="Paste full reading passage..."></textarea>
                </div>
            </div>

            <div class="questions-box">
                <h3 style="margin-bottom: 10px;">Question Groups</h3>
                <div id="groupsContainer"></div>
                <button type="button" class="inline-btn" id="addGroupBtn">+ Add Group</button>
            </div>

            <div class="sticky-actions">
                <button class="btn btn-main" type="button" id="saveBottom">Save Reading Set</button>
                <button class="btn btn-alt" type="button" id="resetBtn">Reset Draft</button>
            </div>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script src="storage-sync.js"></script>
    <script>
        const STORAGE_KEY = "prephaven_problems_v1";
        const QUESTION_TYPE_CONFIG = {
            "multiple-choice": { mode: "radio", options: ["A", "B", "C", "D"], locked: false, label: "Multiple Choice (A/B/C/...)" },
            "true-false-not-given": { mode: "radio", options: ["True", "False", "Not Given"], locked: true, label: "True / False / Not Given" },
            "yes-no-not-given": { mode: "radio", options: ["Yes", "No", "Not Given"], locked: true, label: "Yes / No / Not Given" },
            "short-answer": { mode: "text", options: [], locked: true, label: "Short Answer" },
            "fill-in-the-blank": { mode: "blank", options: [], locked: true, label: "Fill in the Blank" },
            "sentence-completion": { mode: "text", options: [], locked: true, label: "Sentence Completion" }
        };

        let draft = {
            moduleId: "reading",
            icon: "📖",
            moduleName: "Reading",
            title: "",
            difficulty: "beginner",
            level: 1,
            scheduledDate: "",
            passageTitle: "",
            passageContent: "",
            questionGroups: []
        };

        function toast(message) {
            const box = document.getElementById("toast");
            box.textContent = message;
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 2200);
        }

        function readProblems() {
            // This will be replaced by async version
            return [];
        }

        async function writeProblems(list) {
            await storageSync.saveProblemsByModule("reading", list).catch(err => {
                console.error("Error saving problems:", err);
            });
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split("T")[0];
            draft.scheduledDate = today;
            document.getElementById("setDate").value = today;
        }

        function setInitialDate() {
            const params = new URLSearchParams(window.location.search);
            const incoming = params.get("date");
            const value = incoming && /^\d{4}-\d{2}-\d{2}$/.test(incoming) ? incoming : new Date().toISOString().split("T")[0];
            draft.scheduledDate = value;
            document.getElementById("setDate").value = value;
        }

        function newQuestion(type) {
            const conf = QUESTION_TYPE_CONFIG[type];
            return {
                type,
                text: "",
                options: [...conf.options],
                answer: "",
                uiMode: conf.mode
            };
        }

        function newGroup() {
            return {
                title: `Questions ${draft.questionGroups.length + 1}`,
                instruction: "",
                questions: [newQuestion("multiple-choice")]
            };
        }

        function ensureAtLeastOneGroup() {
            if (draft.questionGroups.length === 0) {
                draft.questionGroups.push(newGroup());
            }
        }

        function renderGroups() {
            const host = document.getElementById("groupsContainer");
            host.innerHTML = "";

            draft.questionGroups.forEach((group, gIdx) => {
                const groupEl = document.createElement("section");
                groupEl.className = "group-card";
                groupEl.innerHTML = `
                    <div class="group-head">
                        <span class="badge">Group ${gIdx + 1}</span>
                        <button type="button" class="inline-btn danger" onclick="removeGroup(${gIdx})">Delete Group</button>
                    </div>
                    <div class="field">
                        <label>Group Title</label>
                        <input type="text" value="${escapeHtml(group.title)}" onchange="updateGroup(${gIdx}, 'title', this.value)">
                    </div>
                    <div class="field">
                        <label>Instruction</label>
                        <textarea onchange="updateGroup(${gIdx}, 'instruction', this.value)">${escapeHtml(group.instruction || "")}</textarea>
                    </div>
                    <div id="questions_${gIdx}"></div>
                    <button type="button" class="inline-btn" onclick="addQuestion(${gIdx})">+ Add Question</button>
                `;
                host.appendChild(groupEl);

                renderQuestions(gIdx);
            });
        }

        function renderQuestions(gIdx) {
            const host = document.getElementById(`questions_${gIdx}`);
            const group = draft.questionGroups[gIdx];
            if (!host || !group) return;

            host.innerHTML = "";

            group.questions.forEach((q, qIdx) => {
                const conf = QUESTION_TYPE_CONFIG[q.type];
                const card = document.createElement("article");
                card.className = "question-card";

                const typeOptions = Object.entries(QUESTION_TYPE_CONFIG)
                    .map(([key, value]) => `<option value="${key}" ${key === q.type ? "selected" : ""}>${value.label}</option>`)
                    .join("");

                let optionsSection = "";
                let answerSection = "";

                if (conf.mode === "radio") {
                    const items = q.options.map((opt, idx) => {
                        const disabled = conf.locked ? "readonly" : "";
                        const marker = conf.locked ? "" : String.fromCharCode(65 + idx);
                        return `
                            <div class="option-item">
                                <strong>${marker}</strong>
                                <input type="text" value="${escapeHtml(opt)}" ${disabled} onchange="updateOption(${gIdx}, ${qIdx}, ${idx}, this.value)">
                            </div>
                        `;
                    }).join("");

                    optionsSection = `
                        <div class="field">
                            <label>Options</label>
                            ${items}
                            ${conf.locked ? "" : `<button type="button" class="inline-btn" onclick="addOption(${gIdx}, ${qIdx})">+ Add Option</button>`}
                            <div class="helper">Correct answer can be selected by clicking one option chip below.</div>
                        </div>
                    `;

                    const answerChips = q.options.map((opt) => {
                        const active = q.answer === opt ? "active" : "";
                        return `<span class="answer-choice ${active}" onclick="pickAnswer(${gIdx}, ${qIdx}, '${escapeJs(opt)}')">${escapeHtml(opt)}</span>`;
                    }).join("");

                    answerSection = `<div class="field"><label>Correct Answer</label><div class="answer-options">${answerChips}</div></div>`;
                } else if (conf.mode === "blank") {
                    const textId = `question_text_${gIdx}_${qIdx}`;
                    answerSection = `
                        <div class="field">
                            <label>Correct Answer</label>
                            <input type="text" value="${escapeHtml(q.answer)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'answer', this.value)">
                            <div class="helper">Select a word in the question text and click Mark Selected Answer.</div>
                            <div class="inline-actions">
                                <button type="button" class="inline-btn" onclick="markSelectedBlank(${gIdx}, ${qIdx})">Mark Selected Answer</button>
                                <button type="button" class="inline-btn" onclick="clearBlankMark(${gIdx}, ${qIdx})">Clear Mark</button>
                            </div>
                        </div>
                    `;
                    card.innerHTML = `
                        <div class="question-head">
                            <span class="badge">Question ${qIdx + 1}</span>
                            <button type="button" class="inline-btn danger" onclick="removeQuestion(${gIdx}, ${qIdx})">Delete Question</button>
                        </div>
                        <div class="field">
                            <label>Question Type</label>
                            <select onchange="changeQuestionType(${gIdx}, ${qIdx}, this.value)">${typeOptions}</select>
                        </div>
                        <div class="field">
                            <label>Question Text</label>
                            <input id="${textId}" type="text" value="${escapeHtml(q.text)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'text', this.value)">
                        </div>
                        ${answerSection}
                    `;
                    host.appendChild(card);
                    return;
                } else {
                    answerSection = `
                        <div class="field">
                            <label>Correct Answer</label>
                            <input type="text" value="${escapeHtml(q.answer)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'answer', this.value)">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="question-head">
                        <span class="badge">Question ${qIdx + 1}</span>
                        <button type="button" class="inline-btn danger" onclick="removeQuestion(${gIdx}, ${qIdx})">Delete Question</button>
                    </div>
                    <div class="field">
                        <label>Question Type</label>
                        <select onchange="changeQuestionType(${gIdx}, ${qIdx}, this.value)">${typeOptions}</select>
                    </div>
                    <div class="field">
                        <label>Question Text</label>
                        <input type="text" value="${escapeHtml(q.text)}" onchange="updateQuestion(${gIdx}, ${qIdx}, 'text', this.value)">
                    </div>
                    ${optionsSection}
                    ${answerSection}
                `;

                host.appendChild(card);
            });
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function escapeJs(value) {
            return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
        }

        function updateGroup(gIdx, field, value) {
            draft.questionGroups[gIdx][field] = value;
        }

        function updateQuestion(gIdx, qIdx, field, value) {
            draft.questionGroups[gIdx].questions[qIdx][field] = value;
        }

        function updateOption(gIdx, qIdx, oIdx, value) {
            const question = draft.questionGroups[gIdx].questions[qIdx];
            question.options[oIdx] = value;
            if (question.answer && !question.options.includes(question.answer)) {
                question.answer = "";
            }
            renderQuestions(gIdx);
        }

        function addOption(gIdx, qIdx) {
            const question = draft.questionGroups[gIdx].questions[qIdx];
            question.options.push(String.fromCharCode(65 + question.options.length));
            renderQuestions(gIdx);
        }

        function markSelectedBlank(gIdx, qIdx) {
            const input = document.getElementById(`question_text_${gIdx}_${qIdx}`);
            if (!input) return;

            const start = input.selectionStart;
            const end = input.selectionEnd;
            if (start === end) {
                toast("Highlight the answer word first");
                return;
            }

            const selected = input.value.slice(start, end).trim();
            if (!selected) {
                toast("Highlight a valid answer word");
                return;
            }

            const nextValue = `${input.value.slice(0, start)}[[${selected}]]${input.value.slice(end)}`;
            draft.questionGroups[gIdx].questions[qIdx].text = nextValue;
            draft.questionGroups[gIdx].questions[qIdx].answer = selected;
            renderQuestions(gIdx);
        }

        function clearBlankMark(gIdx, qIdx) {
            const question = draft.questionGroups[gIdx].questions[qIdx];
            question.text = String(question.text || "").replace(/\[\[(.+?)\]\]/g, "$1");
            question.answer = "";
            renderQuestions(gIdx);
        }

        function pickAnswer(gIdx, qIdx, optionValue) {
            draft.questionGroups[gIdx].questions[qIdx].answer = optionValue;
            renderQuestions(gIdx);
        }

        function changeQuestionType(gIdx, qIdx, nextType) {
            const question = draft.questionGroups[gIdx].questions[qIdx];
            const conf = QUESTION_TYPE_CONFIG[nextType];
            question.type = nextType;
            question.uiMode = conf.mode;
            question.options = [...conf.options];
            question.answer = "";
            renderQuestions(gIdx);
        }

        function addGroup() {
            draft.questionGroups.push(newGroup());
            renderGroups();
        }

        function removeGroup(gIdx) {
            draft.questionGroups.splice(gIdx, 1);
            ensureAtLeastOneGroup();
            renderGroups();
        }

        function addQuestion(gIdx) {
            draft.questionGroups[gIdx].questions.push(newQuestion("multiple-choice"));
            renderQuestions(gIdx);
        }

        function removeQuestion(gIdx, qIdx) {
            draft.questionGroups[gIdx].questions.splice(qIdx, 1);
            if (draft.questionGroups[gIdx].questions.length === 0) {
                draft.questionGroups[gIdx].questions.push(newQuestion("multiple-choice"));
            }
            renderQuestions(gIdx);
        }

        function buildStoredProblem() {
            draft.title = document.getElementById("setTitle").value.trim();
            draft.scheduledDate = document.getElementById("setDate").value;
            draft.difficulty = document.getElementById("difficultyLevel").value;
            draft.level = Number(document.getElementById("setLevel").value || 1);
            draft.passageTitle = document.getElementById("passageTitle").value.trim();
            draft.passageContent = document.getElementById("passageContent").value.trim();

            const normalizedGroups = draft.questionGroups.map((group) => ({
                title: group.title,
                instruction: group.instruction,
                questions: group.questions.map((q) => {
                    const conf = QUESTION_TYPE_CONFIG[q.type];
                    const storedType = q.type === "fill-in-the-blank" ? "fill-in-the-blank" : (conf.mode === "radio" ? "radio" : "text");
                    return {
                        type: storedType,
                        text: q.text,
                        options: conf.mode === "radio" ? q.options.join(", ") : "",
                        answer: q.answer
                    };
                })
            }));

            return {
                moduleId: "reading",
                icon: "📖",
                moduleName: "Reading",
                title: draft.title,
                difficulty: draft.difficulty,
                level: draft.level,
                scheduledDate: draft.scheduledDate,
                passageTitle: draft.passageTitle || "Passage",
                passageContent: draft.passageContent,
                questionGroups: normalizedGroups,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                id: `problem_${Date.now()}`
            };
        }

        async function saveReadingSet() {
            const problem = buildStoredProblem();
            const missingFields = [];

            if (!problem.title) missingFields.push("title");
            if (!problem.scheduledDate) missingFields.push("date");
            if (!problem.passageTitle) missingFields.push("passage title");
            if (!problem.passageContent) missingFields.push("passage");

            if (missingFields.length > 0) {
                toast(`Missing required field(s): ${missingFields.join(", ")}`);
                return;
            }

            const allAnswered = problem.questionGroups.every((group) =>
                group.questions.every((q) => q.text && q.answer)
            );
            if (!allAnswered) {
                toast("Every question must have text and a correct answer");
                return;
            }

            await storageSync.addProblem("reading", problem);
            toast("Reading set saved. Open real user view to test.");
        }

        function resetDraft() {
            draft = {
                moduleId: "reading",
                icon: "📖",
                moduleName: "Reading",
                title: "",
                difficulty: "beginner",
                level: 1,
                scheduledDate: "",
                passageTitle: "",
                passageContent: "",
                questionGroups: [newGroup()]
            };
            document.getElementById("setTitle").value = "";
            document.getElementById("difficultyLevel").value = "beginner";
            document.getElementById("setLevel").value = "1";
            document.getElementById("passageTitle").value = "";
            document.getElementById("passageContent").value = "";
            setDefaultDate();
            renderGroups();
        }

        document.getElementById("addGroupBtn").addEventListener("click", addGroup);
        document.getElementById("saveTop").addEventListener("click", saveReadingSet);
