        }

        function selectPassagePage(passageIndex) {
            persistActiveAutoFillDraft();
            activePassageIndex = passageIndex;
            renderGroups();
        }

        function parseNumberedTextMap(rawText) {
            const map = {};
            const text = String(rawText || "").replace(/\r/g, "").replace(/\u00a0/g, " ");

            const extractWithRegex = (regex) => {
                let match;
                while ((match = regex.exec(text)) !== null) {
                    const number = String(match[1] || "").trim();
                    const value = String(match[2] || "").replace(/\s+/g, " ").trim();
                    if (number) {
                        map[number] = value;
                    }
                }
            };

            // Preferred: one numbered entry per line.
            extractWithRegex(/(?:^|\n)\s*(\d+)(?:\s*[\.)\:\-]\s*|\s+)([\s\S]*?)(?=(?:\n\s*\d+(?:\s*[\.)\:\-]\s*|\s+))|$)/g);

            // Fallback: pasted as one paragraph, e.g. "1. ... 2. ... 3. ...".
            if (Object.keys(map).length <= 1) {
                extractWithRegex(/(?:^|\s)(\d+)(?:\s*[\.)\:\-]\s*|\s+)([\s\S]*?)(?=(?:\s+\d+(?:\s*[\.)\:\-]\s*|\s+))|$)/g);
            }

            return map;
        }

        function parseSequentialAnswerList(rawText) {
            return String(rawText || "")
                .replace(/\r/g, "")
                .split("\n")
                .map((line) => String(line || "").trim())
                .filter(Boolean)
                .map((line) => String(line).replace(/^\s*\d+(?:\s*[\.)\:\-]\s*|\s+)/, "").trim())
                .filter(Boolean);
        }

        function extractInlineAutoAnswer(type, rawQuestionText, options) {
            const original = String(rawQuestionText || "").trim();
            if (!original) return { questionText: "", answer: "" };

            if (type === "true-false-not-given") {
                const match = original.match(/^(.*?)(?:\s+)(TRUE|FALSE|NOT\s+GIVEN)\s*$/i);
                if (match) {
                    return {
                        questionText: String(match[1] || "").trim(),
                        answer: String(match[2] || "").replace(/\s+/g, " ").trim()
                    };
                }
            }

            if (type === "yes-no-not-given") {
                const match = original.match(/^(.*?)(?:\s+)(YES|NO|NOT\s+GIVEN)\s*$/i);
                if (match) {
                    return {
                        questionText: String(match[1] || "").trim(),
                        answer: String(match[2] || "").replace(/\s+/g, " ").trim()
                    };
                }
            }

            if (type === "multiple-choice") {
                const match = original.match(/^(.*?)(?:\s+)([A-H])\s*$/i);
                if (match) {
                    const letter = String(match[2] || "").toUpperCase();
                    const idx = letter.charCodeAt(0) - 65;
                    return {
                        questionText: String(match[1] || "").trim(),
                        answer: (Array.isArray(options) && options[idx]) ? options[idx] : letter
                    };
                }
            }

            return { questionText: original, answer: "" };
        }

        function detectAutoQuestionType(sectionText) {
            const text = String(sectionText || "");
            if (/\bTRUE\b/i.test(text) && /\bFALSE\b/i.test(text) && /NOT\s+GIVEN/i.test(text)) return "true-false-not-given";
            if (/\bYES\b/i.test(text) && /\bNO\b/i.test(text) && /NOT\s+GIVEN/i.test(text)) return "yes-no-not-given";
            if (/^\s*[A-H]\.\s+/m.test(text)) return "multiple-choice";
            if (/^\s*[ivxlcdm]+\.\s+/im.test(text)) return "matching-headings";
            if (/\/\//.test(text) || /_{2,}/.test(text)) return "fill-in-the-blank";
            return "short-answer";
        }

        function parseQuestionSections(questionText) {
            const text = String(questionText || "").replace(/\r/g, "").trim();
            if (!text) return [];

            // Ultra-permissive: match any Unicode dash, hyphen, minus, tilde, or the word "to"
            const DASH = '[\\-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2015\\u2212\\uFE58\\uFE63\\uFF0D~]';
            const markerRegex = new RegExp(`Questions?\\s*(\\d+)\\s*(?:${DASH}|\\bto\\b)\\s*(\\d+)`, 'gi');
            const markers = [];
            let markerMatch;

            while ((markerMatch = markerRegex.exec(text)) !== null) {
                markers.push({
                    index: markerMatch.index,
                    full: markerMatch[0],
                    start: Number(markerMatch[1]),
                    end: Number(markerMatch[2])
                });
            }

            if (!markers.length) {
                return [{ start: 1, end: 1, title: "Questions 1 - 1", body: text }];
            }

            const sections = [];
            markers.forEach((marker, idx) => {
                const next = markers[idx + 1];
                const bodyStart = marker.index + marker.full.length;
                const bodyEnd = next ? next.index : text.length;
                const body = text.slice(bodyStart, bodyEnd).trim();
                sections.push({
                    start: marker.start,
                    end: marker.end,
                    title: `Questions ${marker.start} - ${marker.end}`,
                    body
                });
            });

            return sections.filter((section) => section.body || section.title);
        }

        function extractChoiceOptions(sectionText) {
            const options = [];
            const regex = /^\s*([A-H])\.\s*(.+)$/gim;
            let match;
            while ((match = regex.exec(sectionText)) !== null) {
                options.push(String(match[2] || "").trim());
            }
            return options;
        }

        function normalizeAnswerForType(type, rawAnswer, options) {
            const clean = String(rawAnswer || "").trim();
            if (!clean) return "";

            if (type === "multiple-choice") {
                const letterMatch = clean.match(/^[A-H]$/i);
                if (letterMatch) {
                    const idx = letterMatch[0].toUpperCase().charCodeAt(0) - 65;
                    return options[idx] || clean;
                }
                return clean;
            }

            const canonical = {
                "true-false-not-given": ["True", "False", "Not Given"],
                "yes-no-not-given": ["Yes", "No", "Not Given"]
            };

            if (canonical[type]) {
                const found = canonical[type].find((item) => item.toLowerCase() === clean.toLowerCase());
                return found || clean;
            }

            return clean;
        }

        function applyAutoFillToPassage(passageIndex, options = {}) {
            const silent = !!options.silent;
            const keepAutoMode = !!options.keepAutoMode;
            saveAutoFillDraftFromEditors(passageIndex);

            const passage = draft.passages[passageIndex];
            if (!passage) return;

            const draftState = getAutoFillDraft(passage);
            const questionText = htmlToPlainText(draftState.questionText).trim();
            const answerText = htmlToPlainText(draftState.answerText).trim();
            const explanationText = htmlToPlainText(draftState.explanationText).trim();

            if (!questionText) {
                if (!silent) toast("Question box is empty");
                return false;
            }

            const answerMap = parseNumberedTextMap(answerText);
            const useSequentialAnswers = Object.keys(answerMap).length === 0;
            const sequentialAnswers = useSequentialAnswers ? parseSequentialAnswerList(answerText) : [];
            let sequentialAnswerIndex = 0;
            const explanationMap = parseNumberedTextMap(explanationText);
            const sections = parseQuestionSections(questionText);
            const generatedGroups = [];

            sections.forEach((section) => {
                const start = Number(section.start || 1);
                const end = Number(section.end || start);
                const count = Math.max(1, end - start + 1);
                const sectionType = detectAutoQuestionType(section.body);
                const numberedQuestionMap = parseNumberedTextMap(section.body);
                const hasNumberedQuestions = Object.keys(numberedQuestionMap).length > 0;
                const optionList = sectionType === "multiple-choice" ? extractChoiceOptions(section.body) : [];

                // For fill-in-the-blank: build a map of qNumber -> full sentence containing the inline blank
                const inlineBlankMap = {};
                if (sectionType === "fill-in-the-blank") {
                    const bodyLines = String(section.body || "").split("\n");
                    for (let qn = start; qn <= end; qn++) {
                        const blankPat = new RegExp("\\b" + qn + "\\s*\\.\\s*_{2,}");
                        const matchLine = bodyLines.find((line) => blankPat.test(line));
                        if (matchLine) {
                            inlineBlankMap[String(qn)] = matchLine
                                .replace(/^[\s\u2022\-*]+/, "")
                                .replace(new RegExp("\\b" + qn + "\\s*\\.\\s*_{2,}"), "______")
                                .trim();
                        }
                    }
                }

                // Sequential lines fallback: lines that aren't multiple-choice options or empty
                const sequentialLines = String(section.body || "")
                    .split("\n")
                    .map((l) => l.trim())
                    .filter((l) => l && !/^[A-H]\./i.test(l) && !/^[-\u2022]/.test(l));

                // Instruction is non-question preamble text (lines before the first numbered/sequential question)
                const instructionText = hasNumberedQuestions
                    ? String(section.body || "").replace(/^\s*\d+(?:\s*[\.\)\:\-]\s*|\s+).+$/gm, "").trim()
                    : "";

                const group = {
                    title: section.title,
                    instruction: instructionText,
                    questionMode: count > 1 ? "multiple" : "single",
                    questionRange: `${start}-${end}`,
                    questions: []
                };

                for (let qNumber = start; qNumber <= end; qNumber += 1) {
                    const question = newQuestion(sectionType);
                    const seqIdx = qNumber - start;
                    let rawQuestion = inlineBlankMap[String(qNumber)]
                        || (sectionType !== "fill-in-the-blank" ? numberedQuestionMap[String(qNumber)] : null)
                        || (count === 1 ? String(section.body || "").trim() : null)
                        || sequentialLines[seqIdx]
                        || `Question ${qNumber}`;
                    question.text = rawQuestion;
                    question.textHtml = rawQuestion;

                    if (sectionType === "multiple-choice" && optionList.length) {
                        question.options = optionList;
                    }

                    const inline = extractInlineAutoAnswer(sectionType, rawQuestion, question.options);
                    rawQuestion = inline.questionText || rawQuestion;
                    question.text = rawQuestion;
                    question.textHtml = rawQuestion;

                    let rawAnswer = answerMap[String(qNumber)] || "";
                    if (!rawAnswer && useSequentialAnswers) {
                        rawAnswer = sequentialAnswers[sequentialAnswerIndex] || "";
                        sequentialAnswerIndex += 1;
                    }
                    if (!rawAnswer && inline.answer) {
                        rawAnswer = inline.answer;
                    }
                    question.answer = normalizeAnswerForType(sectionType, rawAnswer, question.options);

                    const explanation = explanationMap[String(qNumber)] || "";
                    if (explanation) {
                        question.autoExplanation = explanation;
                    }

                    group.questions.push(question);
                }

                enforceGroupQuestionConstraints(group);
                generatedGroups.push(group);
            });

            if (!generatedGroups.length) {
                if (!silent) toast("Cannot detect question groups. Use 'Questions 1 - 5' format.");
                return false;
            }

            passage.questionGroups = generatedGroups;
            passage.editorMode = keepAutoMode ? "auto" : "manual";
            activePassageIndex = passageIndex;
            if (!silent) {
                renderGroups();
                toast("Questions generated automatically");
            }
            return true;
        }

        function renderQuestions(passageIndex) {
            const host = document.getElementById(`groupsContainer_${passageIndex}`);
            const passage = draft.passages[passageIndex];
            if (!host || !passage) return;

            host.innerHTML = "";

            passage.questionGroups.forEach((group, gIdx) => {
                enforceGroupQuestionConstraints(group);
                const isMultiple = group.questionMode === "multiple";
                const hasValidRange = !!parseQuestionRange(group.questionRange);
                const groupEl = document.createElement("section");
                groupEl.className = "group-card";
                groupEl.innerHTML = `
                    <div class="group-head">
                        <span class="badge">Group ${gIdx + 1}</span>
                        <button type="button" class="inline-btn danger" onclick="removeGroup(${passageIndex}, ${gIdx})">Delete Group</button>
                    </div>
                    <div class="field">
                        <label>Group Title</label>
                        <input type="text" value="${escapeHtml(group.title)}" onchange="updateGroup(${passageIndex}, ${gIdx}, 'title', this.value)">
                    </div>
                    <div class="field">
                        <label>Instruction</label>
                        <div class="inline-actions" style="margin-bottom:8px;">
                            <button type="button" class="inline-btn" onclick="applyInstructionToAllGroups(${passageIndex}, ${gIdx})">Apply to All Groups</button>
                        </div>
                        <div id="groupInstructionEditor_${passageIndex}_${gIdx}"></div>
                    </div>
                    <div class="field">
                        <label>Question Group Mode</label>
                        <select onchange="updateGroupQuestionMode(${passageIndex}, ${gIdx}, this.value)">
                            <option value="single" ${group.questionMode === "single" ? "selected" : ""}>Single Question</option>
                            <option value="multiple" ${group.questionMode === "multiple" ? "selected" : ""}>Multiple Questions</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Question Number Range</label>
                        <input type="text" value="${escapeHtml(group.questionRange || "")}" placeholder="e.g. 1-7" ${isMultiple ? "" : "disabled"} oninput="updateGroupQuestionRange(${passageIndex}, ${gIdx}, this.value)">
                        <div class="helper">Use format like 1-7 for multiple questions. Leave blank to add questions manually.</div>
                    </div>
                    <div id="questions_${passageIndex}_${gIdx}"></div>
                    ${(isMultiple && !hasValidRange) ? `<button type="button" class="inline-btn" onclick="addQuestion(${passageIndex}, ${gIdx})">+ Add Question</button>` : ""}
                `;
                host.appendChild(groupEl);
                const questionsHost = document.getElementById(`questions_${passageIndex}_${gIdx}`);
                if (!questionsHost) return;

                const instructionEditorId = `groupInstruction_${passageIndex}_${gIdx}`;
                const instructionContainer = document.getElementById(`groupInstructionEditor_${passageIndex}_${gIdx}`);
                if (instructionContainer) {
                    instructionContainer.innerHTML = createRichEditorMarkup(instructionEditorId, "Group instruction");
                    bindRichEditorToolbar(instructionEditorId);
                    const editable = document.getElementById(instructionEditorId + "Content");
                    const hidden = document.getElementById(instructionEditorId);
                    const initialValue = group.instruction || "";
                    if (editable) editable.innerHTML = initialValue;
                    if (hidden) hidden.value = initialValue;
                    editable?.addEventListener("input", () => updateGroup(passageIndex, gIdx, "instruction", editable.innerHTML));
                    editable?.addEventListener("blur", () => updateGroup(passageIndex, gIdx, "instruction", editable.innerHTML));
                }

                group.questions.forEach((q, qIdx) => {
                    const conf = QUESTION_TYPE_CONFIG[q.type];
                    const card = document.createElement("article");
                    card.className = "question-card";
                    const questionLabel = getGroupQuestionLabel(group, qIdx);

                const typeOptions = Object.entries(QUESTION_TYPE_CONFIG)
                    .map(([key, value]) => `<option value="${key}" ${key === q.type ? "selected" : ""}>${value.label}</option>`)
                    .join("");

                let optionsSection = "";
                let answerSection = "";

                if (conf.mode === "radio") {
                    const items = q.options.map((opt, idx) => {
                        const disabled = conf.locked ? "readonly" : "";
                        const marker = conf.locked ? "" : String.fromCharCode(65 + idx);
                        return `
                            <div class="option-item">
                                <strong>${marker}</strong>
                                <input type="text" value="${escapeHtml(opt)}" ${disabled} onchange="updateOption(${passageIndex}, ${gIdx}, ${qIdx}, ${idx}, this.value)">
                            </div>
                        `;
                    }).join("");

                    optionsSection = `
                        <div class="field">
                            <label>Options</label>
                            ${items}
                            ${conf.locked ? "" : `<button type="button" class="inline-btn" onclick="addOption(${passageIndex}, ${gIdx}, ${qIdx})">+ Add Option</button>`}
                            <div class="helper">Correct answer can be selected by clicking one option chip below.</div>
                        </div>
                    `;

                    const answerChips = q.options.map((opt) => {
                        const active = q.answer === opt ? "active" : "";
                        return `<span class="answer-choice ${active}" onclick="pickAnswer(${passageIndex}, ${gIdx}, ${qIdx}, '${escapeJs(opt)}')">${escapeHtml(opt)}</span>`;
                    }).join("");

                    answerSection = `<div class="field"><label>Correct Answer</label><div class="answer-options">${answerChips}</div></div>`;
                } else if (conf.mode === "matching-headings") {
                    ensureMatchingHeadingsShape(q);
                    const optionsRows = q.matchingHeadingsOptions.map((opt, optIdx) => `
                        <div class="matching-headings-option">
                            <span class="matching-heading-tag">${escapeHtml(opt.label)}</span>
                            <input type="text" value="${escapeHtml(opt.text)}" placeholder="Heading text" oninput="updateMatchingHeadingOptionText(${passageIndex}, ${gIdx}, ${qIdx}, ${optIdx}, this.value)">
                            <button type="button" class="inline-btn danger" onclick="removeMatchingHeadingOption(${passageIndex}, ${gIdx}, ${qIdx}, ${optIdx})">Delete</button>
                        </div>
                    `).join("");

                    const rowsHtml = q.matchingHeadingsRows.map((row, rowIdx) => `
                        <tr>
                            <td><input type="text" value="${escapeHtml(row.number)}" oninput="updateMatchingHeadingRow(${passageIndex}, ${gIdx}, ${qIdx}, ${rowIdx}, 'number', this.value)"></td>
                            <td><input type="text" value="${escapeHtml(row.prompt)}" oninput="updateMatchingHeadingRow(${passageIndex}, ${gIdx}, ${qIdx}, ${rowIdx}, 'prompt', this.value)"></td>
                            <td>
                                <select onchange="updateMatchingHeadingRow(${passageIndex}, ${gIdx}, ${qIdx}, ${rowIdx}, 'answerOptionId', this.value)">
                                    <option value="">Select heading</option>
                                    ${q.matchingHeadingsOptions.map((opt) => `<option value="${escapeHtml(opt.id)}" ${String(row.answerOptionId || "") === String(opt.id) ? "selected" : ""}>${escapeHtml(opt.label)} ${escapeHtml(opt.text || "")}</option>`).join("")}
                                </select>
                            </td>
                            <td><button type="button" class="inline-btn danger" onclick="removeMatchingHeadingRow(${passageIndex}, ${gIdx}, ${qIdx}, ${rowIdx})">Delete</button></td>
                        </tr>
                    `).join("");

                    answerSection = `
                        <div class="field">
                            <label>Heading Options (i., ii., iii.)</label>
                            <div class="matching-headings-list">${optionsRows}</div>
                            <div class="inline-actions" style="margin-top:8px;">
                                <button type="button" class="inline-btn" onclick="addMatchingHeadingOption(${passageIndex}, ${gIdx}, ${qIdx})">+ Add Heading Option</button>
                            </div>
                        </div>
                        <div class="field">
                            <label>Heading Questions Table</label>
                            <table class="matching-headings-table">
                                <thead><tr><th>No.</th><th>Heading Question</th><th>Answer</th><th></th></tr></thead>
                                <tbody>${rowsHtml}</tbody>
                            </table>
                            <div class="inline-actions" style="margin-top:8px;">
                                <button type="button" class="inline-btn" onclick="addMatchingHeadingRow(${passageIndex}, ${gIdx}, ${qIdx})">+ Add Row</button>
                            </div>
                        </div>
                    `;
                } else if (conf.mode === "blank") {
                    const numberedDefs = extractNumberedBlankDefs(q.text);
                    const answerMap = parseNumberedBlankAnswerMap(q.answer);
                    const numberedRows = numberedDefs.map((def) => `
                        <tr>
                            <td>${escapeHtml(def.number)}</td>
                            <td><input type="text" value="${escapeHtml(answerMap[def.number] || "")}" oninput="updateNumberedBlankAnswer(${passageIndex}, ${gIdx}, ${qIdx}, '${def.number}', ${def.maxWords}, this.value)"></td>
                        </tr>
                    `).join("");
                    answerSection = `
                        <div class="field">
                            <label>${numberedDefs.length ? "Numbered Answers" : "Correct Answer"}</label>
                            ${numberedDefs.length ? `<table class="numbered-blank-table"><thead><tr><th>Blank No.</th><th>Answer</th></tr></thead><tbody>${numberedRows}</tbody></table><div class="helper">Detected from patterns like 24 __, 25 ____, 26 ______.</div>` : `<input type="text" value="${escapeHtml(q.answer)}" onchange="updateQuestion(${passageIndex}, ${gIdx}, ${qIdx}, 'answer', this.value)">`}
                            <div class="inline-actions">
                                <button type="button" class="inline-btn" onclick="clearBlankMark(${passageIndex}, ${gIdx}, ${qIdx})">Clear Mark</button>
                            </div>
                        </div>
                    `;
                    card.innerHTML = `
                        <div class="question-head">
                            <span class="badge">Question ${questionLabel}</span>
                            <button type="button" class="inline-btn danger" onclick="removeQuestion(${passageIndex}, ${gIdx}, ${qIdx})">Delete Question</button>
                        </div>
                        <div class="field">
                            <label>Question Type</label>
                            <select onchange="changeQuestionType(${passageIndex}, ${gIdx}, ${qIdx}, this.value)">${typeOptions}</select>
                        </div>
                        <div class="field question-text-editor">
                            <label>Question Text</label>
                            <div id="questionTextEditor_${passageIndex}_${gIdx}_${qIdx}"></div>
                        </div>
                        ${answerSection}
                    `;
                    questionsHost.appendChild(card);
                    initQuestionTextEditor(passageIndex, gIdx, qIdx, q.text, q.textHtml);
                    return;
                } else {
                    answerSection = `
                        <div class="field">
                            <label>Correct Answer</label>
                            <input type="text" value="${escapeHtml(q.answer)}" onchange="updateQuestion(${passageIndex}, ${gIdx}, ${qIdx}, 'answer', this.value)">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="question-head">
                        <span class="badge">Question ${questionLabel}</span>
                        <button type="button" class="inline-btn danger" onclick="removeQuestion(${passageIndex}, ${gIdx}, ${qIdx})">Delete Question</button>
                    </div>
                    <div class="field">
                        <label>Question Type</label>
                        <select onchange="changeQuestionType(${passageIndex}, ${gIdx}, ${qIdx}, this.value)">${typeOptions}</select>
                    </div>
                    <div class="field question-text-editor">
                        <label>Question Text</label>
                        <div id="questionTextEditor_${passageIndex}_${gIdx}_${qIdx}"></div>
                    </div>
                    ${optionsSection}
                    ${answerSection}
                `;

                questionsHost.appendChild(card);
                initQuestionTextEditor(passageIndex, gIdx, qIdx, q.text, q.textHtml);
            });
            });
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function escapeJs(value) {
            return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
        }

        function stripBlankMarkerText(value) {
            return String(value || "").replace(/\[\[(.+?)\]\]/g, "$1");
        }

        function extractBlankWordChoices(value) {
            return String(value || "").match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/g) || [];
        }

        function extractNumberedBlankDefs(value) {
            const defs = [];
            const regex = /(\d+)\s((?:_\s*){2,})/g;
            const text = String(value || "");
            let match;
            while ((match = regex.exec(text)) !== null) {
                const number = match[1];
                const underscores = String(match[2] || "").replace(/\s+/g, "");
                defs.push({
                    number,
                    underscores: underscores.length,
                    maxWords: Math.max(1, Math.floor(underscores.length / 2))
                });
            }
            return defs;
        }

        function parseNumberedBlankAnswerMap(raw) {
            const text = String(raw || "").trim();
            if (!text || !text.startsWith("{")) return {};
            try {
                const parsed = JSON.parse(text);
                if (parsed && typeof parsed === "object") {
                    if (parsed.answers && typeof parsed.answers === "object") return parsed.answers;
                    return parsed;
                }
            } catch (_) {}
            return {};
        }

        function serializeNumberedBlankAnswerMap(map) {
            return JSON.stringify({ answers: map || {} });
        }

        function normalizeQuestionTextFromHtml(html) {
            const tmp = document.createElement("div");
            tmp.innerHTML = String(html || "");

            tmp.querySelectorAll("br").forEach((br) => {
                br.replaceWith(document.createTextNode("\n"));
            });

            tmp.querySelectorAll("li").forEach((li) => {
                li.insertBefore(document.createTextNode("• "), li.firstChild);
                li.appendChild(document.createTextNode("\n"));
            });

            tmp.querySelectorAll("p,div,section,article,h1,h2,h3,h4,h5,h6,ul,ol").forEach((el) => {
                el.appendChild(document.createTextNode("\n"));
            });

            return (tmp.textContent || "")
                .replace(/\u00a0/g, " ")
                .replace(/\r/g, "")
                .split("\n")
                .map((line) => line.trimEnd())
                .join("\n")
                .replace(/\n{3,}/g, "\n\n")
                .trim();
        }

        function initQuestionTextEditor(passageIndex, gIdx, qIdx, initialText, initialHtml) {
            const container = document.getElementById(`questionTextEditor_${passageIndex}_${gIdx}_${qIdx}`);
            if (!container) return;

            const editorId = `questionText_${passageIndex}_${gIdx}_${qIdx}`;
            container.innerHTML = createRichEditorMarkup(editorId, "Question text");
            bindRichEditorToolbar(editorId);

            const editable = document.getElementById(editorId + "Content");
            const hidden = document.getElementById(editorId);
            if (!editable) return;

            const htmlValue = String(initialHtml || "").trim();
            editable.innerHTML = htmlValue || escapeHtml(String(initialText || "")).replace(/\n/g, "<br>");
            if (hidden) hidden.value = htmlValue;

            const syncText = () => {
                const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
                if (!question) return;
                question.text = normalizeQuestionTextFromHtml(editable.innerHTML);
                question.textHtml = String(editable.innerHTML || "");
                if (hidden) hidden.value = question.textHtml;
                if (question.type === "fill-in-the-blank" && question.answer) {
                    if (extractNumberedBlankDefs(question.text).length > 0) return;
                    const choices = extractBlankWordChoices(question.text);
                    if (!choices.includes(question.answer)) question.answer = "";
                }
            };

            editable.addEventListener("input", syncText);
            editable.addEventListener("blur", () => {
                syncText();
                const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
                if (question?.type === "fill-in-the-blank") renderQuestions(passageIndex);
            });
        }

        function extractBlankMarkerAnswer(value) {
            const match = String(value || "").match(/\[\[(.+?)\]\]/);
            return match ? match[1].trim() : "";
        }

        function updateGroup(passageIndex, gIdx, field, value) {
            const passage = draft.passages[passageIndex];
            if (!passage || !passage.questionGroups[gIdx]) return;
            passage.questionGroups[gIdx][field] = value;
        }

        function updateGroupQuestionMode(passageIndex, gIdx, value) {
            const passage = draft.passages[passageIndex];
            const group = passage?.questionGroups?.[gIdx];
            if (!group) return;
            group.questionMode = value === "multiple" ? "multiple" : "single";
            if (group.questionMode === "single") {
                group.questionRange = "";
            }
            enforceGroupQuestionConstraints(group);
            renderQuestions(passageIndex);
            updatePassageSummary(passageIndex);
        }

        function updateGroupQuestionRange(passageIndex, gIdx, value) {
            const passage = draft.passages[passageIndex];
            const group = passage?.questionGroups?.[gIdx];
            if (!group) return;
            group.questionRange = value;
            if (group.questionMode !== "multiple") return;
            enforceGroupQuestionConstraints(group);
            renderQuestions(passageIndex);
            updatePassageSummary(passageIndex);
        }

        function applyInstructionToAllGroups(passageIndex, gIdx) {
            const passage = draft.passages[passageIndex];
            if (!passage || !Array.isArray(passage.questionGroups)) return;
            const sourceGroup = passage.questionGroups[gIdx];
            if (!sourceGroup) return;

            const instructionHtml = String(sourceGroup.instruction || "");
            passage.questionGroups.forEach((group) => {
                group.instruction = instructionHtml;
            });

            renderQuestions(passageIndex);
            toast("Instruction applied to all groups in this passage");
        }

        function updateQuestion(passageIndex, gIdx, qIdx, field, value) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question[field] = value;
        }

        function updateOption(passageIndex, gIdx, qIdx, oIdx, value) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question.options[oIdx] = value;
            if (question.answer && !question.options.includes(question.answer)) {
                question.answer = "";
            }
            renderQuestions(passageIndex);
        }

        function addOption(passageIndex, gIdx, qIdx) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question.options.push(String.fromCharCode(65 + question.options.length));
            renderQuestions(passageIndex);
        }

        function updateMatchingHeadingOptionText(passageIndex, gIdx, qIdx, optIdx, value) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            ensureMatchingHeadingsShape(question);
            if (!question.matchingHeadingsOptions[optIdx]) return;
            question.matchingHeadingsOptions[optIdx].text = value;
        }

        function addMatchingHeadingOption(passageIndex, gIdx, qIdx) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            ensureMatchingHeadingsShape(question);
            const nextIndex = question.matchingHeadingsOptions.length;
            question.matchingHeadingsOptions.push({ id: `mh_${Date.now()}_${nextIndex}`, label: toRomanLabel(nextIndex), text: "" });
            ensureMatchingHeadingsShape(question);
            renderQuestions(passageIndex);
        }

        function removeMatchingHeadingOption(passageIndex, gIdx, qIdx, optIdx) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            ensureMatchingHeadingsShape(question);
            if (question.matchingHeadingsOptions.length <= 1) {
                toast("Keep at least one heading option");
                return;
            }
            const removed = question.matchingHeadingsOptions.splice(optIdx, 1)[0];
            if (removed?.id) {
                question.matchingHeadingsRows.forEach((row) => {
                    if (row.answerOptionId === removed.id) row.answerOptionId = "";
                });
            }
            ensureMatchingHeadingsShape(question);
            renderQuestions(passageIndex);
        }

        function addMatchingHeadingRow(passageIndex, gIdx, qIdx) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            ensureMatchingHeadingsShape(question);
            const next = question.matchingHeadingsRows.length + 1;
            question.matchingHeadingsRows.push({
                number: String(next),
                prompt: `Passage ${String.fromCharCode(64 + Math.min(26, next))}`,
                answerOptionId: ""
            });
            renderQuestions(passageIndex);
        }

        function removeMatchingHeadingRow(passageIndex, gIdx, qIdx, rowIdx) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            ensureMatchingHeadingsShape(question);
            if (question.matchingHeadingsRows.length <= 1) {
                toast("Keep at least one heading row");
                return;
            }
            question.matchingHeadingsRows.splice(rowIdx, 1);
            renderQuestions(passageIndex);
        }

        function updateMatchingHeadingRow(passageIndex, gIdx, qIdx, rowIdx, field, value) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            ensureMatchingHeadingsShape(question);
            const row = question.matchingHeadingsRows[rowIdx];
            if (!row) return;
            row[field] = value;
        }

        function markSelectedBlank(passageIndex, gIdx, qIdx) {
            const input = document.getElementById(`question_text_${passageIndex}_${gIdx}_${qIdx}`);
            if (!input) return;

            const start = input.selectionStart;
            const end = input.selectionEnd;
            if (start === end) {
                toast("Highlight the answer word first");
                return;
            }

            const selected = input.value.slice(start, end).trim();
            if (!selected) {
                toast("Highlight a valid answer word");
                return;
            }

            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question.text = stripBlankMarkerText(question.text);
            question.answer = selected;
            question.type = "fill-in-the-blank";
            question.uiMode = QUESTION_TYPE_CONFIG["fill-in-the-blank"].mode;
            question.options = [];
            renderQuestions(passageIndex);
        }

        function clearBlankMark(passageIndex, gIdx, qIdx) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question.text = stripBlankMarkerText(question.text);
            question.answer = "";
            renderQuestions(passageIndex);
        }

        function updateNumberedBlankAnswer(passageIndex, gIdx, qIdx, blankNumber, maxWords, value) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;

            const words = String(value || "").trim().split(/\s+/).filter(Boolean);
            const limited = words.slice(0, maxWords).join(" ");
            const map = parseNumberedBlankAnswerMap(question.answer);
            if (limited) {
                map[blankNumber] = limited;
            } else {
                delete map[blankNumber];
            }
            question.answer = serializeNumberedBlankAnswerMap(map);
        }

        function pickBlankWord(passageIndex, gIdx, qIdx, word) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question.text = stripBlankMarkerText(question.text);
            question.answer = String(word || "").trim();
            question.type = "fill-in-the-blank";
            question.uiMode = QUESTION_TYPE_CONFIG["fill-in-the-blank"].mode;
            question.options = [];
            renderQuestions(passageIndex);
        }

        function pickAnswer(passageIndex, gIdx, qIdx, optionValue) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            question.answer = optionValue;
            renderQuestions(passageIndex);
        }

        function changeQuestionType(passageIndex, gIdx, qIdx, nextType) {
            const question = draft.passages[passageIndex]?.questionGroups[gIdx]?.questions[qIdx];
            if (!question) return;
            const conf = QUESTION_TYPE_CONFIG[nextType];
            question.type = nextType;
            question.uiMode = conf.mode;
            question.options = [...conf.options];
            question.answer = "";
            if (conf.mode === "matching-headings") {
                question.matchingHeadingsOptions = [
                    { id: "mh_1", label: "i.", text: "" },
                    { id: "mh_2", label: "ii.", text: "" },
                    { id: "mh_3", label: "iii.", text: "" }
                ];
                question.matchingHeadingsRows = [
                    { number: "1", prompt: "Passage A", answerOptionId: "" },
                    { number: "2", prompt: "Passage B", answerOptionId: "" },
                    { number: "3", prompt: "Passage C", answerOptionId: "" }
                ];
            }
            renderQuestions(passageIndex);
        }

        function getMatchingHeadingsAnswerValue(question) {
            ensureMatchingHeadingsShape(question);
            const answerMap = {};
            question.matchingHeadingsRows.forEach((row) => {
                if (String(row.number || "").trim()) {
                    answerMap[String(row.number).trim()] = String(row.answerOptionId || "");
                }
            });
            return JSON.stringify({ answers: answerMap });
        }

        function isQuestionAnswered(question) {
            if (!question) return false;
            if (question.type === "matching-headings") {
                ensureMatchingHeadingsShape(question);
                const optionsReady = question.matchingHeadingsOptions.every((opt) => String(opt.text || "").trim().length > 0);
                const rowsReady = question.matchingHeadingsRows.every((row) => String(row.number || "").trim() && String(row.prompt || "").trim() && String(row.answerOptionId || "").trim());
                return optionsReady && rowsReady;
            }
            return String(question.text || "").trim().length > 0 && String(question.answer || "").trim().length > 0;
        }

        function addPassage() {
            if (draft.passages.length >= 3) {
                toast("You can add up to 3 passages only");
                return;
            }
            persistActiveAutoFillDraft();
            draft.passages.push(newPassage());
            activePassageIndex = draft.passages.length - 1;
            renderGroups();
        }

        function removePassage(passageIndex) {
            if (draft.passages.length === 1) {
                toast("Keep at least one passage");
                return;
            }
            persistActiveAutoFillDraft();
            draft.passages.splice(passageIndex, 1);
            ensureAtLeastOnePassage();
            if (activePassageIndex >= draft.passages.length) {
                activePassageIndex = draft.passages.length - 1;
            }
            renderGroups();
        }

        function addGroup(passageIndex) {
            const passage = draft.passages[passageIndex];
            if (!passage) return;
            passage.questionGroups.push(newGroup(passage));
            renderQuestions(passageIndex);
            updatePassageSummary(passageIndex);
        }

        function removeGroup(passageIndex, gIdx) {
            const passage = draft.passages[passageIndex];
            if (!passage) return;
            passage.questionGroups.splice(gIdx, 1);
            ensureAtLeastOneGroup(passageIndex);
            renderQuestions(passageIndex);
            updatePassageSummary(passageIndex);
        }

        function addQuestion(passageIndex, gIdx) {
            const group = draft.passages[passageIndex]?.questionGroups[gIdx];
            if (!group) return;
            if (group.questionMode !== "multiple") {
                toast("Single question mode allows only one question");
                return;
            }
            if (parseQuestionRange(group.questionRange)) {
                toast("Question count is controlled by range");
                return;
            }
            group.questions.push(newQuestion("multiple-choice"));
            renderQuestions(passageIndex);
            updatePassageSummary(passageIndex);
        }

        function removeQuestion(passageIndex, gIdx, qIdx) {
            const group = draft.passages[passageIndex]?.questionGroups[gIdx];
            if (!group) return;
            group.questions.splice(qIdx, 1);
            enforceGroupQuestionConstraints(group);
            renderQuestions(passageIndex);
            updatePassageSummary(passageIndex);
        }

        function buildStoredProblem() {
            persistActiveAutoFillDraft();
            draft.title = document.getElementById("setTitle").value.trim();
            draft.scheduledDate = document.getElementById("setDate").value;
            draft.difficulty = document.getElementById("difficultyLevel").value;
            draft.level = Number(document.getElementById("setLevel").value || 1);

            const normalizedPassages = draft.passages.map((passage) => ({
                title: passage.title.trim(),
                content: passage.content.trim(),
                editorMode: passage.editorMode === "manual" ? "manual" : "auto",
                autoFillDraft: {
                    questionText: String(passage.autoFillDraft?.questionText || ""),
                    answerText: String(passage.autoFillDraft?.answerText || ""),
                    explanationText: String(passage.autoFillDraft?.explanationText || "")
                },
                questionGroups: passage.questionGroups.map((group) => ({
                    title: group.title,
                    instruction: group.instruction,
                    questionMode: group.questionMode || "single",
                    questionRange: group.questionRange || "",
                    questions: group.questions.map((q) => {
                        const conf = QUESTION_TYPE_CONFIG[q.type];
                        const storedType = q.type === "fill-in-the-blank"
                            ? "fill-in-the-blank"
                            : q.type === "matching-headings"
                                ? "matching-headings"
                                : (conf.mode === "radio" ? "radio" : "text");
                        return {
                            type: storedType,
                            text: stripBlankMarkerText(q.text),
                            textHtml: q.textHtml || "",
                            options: conf.mode === "radio" ? q.options.join(", ") : "",
                            answer: q.type === "matching-headings" ? getMatchingHeadingsAnswerValue(q) : (q.answer || extractBlankMarkerAnswer(q.text)),
                            matchingHeadingsOptions: q.type === "matching-headings" ? q.matchingHeadingsOptions : undefined,
                            matchingHeadingsRows: q.type === "matching-headings" ? q.matchingHeadingsRows : undefined
                        };
                    })
                }))
            }));

            return {
                moduleId: "reading",
                icon: "📖",
                moduleName: "Reading",
                title: draft.title,
                difficulty: draft.difficulty,
                level: draft.level,
                scheduledDate: draft.scheduledDate,
                passageTitle: normalizedPassages[0]?.title || "Passage",
                passageContent: normalizedPassages[0]?.content || "",
                passages: normalizedPassages,
                questionGroups: normalizedPassages.flatMap((passage) => passage.questionGroups),
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                id: `problem_${Date.now()}`
            };
        }

        async function saveReadingSet() {
            // Auto-generate questions for any passage still in auto mode
            draft.passages.forEach((passage, passageIndex) => {
                if (passage.editorMode === "auto") {
                    saveAutoFillDraftFromEditors(passageIndex);
                    const draftState = getAutoFillDraft(passage);
                    const questionText = htmlToPlainText(draftState.questionText).trim();
                    if (questionText) {
                        applyAutoFillToPassage(passageIndex, { silent: true, keepAutoMode: true });
                    }
                }
            });

            // After auto-apply, any passage still in auto mode has no question text
            const emptyAutoPassages = draft.passages
                .map((p, i) => ({ p, i }))
                .filter(({ p }) => p.editorMode === "auto")
                .map(({ i }) => `passage ${i + 1}`);
            if (emptyAutoPassages.length > 0) {
                toast(`Please add questions for ${emptyAutoPassages.join(", ")} (auto mode), or switch to Manual.`);
                return;
            }

            const problem = buildStoredProblem();
            const missingFields = [];

            if (!problem.title) missingFields.push("title");
            if (!problem.scheduledDate) missingFields.push("date");
            problem.passages.forEach((passage, passageIndex) => {
                if (!passage.title) missingFields.push(`passage ${passageIndex + 1} title`);
                if (!passage.content) missingFields.push(`passage ${passageIndex + 1} content`);
            });

            if (missingFields.length > 0) {
                toast(`Missing required field(s): ${missingFields.join(", ")}`);
                return;
            }

            const allAnswered = problem.passages.every((passage) =>
                passage.questionGroups.every((group) =>
                    group.questions.every((q) => isQuestionAnswered(q))
                )
            );
            if (!allAnswered) {
                toast("Every question must have text and a correct answer");
                return;
            }

            await storageSync.addProblem("reading", problem);
            toast("Reading set saved. Open real user view to test.");
        }

        function resetDraft() {
            draft = {
                moduleId: "reading",
                icon: "📖",
                moduleName: "Reading",
                title: "",
                difficulty: "beginner",
                level: 1,
                scheduledDate: "",
                passages: [newPassage()]
            };
            activePassageIndex = 0;
            document.getElementById("setTitle").value = "";
            document.getElementById("difficultyLevel").value = "beginner";
            document.getElementById("setLevel").value = "1";
            setDefaultDate();
            renderGroups();
        }

        document.getElementById("addPassageBtn").addEventListener("click", addPassage);
        document.getElementById("saveTop").addEventListener("click", saveReadingSet);
        document.getElementById("saveBottom").addEventListener("click", saveReadingSet);
        document.getElementById("resetBtn").addEventListener("click", resetDraft);

        setInitialDate();
        ensureAtLeastOnePassage();
        renderGroups();
    </script>
</body>
</html>
