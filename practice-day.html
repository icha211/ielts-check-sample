<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Check | Daily Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f7f5;
            --ink: #182621;
            --ink-soft: #5a6d66;
            --paper: #ffffff;
            --paper-2: #eef5f1;
            --line: #d8e4de;
            --accent: #1f4f95;
            --accent-2: #67c86b;
            --listening: #1ea7c6;
            --reading: #3f9b5a;
            --writing: #e39a33;
            --speaking: #b44d7a;
            --full: #355f9d;
            --shadow-soft: 0 12px 28px rgba(14, 97, 80, 0.11);
            --shadow-card: 0 14px 30px rgba(14, 97, 80, 0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: "Poppins", sans-serif;
            background:
                radial-gradient(circle at 7% 8%, rgba(157, 225, 111, 0.2), transparent 35%),
                radial-gradient(circle at 95% 2%, rgba(31, 138, 112, 0.2), transparent 30%),
                var(--bg);
            padding: 0;
        }

        .app-shell {
            min-height: 100vh;
            position: relative;
            overflow-x: clip;
        }

        .sidebar {
            position: sticky;
            top: 0;
            z-index: 40;
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(8px);
            background: rgba(243, 247, 245, 0.88);
        }

        .sidebar-inner {
            width: min(1120px, calc(100% - 2rem));
            margin-inline: auto;
            min-height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .brand-badge {
            width: clamp(64px, 9vw, 104px);
            height: 34px;
            border-radius: 0;
            display: grid;
            place-items: center;
            overflow: visible;
            background: transparent;
            transform: translateY(-5px);
        }

        .brand-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            list-style: none;
        }

        .nav-link {
            text-decoration: none;
            color: #28443b;
            font-size: 0.88rem;
            font-weight: 600;
            min-height: 44px;
            padding: 0 0.75rem;
            border-radius: 10px;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            transition: background-color 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
        }

        .nav-link.active,
        .nav-link:hover {
            background: #e4efea;
            border-color: #d8e4de;
            transform: translateY(-1px);
        }

        .content-wrap {
            width: min(1120px, calc(100% - 2rem));
            margin-inline: auto;
            padding: 1rem 0;
        }

        .subheader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            background: #f0f6f3;
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        .subheader::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            right: -60px;
            top: -90px;
            background: rgba(157, 225, 111, 0.2);
            pointer-events: none;
        }

        .subheader strong {
            font-family: "Sora", sans-serif;
            color: #194c89;
            font-size: 1.05rem;
            position: relative;
            z-index: 1;
        }

        .subnav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .subnav a {
            text-decoration: none;
            border: 1px solid transparent;
            color: #28443b;
            border-radius: 10px;
            min-height: 40px;
            padding: 0 0.75rem;
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            font-size: 0.85rem;
            background: transparent;
            transition: background-color 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
        }

        .subnav a.active {
            background: #e4efea;
            border-color: #d8e4de;
            color: #28443b;
        }

        .subnav a:hover {
            background: #e4efea;
            border-color: #d8e4de;
            transform: translateY(-1px);
        }

        .page {
            width: 100%;
            margin: 0;
            display: grid;
            gap: 1rem;
        }

        .panel {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow-soft);
            padding: 1rem;
        }

        .hero {
            display: grid;
            grid-template-columns: 210px 1fr;
            gap: 1rem;
            align-items: center;
        }

        .cover {
            order: 1;
            border-radius: 18px;
            min-height: 140px;
            background:
                linear-gradient(160deg, #2f4f77, #244468 70%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.08) 0 8px, transparent 8px 16px);
            color: #fff;
            padding: 1rem;
            display: grid;
            align-content: end;
            font-family: "Sora", sans-serif;
            font-weight: 800;
            letter-spacing: 0.4px;
            line-height: 1.05;
            font-size: 1.85rem;
            box-shadow: var(--shadow-card);
            text-transform: uppercase;
        }

        .hero > div:last-child {
            order: 2;
            display: grid;
            align-content: center;
        }

        .hero h1 {
            font-family: "Sora", sans-serif;
            font-size: clamp(1.7rem, 4vw, 3rem);
            line-height: 1.1;
            margin-bottom: 0.45rem;
            color: #182621;
        }

        .hero-meta {
            color: #6e7f78;
            font-weight: 700;
            margin: 0.2rem 0 0.3rem;
            font-size: 1.03rem;
        }

        .hero-stats {
            display: grid;
            gap: 0.3rem;
            color: #2f4868;
            font-weight: 600;
            margin-bottom: 0.7rem;
        }

        .top-actions {
            display: flex;
            justify-content: flex-start;
            margin-top: 0.25rem;
        }

        .back-btn {
            border: 1px solid #d2e6dc;
            background: #fff;
            color: #185041;
            border-radius: 12px;
            min-height: 44px;
            padding: 0 1rem;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
        }

        .back-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 10px rgba(14, 97, 80, 0.08);
        }

        .practice-wrap h2 {
            font-family: "Sora", sans-serif;
            font-size: 2.08rem;
            margin-bottom: 0.95rem;
            color: #184c3f;
            letter-spacing: -0.01em;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.8rem;
        }

        .module-card {
            border-radius: 18px;
            border: 1px solid #d8e4de;
            border-top: 5px solid #cad0c9;
            padding: 0.9rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(245, 249, 247, 0.96));
            backdrop-filter: blur(3px);
            display: grid;
            gap: 0.75rem;
            min-height: 250px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-card);
        }

        .module-card h3 {
            font-size: 1.62rem;
            line-height: 1.02;
            font-family: "Sora", sans-serif;
            color: #213129;
        }

        .module-card p {
            color: #5a6d66;
            font-size: 0.92rem;
        }

        .module-card.listening { border-top-color: var(--listening); }
        .module-card.reading { border-top-color: var(--reading); }
        .module-card.writing { border-top-color: var(--writing); }
        .module-card.speaking { border-top-color: var(--speaking); }

        .module-card.listening {
            border-color: #b9e7f2;
            background: linear-gradient(180deg, #ffffff 0%, #f0fbff 100%);
        }

        .module-card.reading {
            border-color: #c5e7ce;
            background: linear-gradient(180deg, #ffffff 0%, #f2fbf4 100%);
        }

        .module-card.writing {
            border-color: #f1dfbf;
            background: linear-gradient(180deg, #ffffff 0%, #fff7ec 100%);
        }

        .module-card.speaking {
            border-color: #ecc7d8;
            background: linear-gradient(180deg, #ffffff 0%, #fff3f8 100%);
        }

        .score-ring {
            width: 104px;
            height: 104px;
            border-radius: 30% 70% 60% 40% / 50% 45% 55% 50%;
            border: 4px solid #d9e4f1;
            display: grid;
            place-items: center;
            margin: 0.1rem auto 0.2rem;
            font-size: 1.2rem;
            font-weight: 800;
            color: #1c3a5a;
            background: var(--paper);
        }

        .module-card.listening .score-ring {
            border-color: rgba(30, 167, 198, 0.35);
            color: #1d7289;
        }

        .module-card.reading .score-ring {
            border-color: rgba(63, 155, 90, 0.35);
            color: #2f6e41;
        }

        .module-card.writing .score-ring {
            border-color: rgba(227, 154, 51, 0.35);
            color: #9e6820;
        }

        .module-card.speaking .score-ring {
            border-color: rgba(180, 77, 122, 0.35);
            color: #8f3b5f;
        }

        .btn {
            border: none;
            border-radius: 12px;
            min-height: 45px;
            padding: 0.55rem 1rem;
            font: inherit;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.01em;
            box-shadow: 0 8px 16px rgba(30, 35, 31, 0.14);
            transition: filter 0.16s ease, transform 0.16s ease;
        }

        .btn:hover {
            filter: brightness(1.04);
            transform: translateY(-1px);
        }

        .btn.listening { background: linear-gradient(140deg, #1ea7c6, #47bdd6); }
        .btn.reading { background: linear-gradient(140deg, #3f9b5a, #5eb877); }
        .btn.writing { background: linear-gradient(140deg, #e39a33, #efb159); }
        .btn.speaking { background: linear-gradient(140deg, #b44d7a, #cb7098); }

        .mini-row {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.15rem;
        }

        .mini-btn {
            min-height: 34px;
            padding: 0 0.72rem;
            border-radius: 999px;
            border: 1px solid #cad8e8;
            background: #fff;
            color: #435f80;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .mini-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }

        .mini-btn[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .full-box {
            margin-top: 0.8rem;
            border: 1px solid #c4d4e6;
            border-radius: 18px;
            background: #eff4fa;
            padding: 0.95rem;
            display: grid;
            grid-template-columns: 1fr minmax(190px, 320px) auto;
            gap: 0.8rem;
            align-items: center;
        }

        .full-box strong {
            font-size: 2.05rem;
            color: #2d4f76;
            font-family: "Sora", sans-serif;
            letter-spacing: -0.01em;
        }

        .progress {
            height: 18px;
            border-radius: 999px;
            border: 2px solid #587aa2;
            background: linear-gradient(180deg, #ffffff, #f1f5fb);
            position: relative;
        }

        .progress span {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 0.77rem;
            font-weight: 700;
            color: #29466a;
        }

        .full-start {
            border: none;
            border-radius: 12px;
            color: #fff;
            min-height: 48px;
            padding: 0.55rem 1.4rem;
            font: inherit;
            background: linear-gradient(140deg, #355f9d, #4d79ba);
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(35, 77, 134, 0.28);
            transition: filter 0.16s ease, transform 0.16s ease;
        }

        .full-start:hover {
            filter: brightness(1.04);
            transform: translateY(-1px);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(20, 38, 59, 0.45);
            display: grid;
            place-items: center;
            padding: 1rem;
            z-index: 80;
        }

        .modal.hidden { display: none; }

        .modal-card {
            width: min(760px, 100%);
            max-height: 84vh;
            overflow: auto;
            border-radius: 16px;
            border: 1px solid #cad7e8;
            background: #fff;
            padding: 1rem;
            display: grid;
            gap: 0.75rem;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.2);
        }

        .modal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .modal-top h4 {
            font-family: "Sora", sans-serif;
            font-size: 1.32rem;
            color: #24415f;
        }

        .close-btn {
            border: 1px solid #c2d2e5;
            background: #fff;
            border-radius: 10px;
            min-height: 40px;
            padding: 0.4rem 0.8rem;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .set-group {
            border: 1px solid #dbe4f0;
            border-radius: 12px;
            padding: 0.75rem;
            background: #fbfdff;
        }

        .set-group h5 {
            margin-bottom: 0.3rem;
            color: #2d4c70;
        }

        .set-group p {
            margin-bottom: 0.35rem;
            color: #5f7795;
            font-size: 0.9rem;
        }

        .set-group ul {
            padding-left: 1rem;
            display: grid;
            gap: 0.3rem;
            color: #324a66;
            font-size: 0.93rem;
        }

        @media (max-width: 920px) {
            .sidebar-inner {
                min-height: auto;
                padding: 0.75rem 0;
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .hero {
                grid-template-columns: 1fr;
            }

            .cover {
                order: 1;
                min-height: 110px;
                font-size: 1.55rem;
            }

            .hero > div:last-child {
                order: 2;
            }

            .module-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .full-box {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            .subheader {
                gap: 0.6rem;
            }

            .subheader strong {
                width: 100%;
            }

            .module-grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: clamp(1.5rem, 8vw, 2.2rem);
            }
        }

    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="appSidebar">
            <div class="sidebar-inner">
                <div class="brand">
                    <div class="brand-badge"><img src="logo.png" alt="IELTS Check logo"></div>
                </div>
                <ul class="nav-links">
                    <li><a class="nav-link" href="index.html">?? Dashboard</a></li>
                    <li><a class="nav-link active" href="study-plan.html">?? Study Plan</a></li>
                    <li><a class="nav-link" href="developer.html">????? Developer Console</a></li>
                </ul>
            </div>
        </aside>
        <div class="content-wrap">
    <main class="page">
        <section class="panel subheader" aria-label="Study plan section header">
            <strong>?? Study Plan Workspace</strong>
            <div class="subnav">
                <a href="study-plan.html">??? Month Selector</a>
                <a href="study-plan-schedule.html">?? Schedule View</a>
                <a class="active" href="practice-day.html">? Daily Practice</a>
            </div>
        </section>

        <section class="panel">
            <div class="hero">
                <div class="cover">IELTS MOCK TEST</div>
                <div>
                    <h1 id="dayTitle">IELTS Mock Test</h1>
                    <p class="hero-meta">Rating 4.3 / 5.0 (1,056 votes)</p>
                    <div class="hero-stats">
                        <span id="publishedLine">Published on: --</span>
                        <span id="takenLine">Tests taken: 0</span>
                    </div>
                    <div class="top-actions"><a class="back-btn" href="study-plan.html">Back to Study Plan</a></div>
                </div>
            </div>
        </section>

        <section class="panel practice-wrap">
            <h2>Practice Test</h2>
            <div class="module-grid" id="moduleGrid"></div>
            <div class="full-box">
                <strong>Full Test</strong>
                <div class="progress"><span id="fullProgressText">0%</span></div>
                <button class="full-start" type="button" onclick="window.location.href='full-package-test.html'">Start Full Test</button>
            </div>
        </section>
    </main>
        </div>
    </div>

    <div class="modal hidden" id="modal" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-top">
                <h4 id="modalTitle">Preview</h4>
                <button class="close-btn" type="button" onclick="closeModal()">Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const TEST_RESULTS_KEY = "prephaven_test_results_v1";
        const DAILY_TEST_KEY = "prephaven_daily_tests_v1";
        const MODULES = ["listening", "reading", "writing", "speaking"];

        const MODULE_META = {
            listening: { icon: "??", label: "Listening", colorClass: "listening", url: "listening-test.html" },
            reading: { icon: "??", label: "Reading", colorClass: "reading", url: "reading-test.html" },
            writing: { icon: "??", label: "Writing", colorClass: "writing", url: "writing-test.html" },
            speaking: { icon: "???", label: "Speaking", colorClass: "speaking", url: "speaking-test.html" }
        };

        const SAMPLE_PROBLEM_SETS = {
            listening: {
                title: "Listening Sample Set",
                groups: [{ title: "Section 1", instruction: "Answer based on travel booking conversation.", questions: ["Destination of the customer", "Length of stay", "Preferred accommodation"] }]
            },
            reading: {
                title: "Reading Sample Set",
                groups: [{ title: "Passage Questions", instruction: "True / False / Not Given and short answers.", questions: ["Drais invention propelled by pedals?", "Nickname of velocipede", "Who invented pneumatic tire?"] }]
            },
            writing: {
                title: "Writing Sample Set",
                groups: [{ title: "Task 1", instruction: "Write at least 150 words from chart prompt.", questions: ["Summarize key features", "Compare major sectors", "Give overview statement"] }]
            },
            speaking: {
                title: "Speaking Sample Set",
                groups: [{ title: "Parts 1-3", instruction: "Interview, cue card, and follow-up discussion.", questions: ["Part 1 personal questions", "Part 2 cue card response", "Part 3 analytical discussion"] }]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const DATE_PARAM = params.get("date") || toDateId(new Date());

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw) || fallback;
            } catch (error) {
                return fallback;
            }
        }

        function toDateId(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, "0");
            const d = String(dateObj.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        function formatLongDate(dateId) {
            const [y, m, d] = dateId.split("-").map(Number);
            const dt = new Date(y, m - 1, d);
            const monthLabel = dt.toLocaleString("en-US", { month: "long" });
            return `${d} ${monthLabel} ${y}`;
        }

        function getDailyStore() {
            return safeParse(localStorage.getItem(DAILY_TEST_KEY), {});
        }

        function saveDailyStore(store) {
            localStorage.setItem(DAILY_TEST_KEY, JSON.stringify(store));
        }

        function getDefaultModuleState() {
            return { taken: false, score: null, attempts: 0, lastTakenAt: null, history: [] };
        }

        function ensureDateState(store, dateKey) {
            if (!store[dateKey]) {
                store[dateKey] = {
                    date: dateKey,
                    modules: {
                        listening: getDefaultModuleState(),
                        reading: getDefaultModuleState(),
                        writing: getDefaultModuleState(),
                        speaking: getDefaultModuleState()
                    }
                };
            }
            MODULES.forEach((module) => {
                if (!store[dateKey].modules[module]) {
                    store[dateKey].modules[module] = getDefaultModuleState();
                }
            });
            return store[dateKey];
        }

        function getReturnUrl() {
            return `practice-day.html?date=${encodeURIComponent(DATE_PARAM)}`;
        }

        function openKeyPreview(module) {
            const data = SAMPLE_PROBLEM_SETS[module];
            if (!data) return;

            const title = document.getElementById("modalTitle");
            const body = document.getElementById("modalBody");
            title.textContent = data.title;
            body.innerHTML = "";

            data.groups.forEach((group) => {
                const section = document.createElement("section");
                section.className = "set-group";
                section.innerHTML = `<h5>${group.title}</h5><p>${group.instruction}</p>`;

                const ul = document.createElement("ul");
                group.questions.forEach((q) => {
                    const li = document.createElement("li");
                    li.textContent = q;
                    ul.appendChild(li);
                });
                section.appendChild(ul);
                body.appendChild(section);
            });

            document.getElementById("modal").classList.remove("hidden");
            document.getElementById("modal").setAttribute("aria-hidden", "false");
        }

        function openPreviousDetails(module, moduleState) {
            if (!moduleState.taken) return;
            const title = document.getElementById("modalTitle");
            const body = document.getElementById("modalBody");
            title.textContent = `${MODULE_META[module].label} - Previous Test Details`;

            const history = Array.isArray(moduleState.history) ? moduleState.history : [];
            const lastTaken = moduleState.lastTakenAt ? new Date(moduleState.lastTakenAt).toLocaleString() : "Unknown";

            body.innerHTML = `
                <section class="set-group">
                    <h5>Latest Result</h5>
                    <p>Score: ${typeof moduleState.score === "number" ? `${moduleState.score}%` : "--"}</p>
                    <p>Attempts: ${moduleState.attempts || 0}</p>
                    <p>Last Taken: ${lastTaken}</p>
                </section>
            `;

            if (history.length > 0) {
                const historyBox = document.createElement("section");
                historyBox.className = "set-group";
                historyBox.innerHTML = "<h5>Attempt History</h5>";

                const ul = document.createElement("ul");
                history.slice().reverse().forEach((attempt, index) => {
                    const li = document.createElement("li");
                    const when = attempt.timestamp ? new Date(attempt.timestamp).toLocaleString() : "Unknown";
                    li.textContent = `#${history.length - index} - ${attempt.score}% (${when})`;
                    ul.appendChild(li);
                });
                historyBox.appendChild(ul);
                body.appendChild(historyBox);
            }

            document.getElementById("modal").classList.remove("hidden");
            document.getElementById("modal").setAttribute("aria-hidden", "false");
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
            document.getElementById("modal").setAttribute("aria-hidden", "true");
        }

        function restartModule(module) {
            const store = getDailyStore();
            const dateState = ensureDateState(store, DATE_PARAM);
            dateState.modules[module] = getDefaultModuleState();
            saveDailyStore(store);
            openTestPage(module);
        }

        function openTestPage(module) {
            const target = MODULE_META[module].url;
            const testParams = new URLSearchParams({ day: DATE_PARAM, returnTo: getReturnUrl() });
            window.location.href = `${target}?${testParams.toString()}`;
        }

        function getTakenCount(dateState) {
            return MODULES.filter((module) => dateState.modules[module].taken).length;
        }

        function renderModules() {
            const testResults = safeParse(localStorage.getItem(TEST_RESULTS_KEY), {});
            const store = getDailyStore();
            const dateState = ensureDateState(store, DATE_PARAM);
            saveDailyStore(store);

            document.getElementById("dayTitle").textContent = `IELTS Mock Test ${formatLongDate(DATE_PARAM)}`;
            document.getElementById("publishedLine").textContent = `Published on: ${formatLongDate(DATE_PARAM)}`;

            const takenCount = getTakenCount(dateState);
            document.getElementById("takenLine").textContent = `Tests taken: ${takenCount}`;
            document.getElementById("fullProgressText").textContent = `${Math.round((takenCount / MODULES.length) * 100)}%`;

            const grid = document.getElementById("moduleGrid");
            grid.innerHTML = "";

            MODULES.forEach((module) => {
                const meta = MODULE_META[module];
                const moduleState = dateState.modules[module];
                const latest = testResults[module] && typeof testResults[module].score === "number" ? Math.round(testResults[module].score) : null;

                if (!moduleState.taken && latest !== null) {
                    moduleState.score = latest;
                }

                const card = document.createElement("article");
                card.className = `module-card ${meta.colorClass}`;

                const title = document.createElement("h3");
                title.textContent = `${meta.icon} ${meta.label}`;
                card.appendChild(title);

                const hint = document.createElement("p");
                hint.textContent = moduleState.taken ? "Completed for this date." : "Start this module for the selected date.";
                card.appendChild(hint);

                const score = document.createElement("div");
                score.className = "score-ring";
                score.textContent = moduleState.taken && typeof moduleState.score === "number" ? `${moduleState.score}%` : "--";
                card.appendChild(score);

                const action = document.createElement("button");
                action.type = "button";
                action.className = `btn ${meta.colorClass}`;
                action.textContent = moduleState.taken ? "Retake" : "Take Test";
                action.addEventListener("click", () => {
                    if (moduleState.taken) {
                        restartModule(module);
                    } else {
                        openTestPage(module);
                    }
                });
                card.appendChild(action);

                const miniRow = document.createElement("div");
                miniRow.className = "mini-row";

                const keyBtn = document.createElement("button");
                keyBtn.type = "button";
                keyBtn.className = "mini-btn";
                keyBtn.title = "View key answer preview";
                keyBtn.textContent = "Key";
                keyBtn.addEventListener("click", () => openKeyPreview(module));
                miniRow.appendChild(keyBtn);

                const detailBtn = document.createElement("button");
                detailBtn.type = "button";
                detailBtn.className = "mini-btn";
                detailBtn.title = "View previous test details";
                detailBtn.textContent = "Logs";
                detailBtn.disabled = !moduleState.taken;
                detailBtn.addEventListener("click", () => openPreviousDetails(module, moduleState));
                miniRow.appendChild(detailBtn);

                card.appendChild(miniRow);
                grid.appendChild(card);
            });

            saveDailyStore(store);
        }

        document.getElementById("modal").addEventListener("click", function (event) {
            if (event.target.id === "modal") {
                closeModal();
            }
        });

        renderModules();
    </script>
</body>
</html>
