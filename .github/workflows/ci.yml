name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r apps/api-gateway/requirements.txt

      - name: Python syntax checks
        run: |
          python -m py_compile ai_review_server.py data_storage_server.py
          python -m py_compile apps/api-gateway/main.py apps/api-gateway/config.py apps/api-gateway/schemas.py apps/api-gateway/routes/chat.py apps/api-gateway/routes/evaluation.py apps/api-gateway/routes/health.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Functions lint
        working-directory: functions
        run: npm run lint

      - name: Functions tests
        working-directory: functions
        run: npm test

      - name: Functions build
        working-directory: functions
        run: npm run build

      - name: Dependency audit (runtime)
        working-directory: functions
        run: npm audit --omit=dev --audit-level=high
