    <script>
        const PARTS = [
            { id: 1, name: "Part A: Structure", range: "Questions 1-15", instr: "<strong>Directions</strong>: These questions are incomplete sentences. Beneath each sentence you will see four words or phrases, marked (A), (B), (C), and (D). Choose the one word or phrase that best completes the sentence." },
            { id: 2, name: "Part B: Written Expression", range: "Questions 16-40", instr: "<strong>Directions:</strong> In these questions, each sentence has four underlined words or phrases. Identify the one underlined word or phrase that must be changed in order for the sentence to be correct." }
        ];
        const SETS_KEY = "toefl_developer_sets_v1";
        const SETS_KEY_V2 = "toefl_developer_sets_v2";
        const MODULE_ID = "structure";
        const MODULE_LABEL = "Structure";
        const DRAFT_KEY = "toefl_section2_dev_draft_v1";
        const ONBOARDING_KEY_BASE = "toefl_section2_onboarding_seen_v1";
        const DARK_MODE_KEY = "toefl_section2_dark_mode_v1";
        const TEXT_SIZE_KEY = "toefl_section2_text_size_v1";
        let currentSetId = "";

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw) || fallback;
            } catch {
                return fallback;
            }
        }

        function getStoredSetMap() {
            const parsedV2 = safeParse(localStorage.getItem(SETS_KEY_V2), {});
            const hasV2 = parsedV2 && typeof parsedV2 === "object" && Object.keys(parsedV2).length > 0;
            const parsed = hasV2 ? parsedV2 : safeParse(localStorage.getItem(SETS_KEY), {});
            if (Array.isArray(parsed)) {
                return parsed.reduce((accumulator, item) => {
                    const key = item?.setId || item?.module;
                    if (item && key) accumulator[key] = item;
                    return accumulator;
                }, {});
            }
            return parsed && typeof parsed === "object" ? parsed : {};
        }

        function persistStoredSetMap(map) {
            localStorage.setItem(SETS_KEY_V2, JSON.stringify(map));
        }

        function upsertLocalRecord(record) {
            const map = getStoredSetMap();
            map[record.setId] = record;
            persistStoredSetMap(map);
        }

        function updateEditorUrl(setId, setDate) {
            const params = new URLSearchParams(window.location.search);
            params.set("setId", setId);
            if (setDate) params.set("setDate", setDate);
            const query = params.toString();
            const hash = window.location.hash || "#dev-view";
            window.history.replaceState({}, "", `${window.location.pathname}?${query}${hash}`);
        }

        function ensureCurrentSetId(setDate) {
            if (currentSetId) return currentSetId;
            if (window.toeflStorage && typeof toeflStorage.createSetId === "function") {
                currentSetId = toeflStorage.createSetId(MODULE_ID, setDate);
            } else {
                currentSetId = `${MODULE_ID}_${Date.now()}`;
            }
            return currentSetId;
        }

        async function resolveSetRecordByDate(setDate) {
            try {
                if (window.toeflStorage && typeof toeflStorage.getSetRecords === "function") {
                    const records = await toeflStorage.getSetRecords();
                    const match = (records || [])
                        .filter((item) => item && item.module === MODULE_ID && item.setDate === setDate)
                        .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0];
                    if (match) return match;
                }
            } catch (error) {
                console.warn("[ToeflSync] date-based lookup failed:", error);
            }

            const local = getStoredSetMap();
            return Object.values(local)
                .filter((item) => item && item.module === MODULE_ID && item.setDate === setDate)
                .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0] || null;
        }

        async function resolveLatestSetRecord() {
            try {
                if (window.toeflStorage && typeof toeflStorage.getSetRecords === "function") {
                    const records = await toeflStorage.getSetRecords();
                    const latest = (records || [])
                        .filter((item) => item && item.module === MODULE_ID)
                        .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0];
                    if (latest) return latest;
                }
            } catch (error) {
                console.warn("[ToeflSync] latest-set lookup failed:", error);
            }

            const local = getStoredSetMap();
            return Object.values(local)
                .filter((item) => item && item.module === MODULE_ID)
                .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0] || null;
        }

        function clearSectionDraftInputs() {
            PARTS.forEach((part) => {
                const p = part.id;
                const qEl = document.getElementById(`input-magic-questions-${p}`);
                const aEl = document.getElementById(`input-answer-key-${p}`);
                const eEl = document.getElementById(`input-explanation-${p}`);
                const vEl = document.getElementById(`input-video-step-${p}`);
                if (qEl) qEl.value = "";
                if (aEl) aEl.value = "";
                if (eEl) eEl.value = "";
                if (vEl) vEl.value = "";
            });
            syncPartBRichEditorFromTextarea();
        }

        function parseIndexedLineMap(rawText) {
            const output = {};
            String(rawText || "").split('\n').forEach((line) => {
                const match = line.match(/^\s*(\d+)[\.\)]?\s+(.+)$/);
                if (!match) return;
                const number = Number(match[1]);
                const value = String(match[2] || "").trim();
                if (!Number.isFinite(number) || !value) return;
                output[number] = value;
            });
            return output;
        }

        async function handleSetDateChange() {
            const dateInput = document.getElementById("set-date");
            const selectedDate = dateInput?.value;
            if (!selectedDate) return;

            const existing = await resolveSetRecordByDate(selectedDate).catch(() => null);
            if (existing?.setId) {
                currentSetId = existing.setId;
                upsertLocalRecord(existing);
                updateEditorUrl(currentSetId, selectedDate);
                updateHeaderPackageLabel(selectedDate);
                await loadSectionDraft();
                updateUserView();
                return;
            }

            currentSetId = "";
            clearSectionDraftInputs();
            await saveSectionMeta();
            updateUserView();
        }

        function saveSectionDraft() {
            syncPartBRichEditorToTextarea();
            const draft = { parts: {} };
            PARTS.forEach((part) => {
                const p = part.id;
                draft.parts[p] = {
                    questions: (document.getElementById(`input-magic-questions-${p}`) || {}).value || "",
                    answerKey: (document.getElementById(`input-answer-key-${p}`) || {}).value || "",
                    explanation: (document.getElementById(`input-explanation-${p}`) || {}).value || "",
                    videoStep: (document.getElementById(`input-video-step-${p}`) || {}).value || ""
                };
            });
            localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
            if (window.toeflStorage) {
                const setDate = (document.getElementById("set-date") || {}).value || new Date().toISOString().split("T")[0];
                const setId = ensureCurrentSetId(setDate);
                toeflStorage.saveDraftBySetId(setId, MODULE_ID, draft).catch((e) => console.warn("[ToeflSync] draft save failed:", e));
            }
        }

        async function loadSectionDraft() {
            if (!currentSetId) {
                // New set flow should always start blank.
                return;
            }
            let draft = {};
            if (window.toeflStorage) {
                try {
                    if (currentSetId) {
                        draft = await toeflStorage.getDraftBySetId(currentSetId);
                    }
                } catch { /* fallback below */ }
            }
            if (!draft || typeof draft !== "object" || !draft.parts) return;

            PARTS.forEach((part) => {
                const p = part.id;
                const row = draft.parts[p] || {};
                const qEl = document.getElementById(`input-magic-questions-${p}`);
                const aEl = document.getElementById(`input-answer-key-${p}`);
                const eEl = document.getElementById(`input-explanation-${p}`);
                const vEl = document.getElementById(`input-video-step-${p}`);
                if (qEl && typeof row.questions === "string") qEl.value = row.questions;
                if (aEl && typeof row.answerKey === "string") aEl.value = row.answerKey;
                if (eEl && typeof row.explanation === "string") eEl.value = row.explanation;
                if (vEl && typeof row.videoStep === "string") vEl.value = row.videoStep;
            });

            syncPartBRichEditorFromTextarea();
        }

        async function loadSectionMeta() {
            const dateInput = document.getElementById("set-date");
            const difficultyInput = document.getElementById("set-difficulty");
            const params = new URLSearchParams(window.location.search);
            const requestedDate = params.get("setDate");
            currentSetId = params.get("setId") || "";
            let stored = {};
            if (!currentSetId && requestedDate) {
                const byDate = await resolveSetRecordByDate(requestedDate);
                if (byDate?.setId) {
                    currentSetId = byDate.setId;
                    stored = byDate;
                }
            }
            if (!currentSetId && !requestedDate) {
                const latest = await resolveLatestSetRecord();
                if (latest?.setId) {
                    currentSetId = latest.setId;
                    stored = latest;
                }
            }
            if (window.toeflStorage) {
                try {
                    if (currentSetId && typeof toeflStorage.getSetRecordById === "function") {
                        stored = await toeflStorage.getSetRecordById(currentSetId) || {};
                    }
                } catch { /* fallback below */ }
            }
            if (!stored.setDate) {
                const local = getStoredSetMap();
                if (currentSetId && local[currentSetId]) {
                    stored = local[currentSetId];
                }
            }
            const today = new Date().toISOString().split("T")[0];
            const effectiveDate = requestedDate || stored.setDate || today;
            if (dateInput) dateInput.value = effectiveDate;
            if (difficultyInput) difficultyInput.value = stored.difficulty || "intermediate";
            updateHeaderPackageLabel(effectiveDate);
        }

        async function saveSectionMeta() {
            const dateInput = document.getElementById("set-date");
            const difficultyInput = document.getElementById("set-difficulty");
            const setDate = dateInput.value || new Date().toISOString().split("T")[0];
            updateHeaderPackageLabel(setDate);
            const setId = ensureCurrentSetId(setDate);
            const record = {
                setId,
                module: MODULE_ID,
                label: MODULE_LABEL,
                setDate,
                difficulty: difficultyInput.value || "intermediate",
                updatedAt: new Date().toISOString()
            };
            upsertLocalRecord(record);
            updateEditorUrl(setId, setDate);
            if (window.toeflStorage && typeof toeflStorage.upsertSetRecord === "function") {
                try {
                    await toeflStorage.upsertSetRecord(record);
                } catch (error) {
                    console.warn("[ToeflSync] set save failed:", error);
                }
            }
        }

        function updateHeaderPackageLabel(dateString) {
            const label = document.getElementById("header-package-label");
            if (!label) return;
            if (!dateString) {
                label.textContent = "Package";
                return;
            }
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) {
                label.textContent = "Package";
                return;
            }
            const day = String(date.getDate()).padStart(2, "0");
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            label.textContent = `Package ${day} ${months[date.getMonth()]}`;
        }

        function updateHeaderProgress() {
            const uids = Object.keys(globalQuestions || {});
            const total = uids.length;
            const partATotal = uids.filter((uid) => uid.startsWith("1_")).length;
            const partBTotal = uids.filter((uid) => uid.startsWith("2_")).length;

            let answered = 0;
            let partAAnswered = 0;
            let partBAnswered = 0;
            uids.forEach((uid) => {
                const checked = document.querySelector(`input[name="q_${uid}"]:checked`);
                if (!checked) return;
                answered += 1;
                if (uid.startsWith("1_")) partAAnswered += 1;
                if (uid.startsWith("2_")) partBAnswered += 1;
            });

            const label = document.getElementById("answered-count-label");
            if (label) {
                const activePart = document.querySelector("#user-view .sub-content.active")?.id;
                if (activePart === "user-part-1") {
                    label.textContent = `Answered ${partAAnswered}/${partATotal}`;
                } else if (activePart === "user-part-2") {
                    label.textContent = `Answered ${partATotal + partBAnswered}/${total}`;
                } else {
                    label.textContent = `Answered ${answered}/${total}`;
                }
            }

            const setBar = (id, done, all) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (!all) {
                    el.style.width = "8px";
                    return;
                }
                const width = Math.max(8, Math.round((done / all) * 146));
                el.style.width = `${width}px`;
            };

            setBar("progress-part-a", partAAnswered, partATotal);
            setBar("progress-part-b", partBAnswered, partBTotal);
        }

        function initStructure() {
            const userContainer = document.getElementById('user-passages-container');
            const userNavContainer = document.getElementById('user-sub-nav-container');
            const devContainer = document.getElementById('dev-panels-container');
            const devNavContainer = document.getElementById('dev-sub-nav-container');

            PARTS.forEach((part) => {
                const p = part.id;
                const directionsTitle = p === 1
                    ? "Part A: Structure"
                    : "Part B: Written Expression Questions";

        function positionListeningHeaderTimer() {
            const header = document.querySelector(".figma-header--listening");
            const timer = header ? header.querySelector(".timer") : null;
            const packageFrame = header ? header.querySelector(".test-package-frame") : null;
            const progressBlock = header ? header.querySelector(".progressbar-final") : null;
            if (!header || !timer || !packageFrame || !progressBlock) return;

            const packageRight = packageFrame.offsetLeft + packageFrame.offsetWidth;
            const progressLeft = progressBlock.offsetLeft;
            const timerWidth = timer.offsetWidth || 0;
            const sidePadding = 16;

            const targetCenterX = (packageRight + progressLeft) / 2;
            const minCenterX = packageRight + (timerWidth / 2) + sidePadding;
            const maxCenterX = progressLeft - (timerWidth / 2) - sidePadding;
            const defaultCenterX = header.offsetWidth / 2;
            const clampedCenterX = maxCenterX < minCenterX
                ? defaultCenterX
                : Math.min(Math.max(targetCenterX, minCenterX), maxCenterX);

            timer.style.left = `${clampedCenterX}px`;
        }

        function formatText(areaId, openTag, closeTag) {
            const el = document.getElementById(areaId);
            if (!el) return;

            if (el.isContentEditable) {
                el.focus();
                if (openTag.toLowerCase() === '<strong>') {
                    document.execCommand('bold', false, null);
                } else if (openTag.toLowerCase() === '<u>') {
                    document.execCommand('underline', false, null);
                }
                syncPartBRichEditorToTextarea();
                return;
            }

            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            el.value = text.substring(0, start) + openTag + text.substring(start, end) + closeTag + text.substring(end);
            el.focus();
        }

        function insertTextAtCursor(textArea, insertText) {
            if (!textArea) return;
            const start = textArea.selectionStart || 0;
            const end = textArea.selectionEnd || start;
            const original = textArea.value || "";
            textArea.value = original.slice(0, start) + insertText + original.slice(end);
            const nextPos = start + insertText.length;
            textArea.selectionStart = nextPos;
            textArea.selectionEnd = nextPos;
            textArea.focus();
        }

        function normalizeClipboardQuestionText(text) {
            return (text || "")
                .replace(/\r\n?/g, "\n")
                .replace(/\u00a0/g, " ")
                .replace(/[ \t]+\n/g, "\n")
                .replace(/\n{3,}/g, "\n\n")
                .trim();
        }

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>\"]/g, (ch) => {
                if (ch === '&') return '&amp;';
                if (ch === '<') return '&lt;';
                if (ch === '>') return '&gt;';
                return '&quot;';
            });
        }

        function normalizePartBRichHtml(html) {
            return String(html || "")
                .replace(/<\/?span[^>]*>/gi, "")
                .replace(/<\/?font[^>]*>/gi, "")
                .replace(/<b\b[^>]*>/gi, "<strong>")
                .replace(/<\/b>/gi, "</strong>")
                .replace(/<div><br><\/div>/gi, "<div></div>");
        }

        function markupToRichEditorHtml(markupText) {
            const safe = escapeHtml(String(markupText || ""));
            const withFormatting = safe
                .replace(/&lt;strong&gt;/gi, "<strong>")
                .replace(/&lt;\/strong&gt;/gi, "</strong>")
                .replace(/&lt;b&gt;/gi, "<strong>")
                .replace(/&lt;\/b&gt;/gi, "</strong>")
                .replace(/&lt;u&gt;/gi, "<u>")
                .replace(/&lt;\/u&gt;/gi, "</u>");

            const lines = withFormatting.split(/\n/);
            return lines.map((line) => `<div>${line || "<br>"}</div>`).join("");
        }

        function stripLiteralTagTextToHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/&lt;\/?\s*strong\s*&gt;/gi, (m) => m.toLowerCase().includes('/strong') ? '</strong>' : '<strong>')
                .replace(/&lt;\/?\s*b\s*&gt;/gi, (m) => m.toLowerCase().includes('/b') ? '</strong>' : '<strong>')
                .replace(/&lt;\/?\s*u\s*&gt;/gi, (m) => m.toLowerCase().includes('/u') ? '</u>' : '<u>')
                .replace(/\n/g, "<br>");
        }

        function syncPartBRichEditorToTextarea() {
            const editor = document.getElementById('input-magic-questions-rich-2');
            const textArea = document.getElementById('input-magic-questions-2');
            if (!editor || !textArea) return;

            let markup = '';
            editor.childNodes.forEach((child) => {
                markup += htmlNodeToQuestionMarkup(child);
            });
            textArea.value = normalizeClipboardQuestionText(markup);
        }

        function syncPartBRichEditorFromTextarea() {
            const editor = document.getElementById('input-magic-questions-rich-2');

        function getPartBRichOptionMap() {
            const editor = document.getElementById('input-magic-questions-rich-2');
            if (!editor) return {};

            const map = {};
            const lineContainer = document.createElement('div');
            lineContainer.innerHTML = editor.innerHTML;

            const blocks = Array.from(lineContainer.querySelectorAll('div,p,li'));
            blocks.forEach((block) => {
                const text = normalizeClipboardQuestionText(block.textContent || '');
                const qMatch = text.match(/^(\d+)[\.\)]?\s+/);
                if (!qMatch) return;
                const qNum = qMatch[1];
                const strongNodes = Array.from(block.querySelectorAll('strong,b'));
                if (!strongNodes.length) return;
                const letters = ['A', 'B', 'C', 'D'];
                map[qNum] = map[qNum] || {};
                for (let i = 0; i < Math.min(strongNodes.length, letters.length); i += 1) {
                    const val = normalizeClipboardQuestionText(strongNodes[i].textContent || '');
                    if (val) map[qNum][letters[i]] = val;
                }
            });
            return map;
        }

        function elementStyleHasWeightBold(element) {
            const style = (element.getAttribute("style") || "").toLowerCase();
            return /font-weight\s*:\s*(bold|[6-9]00)/.test(style);
        }

        function elementStyleHasUnderline(element) {
            const style = (element.getAttribute("style") || "").toLowerCase();
            return /text-decoration[^;]*underline|text-decoration-line\s*:\s*underline/.test(style);
        }

        function htmlNodeToQuestionMarkup(node) {
            if (!node) return "";
            if (node.nodeType === Node.TEXT_NODE) return node.nodeValue || "";
            if (node.nodeType !== Node.ELEMENT_NODE) return "";

            const tag = node.tagName.toLowerCase();
            if (tag === "br") return "\n";

            let inner = "";
            node.childNodes.forEach((child) => {
                inner += htmlNodeToQuestionMarkup(child);
            });

            const isBold = tag === "b" || tag === "strong" || elementStyleHasWeightBold(node);
            const isUnderline = tag === "u" || elementStyleHasUnderline(node);

            if (isUnderline) inner = `<u>${inner}</u>`;
            if (isBold) inner = `<strong>${inner}</strong>`;

            const blockLike = ["p", "div", "li", "tr", "h1", "h2", "h3", "h4", "h5", "h6"];
            if (blockLike.includes(tag)) return `${inner}\n`;
            return inner;
        }

        function convertClipboardHtmlToQuestionMarkup(html, textFallback) {
            const plainText = normalizeClipboardQuestionText(textFallback || "");
            if (!html) {
                return plainText.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
            }

            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");
                const body = doc.body;
                if (!body) return plainText;

                body.querySelectorAll("script,style").forEach((el) => el.remove());
                let markup = "";
                body.childNodes.forEach((child) => {
                    markup += htmlNodeToQuestionMarkup(child);
                });

                const normalized = normalizeClipboardQuestionText(markup);
                return normalized || plainText;
            } catch (_) {
                return plainText;
            }
        }

        function bindPartBRichPasteSupport() {
            const editor = document.getElementById('input-magic-questions-rich-2');
            const textArea = document.getElementById('input-magic-questions-2');
            if (!editor || !textArea || editor.dataset.richPasteBound === '1') return;

            editor.addEventListener('input', () => {
                syncPartBRichEditorToTextarea();
            });

            editor.addEventListener('keydown', (event) => {
                if ((event.ctrlKey || event.metaKey) && (event.key === 'u' || event.key === 'U')) {
                    event.preventDefault();
                    document.execCommand('underline', false, null);
                    syncPartBRichEditorToTextarea();
                }
            });

            editor.addEventListener('paste', (event) => {
                const clipboard = event.clipboardData;
                if (!clipboard) return;

                event.preventDefault();
                const html = clipboard.getData('text/html') || '';
                const text = clipboard.getData('text/plain') || '';

                let insertHtml = '';
                if (html && /<(b|strong|u|span|div|p|li|br)\b/i.test(html)) {
                    const converted = convertClipboardHtmlToQuestionMarkup(html, text);
                    insertHtml = markupToRichEditorHtml(converted);
                } else {
                    insertHtml = stripLiteralTagTextToHtml(text);
                }

                document.execCommand('insertHTML', false, normalizePartBRichHtml(insertHtml));
                syncPartBRichEditorToTextarea();
            });

            editor.dataset.richPasteBound = '1';
        }

        let globalAnswerKey = {};
        let globalExplanations = {};
        let globalQuestions = {};
        let timerInterval;
        let currentQuestionUid = "";

        function refreshStructurePartAState() {
            const partAContainer = document.getElementById("user-part-1");
            if (!partAContainer) return;

            partAContainer.querySelectorAll(".question-item").forEach((card) => {
                const checked = card.querySelector('.radio-group input[type="radio"]:checked');
                const badge = card.querySelector(".question-number-badge");
                if (badge) badge.classList.toggle("is-answered", Boolean(checked));

                card.querySelectorAll(".radio-group label").forEach((label) => {
                    const radio = label.querySelector('input[type="radio"]');
                    const selected = Boolean(radio && radio.checked);
                    label.classList.toggle("selected", selected);
                    label.classList.toggle("d-parent", selected);
                    label.classList.toggle("a-parent", !selected);
                });
            });

            updateQuestionNavigatorState();
            updateHeaderProgress();
        }

        function getPartQuestionNumbers(partId) {
            return Object.keys(globalQuestions)
                .map((uid) => {
                    const [part, number] = uid.split("_").map((token) => parseInt(token, 10));
                    return { uid, part, number };
                })
                .filter((entry) => entry.part === partId && Number.isFinite(entry.number))
                .sort((left, right) => left.number - right.number);
        }

        function scrollToQuestion(uid) {
            if (!uid) return;
            const card = document.getElementById(`q-container-${uid}`);
            if (!card) return;
            const tabName = uid.startsWith("1_") ? "user-part-1" : "user-part-2";
            const navButton = uid.startsWith("1_") ? document.getElementById("btn-nav-1") : document.getElementById("btn-nav-2");
            if (navButton) openSubTab({ currentTarget: navButton }, tabName, "user-sub-btn");
            card.scrollIntoView({ behavior: "smooth", block: "start" });
            currentQuestionUid = uid;
            updateQuestionNavigatorState();
        }

        function buildQuestionNavigator() {
            const partAGrid = document.getElementById("question-grid-part-a");
            const partBGrid = document.getElementById("question-grid-part-b");
            if (!partAGrid || !partBGrid) return;

            partAGrid.innerHTML = "";
            partBGrid.innerHTML = "";

            getPartQuestionNumbers(1).forEach((entry, index) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "question-nav-btn";
                btn.dataset.uid = entry.uid;
                btn.textContent = String(index + 1);
                btn.addEventListener("click", () => scrollToQuestion(entry.uid));
                partAGrid.appendChild(btn);
            });

            getPartQuestionNumbers(2).forEach((entry) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "question-nav-btn";
                btn.dataset.uid = entry.uid;
                btn.textContent = String(entry.number);
                btn.addEventListener("click", () => scrollToQuestion(entry.uid));
                partBGrid.appendChild(btn);
            });

            const firstA = getPartQuestionNumbers(1)[0];
            if (!currentQuestionUid && firstA) currentQuestionUid = firstA.uid;
            updateQuestionNavigatorState();
        }

        function updateQuestionNavigatorState() {
            document.querySelectorAll(".question-nav-btn").forEach((btn) => {
                const uid = btn.dataset.uid;
                if (!uid) return;
                const checked = document.querySelector(`input[name="q_${uid}"]:checked`);
                btn.classList.toggle("is-answered", Boolean(checked));
                btn.classList.toggle("is-current", uid === currentQuestionUid);
            });
        }

        function toggleSection2Navigator(event) {
            if (event) event.stopPropagation();
            const nav = document.getElementById("question-navigator");
            const layout = document.querySelector(".section2-layout");
            if (!nav) return;
            const collapsed = !nav.classList.contains("is-collapsed");
            nav.classList.toggle("is-collapsed", collapsed);
            if (layout) layout.classList.toggle("is-nav-collapsed", collapsed);
        }

        function dismissDirections(btn) {
            const box = btn ? btn.closest(".structure-parta-directions") : null;
            if (box) box.remove();
        }

        function goToNextQuestion() {
            const all = [
                ...getPartQuestionNumbers(1).map((entry) => entry.uid),
                ...getPartQuestionNumbers(2).map((entry) => entry.uid)
            ];
            if (!all.length) return;
            const currentIndex = all.indexOf(currentQuestionUid);
            const nextUid = currentIndex === -1 ? all[0] : all[Math.min(currentIndex + 1, all.length - 1)];
            scrollToQuestion(nextUid);
        }

        function bindUserToolbarActions() {
            const submitBtn = document.getElementById("submit-header-btn");
            const nextQBtn = document.getElementById("navigator-next-question");
            const nextSectionBtn = document.getElementById("navigator-next-section");
            const userContainer = document.getElementById("user-passages-container");

            if (submitBtn) submitBtn.addEventListener("click", submitAnswers);
            if (nextQBtn) nextQBtn.addEventListener("click", goToNextQuestion);
            if (nextSectionBtn) nextSectionBtn.addEventListener("click", () => {
                const btn = document.getElementById("btn-nav-2");
                if (btn) openSubTab({ currentTarget: btn }, "user-part-2", "user-sub-btn");
                const firstB = getPartQuestionNumbers(2)[0];
                if (firstB) scrollToQuestion(firstB.uid);
            });
            if (userContainer) {
                userContainer.addEventListener("change", (event) => {
                    const target = event.target;
                    if (target && target.matches('input[type="radio"]')) {
                        refreshStructurePartAState();
                    }
                });

                userContainer.addEventListener("dblclick", (event) => {
                    const clickableLabel = event.target.closest("label");
                    if (!clickableLabel) return;

                    let radio = null;
                    if (clickableLabel.hasAttribute("for")) {
                        radio = document.getElementById(clickableLabel.getAttribute("for"));
                    } else {
                        radio = clickableLabel.querySelector('input[type="radio"]');
                    }

                    if (!radio || radio.type !== "radio" || !radio.checked) return;

                    event.preventDefault();
                    event.stopPropagation();

                    // Let native click/dblclick behavior finish first, then force clear.
                    setTimeout(() => {
                        radio.checked = false;
                        refreshStructurePartAState();
                    }, 0);
                });
            }
        }

        // ENGINE PARSER BARU UNTUK INLINE CLICKABLE & HURUF DI BAWAH
        function updateUserView(shouldSaveMeta = false) {
            if (shouldSaveMeta) {
                saveSectionMeta();
                saveSectionDraft();
            }
            document.getElementById('global-score-board').style.display = 'none';
            globalAnswerKey = {};
            globalExplanations = {};
            globalQuestions = {};

            PARTS.forEach((part) => {
                let p = part.id;

                const answerKeyEl = document.getElementById(`input-answer-key-${p}`);
                const explanationEl = document.getElementById(`input-explanation-${p}`);
                const questionsEl = document.getElementById(`input-magic-questions-${p}`);
                const displayEl = document.getElementById(`display-questions-${p}`);
                if (!answerKeyEl || !explanationEl || !questionsEl || !displayEl) return;

                if (p === 2) syncPartBRichEditorToTextarea();
                const partBRichOptionMap = p === 2 ? getPartBRichOptionMap() : {};

                answerKeyEl.value.split('\n').forEach(l => {
                    let m = l.match(/^(\d+)[\.\)]?\s+(.*)/);
                    if(m) globalAnswerKey[`${p}_${m[1]}`] = m[2].trim().toLowerCase();
                });

                let currentExpNum = null;
                explanationEl.value.split('\n').forEach(l => {
                    let m = l.match(/^(\d+)[\.\)]?\s+(.*)/);
                    if(m) { currentExpNum = `${p}_${m[1]}`; globalExplanations[currentExpNum] = m[2].trim(); }
                    else if(currentExpNum && l.trim()) globalExplanations[currentExpNum] += "<br>" + l.trim();
                });

                const lines = questionsEl.value.split('\n');
                let cleanHtml = '';
                let openDiv = false;
                let currentUID = '';
                let currentQuestionIsPartB = false;

                for (let line of lines) {
                    let rawLine = line.trim();
                    if (!rawLine) continue;
                    
                    let qMatch = rawLine.match(/^(?:<[^>]+>)*(\d+)[\.\)]?\s+(.*)/);
                    let isOption = rawLine.match(/^[\(]?([A-D])[\.\)]?\s+(.*)/i);

                    if (qMatch && !isOption) {
                        if (openDiv) cleanHtml += `</div><div class="feedback" id="feedback-${currentUID}"></div></div></div>`;
                        let currentQuestionNum = qMatch[1];
                        currentUID = `${p}_${currentQuestionNum}`;
                        let questionText = qMatch[2];
                        const hasUnderlinedMarkup = /<u>/i.test(questionText);
                        const hasInlinePartBMarkers = /\(A\).*\(B\).*\(C\).*\(D\)/i.test(questionText);
                        currentQuestionIsPartB = (p === 2) && (hasUnderlinedMarkup || hasInlinePartBMarkers);

                        cleanHtml += `<div class="question-item frame-parent" id="q-container-${currentUID}">`;

                        // CEK APAKAH INI SOAL PART B (Memiliki garis bawah <u>)
                        if (currentQuestionIsPartB) {
                            
                            let parsedText = '';
                            const partBOpts = {};

                            if (hasUnderlinedMarkup) {
                                // 1. Bersihkan pengetikan manual developer (A), (B), (C), (D) yang menempel sebelum/sesudah tag <u>
                                // Contoh: <u>word</u> (A) atau (B) <u>word</u> akan dibersihkan A dan B nya.
                                questionText = questionText.replace(/\s*\([A-D]\)\s*<u>/gi, ' <u>').replace(/<\/u>\s*\([A-D]\)\s*/gi, '</u> ');
                                questionText = questionText.replace(/\s*[A-D]\.\s*<u>/gi, ' <u>').replace(/<\/u>\s*[A-D]\.\s*/gi, '</u> ');

                                let optIndex = 0;
                                const letters = ['A', 'B', 'C', 'D'];

                                // 2. Ganti tag <u> menjadi kotak struktur berisikan huruf di bawahnya
                                parsedText = questionText.replace(/<u>(.*?)<\/u>/gi, (match, word) => {
                                    if (optIndex > 3) return match; // Maksimal D

                                    // Bersihkan lagi jika (A) masuk di DALAM tag <u>
                                    const cleanWord = word.replace(/^\([A-D]\)\s*/i, '').replace(/\s*\([A-D]\)$/i, '').trim();
                                    const letter = letters[optIndex];
                                    const val = letter.toLowerCase();
                                    partBOpts[letter] = cleanWord;

                                    const html = `<span class="inline-error-wrapper">
                                                <input type="radio" name="q_${currentUID}" id="q_${currentUID}_${val}" value="${val}">
                                                <label for="q_${currentUID}_${val}" class="error-label">
                                                    <span class="word-text">${cleanWord}</span>
                                                    <span class="letter-badge">${letter}</span>
                                                </label>
                                            </span>`;
                                    optIndex++;
                                    return html;
                                });
                            } else {
                                // Support format: The (A) word ... (B) phrase ... (C) ... (D) ...
                                const markerRegex = /\(([A-D])\)\s*/gi;
                                const markers = [];
                                let mm;
                                while ((mm = markerRegex.exec(questionText)) !== null) {
                                    markers.push({ letter: mm[1].toUpperCase(), start: mm.index, after: markerRegex.lastIndex });
                                }

                                if (markers.length === 4) {
                                    let cursor = 0;
                                    let htmlOut = '';
                                    markers.forEach((marker, idx) => {
                                        const nextStart = idx < markers.length - 1 ? markers[idx + 1].start : questionText.length;
                                        const before = questionText.slice(cursor, marker.start);
                                        const rawChunk = questionText.slice(marker.after, nextStart);
                                        const cleanWord = rawChunk.trim().replace(/\s+/g, ' ');
                                        const val = marker.letter.toLowerCase();
                                        const domBoldText = (partBRichOptionMap[currentQuestionNum] && partBRichOptionMap[currentQuestionNum][marker.letter]) || '';
                                        const boldMatch = rawChunk.match(/<(?:strong|b)>([\s\S]*?)<\/(?:strong|b)>/i);

                                        htmlOut += before;
                                        if (domBoldText || boldMatch) {
                                            const hasBoldMatch = Boolean(boldMatch);
                                            const chunkPrefix = hasBoldMatch ? rawChunk.slice(0, boldMatch.index) : '';
                                            const chunkBoldText = domBoldText || (boldMatch[1] || '').replace(/<[^>]+>/g, '').trim();
                                            const chunkSuffix = hasBoldMatch ? rawChunk.slice((boldMatch.index || 0) + boldMatch[0].length) : '';
                                            const safeBoldText = chunkBoldText || cleanWord.replace(/[\s.,;:!?]+$/g, '');
                                            partBOpts[marker.letter] = safeBoldText;

                                            htmlOut += chunkPrefix;
                                            htmlOut += `<span class="inline-error-wrapper">
                                                <input type="radio" name="q_${currentUID}" id="q_${currentUID}_${val}" value="${val}">
                                                <label for="q_${currentUID}_${val}" class="error-label">
                                                    <span class="word-text">${safeBoldText}</span>
                                                    <span class="letter-badge">${marker.letter}</span>
                                                </label>
                                            </span>`;
                                            htmlOut += chunkSuffix;
                                        } else {
                                            partBOpts[marker.letter] = cleanWord.replace(/[\s.,;:!?]+$/g, '');
                                            htmlOut += `<span class="inline-error-wrapper">
                                                <input type="radio" name="q_${currentUID}" id="q_${currentUID}_${val}" value="${val}">
                                                <label for="q_${currentUID}_${val}" class="error-label">
                                                    <span class="word-text">${cleanWord}</span>
                                                    <span class="letter-badge">${marker.letter}</span>
                                                </label>
                                            </span>`;
                                        }
                                        cursor = nextStart;
                                    });
                                    htmlOut += questionText.slice(cursor);
                                    parsedText = htmlOut.replace(/\s{2,}/g, ' ');
                                } else {
                                    // Fallback: render plain text jika format marker tidak lengkap
                                    parsedText = questionText;
                                }
                            }

                            const plainSentence = questionText
                                .replace(/<u>/gi, '')
                                .replace(/<\/u>/gi, '')
                                .replace(/\([A-D]\)\s*/gi, '')
                                .replace(/<[^>]+>/g, '')
                                .replace(/\s{2,}/g, ' ')
                                .trim();
                            globalQuestions[currentUID] = { questionText: `${currentQuestionNum}. ${plainSentence}`, options: partBOpts, isPartB: true };

                            cleanHtml += `<div class="question-number-badge">${currentQuestionNum}</div>`;
                            cleanHtml += `<div class="question-content question-content--partb">`;
                            cleanHtml += `<p class="inline-question-text">${parsedText}</p>`;
                            cleanHtml += `</div>`;
                            openDiv = true;
                        } else {
                            // SOAL PART A BIASA
                            globalQuestions[currentUID] = { questionText: `${currentQuestionNum}. ${questionText}`, options: {}, isPartB: false };
                            const displayQuestion = questionText.replace(/_{3,}/, '<span class="question-blank">_____</span>');
                            cleanHtml += `<div class="question-number-badge">${currentQuestionNum}</div>`;
                            cleanHtml += `<div class="question-content">`;
                            cleanHtml += `<p class="question-stem">${displayQuestion}</p>`;
                            cleanHtml += `<div class="radio-group">`;
                            openDiv = true;
                        }
                    } else if (isOption && openDiv) {
                        let letter = isOption[1].toUpperCase();
                        if (globalQuestions[currentUID] && !globalQuestions[currentUID].isPartB) {
                            globalQuestions[currentUID].options[letter] = isOption[2];
                        }
                        cleanHtml += `<label class="a-parent">
                            <input type="radio" name="q_${currentUID}" value="${letter.toLowerCase()}" onchange="refreshStructurePartAState()"> 
                            <span class="option-letter">(${letter})</span> 
                            <span class="option-text">${isOption[2]}</span>
                        </label>`;
                    }
                }
                if (openDiv) cleanHtml += `</div><div class="feedback" id="feedback-${currentUID}"></div></div></div>`;

                document.getElementById(`display-questions-${p}`).innerHTML = cleanHtml;
            });
            refreshStructurePartAState();
            buildQuestionNavigator();
            updateHeaderProgress();
            startTimer();
        }

        function submitAnswers() {
            let score = 0;
            let total = Object.keys(globalAnswerKey).length;
            const videoMapByPart = {
                1: parseIndexedLineMap((document.getElementById('input-video-step-1') || {}).value || ''),
                2: parseIndexedLineMap((document.getElementById('input-video-step-2') || {}).value || '')
            };

            if (total === 0) { alert("Data Kunci Jawaban masih kosong. Sistem tidak dapat melakukan penilaian."); return; }
            if (!confirm("Yakin ingin mengakhiri Section 2 dan melihat skor?")) return;

            clearInterval(timerInterval);

            for (let uid in globalAnswerKey) {
                const radio = document.querySelector(`input[name="q_${uid}"]:checked`);
                const userAnswer = radio ? radio.value.trim().toLowerCase() : '';
                if (userAnswer === globalAnswerKey[uid]) score++;
            }

            const scaledScore = Math.round(31 + ((score / total) * (68 - 31)));

            const answeredQs = Object.keys(globalAnswerKey).map(uid => {
                const pId = parseInt(uid.split('_')[0]);
                const qNum = parseInt(uid.split('_')[1]);
                const radio = document.querySelector(`input[name="q_${uid}"]:checked`);
                const userAnswer = radio ? radio.value.trim().toLowerCase() : '';
                const correct = globalAnswerKey[uid];
                const q = globalQuestions[uid] || {};
                const part = PARTS.find(pt => pt.id === pId) || {};
                const videoStepUrl = (videoMapByPart[pId] && videoMapByPart[pId][qNum]) || '';
                return { uid, number: qNum, partId: pId, partName: part.name || '', questionText: q.questionText || `Question ${qNum}`, options: q.options || {}, correctAnswer: correct, userAnswer, isCorrect: userAnswer === correct, isPartB: q.isPartB || false, explanation: globalExplanations[uid] || '', videoStepUrl };
            }).sort((a, b) => a.number - b.number);

            const result = { sectionTitle: "Section 2: Structure and Written Expression", sectionKey: "structure", totalQuestions: total, rawScore: score, scaledScore, submittedAt: new Date().toISOString().slice(0, 10), questions: answeredQs };
            localStorage.setItem('toefl_section2_result', JSON.stringify(result));
            window.location.href = 'section 2-answered.html';
        }

        function startTimer() {
            let t = 1500; 
            clearInterval(timerInterval);
            const timerElement = document.getElementById('time');
            const isDark = document.getElementById("user-view")?.classList.contains("is-dark");
            timerElement.style.color = isDark ? "#E0F2FE" : "#005faa";
            timerInterval = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('time').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(t <= 180) {
                    document.getElementById('time').style.animation = "blink 1s infinite";
                    document.getElementById('time').style.color = "#d32f2f";
                }
                if(--t < 0) { 
                    clearInterval(timerInterval); 
                    alert("Waktu Habis! Jawaban Anda disubmit otomatis.");
                    submitAnswers(); 
                }
            }, 1000);
        }

        window.onload = async () => {
            initStructure();
            syncPartBRichEditorFromTextarea();
            bindPartBRichPasteSupport();
            applyViewMode();
            activateInitialTab();
            bindUserToolbarActions();
            initDarkMode();
            initTextSize();
            updateFullScreenButton();
            document.addEventListener("fullscreenchange", handleFullScreenStateChange);
            try {
                await loadSectionMeta();
                await loadSectionDraft();
                updateUserView();
            } catch (error) {
                console.warn("[Init] Failed to fully restore section data:", error);
            }
            positionListeningHeaderTimer();
            setTimeout(positionListeningHeaderTimer, 60);
            updateOnboardingVisibility();
            updateOnboardingScale();
            window.addEventListener("resize", () => {
                updateOnboardingScale();
                positionListeningHeaderTimer();
            });
            const featuresOverlay = document.getElementById("features-overlay");
            if (featuresOverlay) {
                featuresOverlay.addEventListener("click", handleFeaturesOverlayClick);
            }
            document.addEventListener("keydown", handleFeaturesMenuKeydown);
            const setDateEl = document.getElementById("set-date");
            const setDifficultyEl = document.getElementById("set-difficulty");
            if (setDateEl) setDateEl.addEventListener("change", handleSetDateChange);
            if (setDifficultyEl) setDifficultyEl.addEventListener("change", saveSectionMeta);
        };
