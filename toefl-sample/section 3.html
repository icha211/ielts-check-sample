    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="toefl-storage-sync.js?v=20260506"></script>
    <script>
        const TOTAL_PASSAGES = 5; 
        const SETS_KEY = "toefl_developer_sets_v1";
        const SETS_KEY_V2 = "toefl_developer_sets_v2";
        const MODULE_ID = "reading";
        const MODULE_LABEL = "Reading";
        const DRAFT_KEY = "toefl_section3_dev_draft_v1";
        let currentSetId = "";

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw) || fallback;
            } catch {
                return fallback;
            }
        }

        function getStoredSetMap() {
            const parsedV2 = safeParse(localStorage.getItem(SETS_KEY_V2), {});
            const hasV2 = parsedV2 && typeof parsedV2 === "object" && Object.keys(parsedV2).length > 0;
            const parsed = hasV2 ? parsedV2 : safeParse(localStorage.getItem(SETS_KEY), {});
            if (Array.isArray(parsed)) {
                return parsed.reduce((accumulator, item) => {
                    const key = item?.setId || item?.module;
                    if (item && key) accumulator[key] = item;
                    return accumulator;
                }, {});
            }
            return parsed && typeof parsed === "object" ? parsed : {};
        }

        function persistStoredSetMap(map) {
            localStorage.setItem(SETS_KEY_V2, JSON.stringify(map));
        }

        function upsertLocalRecord(record) {
            const map = getStoredSetMap();
            map[record.setId] = record;
            persistStoredSetMap(map);
        }

        function updateEditorUrl(setId, setDate) {
            const params = new URLSearchParams(window.location.search);
            params.set("setId", setId);
            if (setDate) params.set("setDate", setDate);
            const query = params.toString();
            const hash = window.location.hash || "#dev-view";
            window.history.replaceState({}, "", `${window.location.pathname}?${query}${hash}`);
        }

        function ensureCurrentSetId(setDate) {
            if (currentSetId) return currentSetId;
            if (window.toeflStorage && typeof toeflStorage.createSetId === "function") {
                currentSetId = toeflStorage.createSetId(MODULE_ID, setDate);
            } else {
                currentSetId = `${MODULE_ID}_${Date.now()}`;
            }
            return currentSetId;
        }

        async function resolveSetRecordByDate(setDate) {
            try {
                if (window.toeflStorage && typeof toeflStorage.getSetRecords === "function") {
                    const records = await toeflStorage.getSetRecords();
                    const match = (records || [])
                        .filter((item) => item && item.module === MODULE_ID && item.setDate === setDate)
                        .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0];
                    if (match) return match;
                }
            } catch (error) {
                console.warn("[ToeflSync] date-based lookup failed:", error);
            }

            const local = getStoredSetMap();
            return Object.values(local)
                .filter((item) => item && item.module === MODULE_ID && item.setDate === setDate)
                .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0] || null;
        }

        async function resolveLatestSetRecord() {
            try {
                if (window.toeflStorage && typeof toeflStorage.getSetRecords === "function") {
                    const records = await toeflStorage.getSetRecords();
                    const latest = (records || [])
                        .filter((item) => item && item.module === MODULE_ID)
                        .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0];
                    if (latest) return latest;
                }
            } catch (error) {
                console.warn("[ToeflSync] latest-set lookup failed:", error);
            }

            const local = getStoredSetMap();
            return Object.values(local)
                .filter((item) => item && item.module === MODULE_ID)
                .sort((left, right) => new Date(right.updatedAt || 0).getTime() - new Date(left.updatedAt || 0).getTime())[0] || null;
        }

        function clearSectionDraftInputs() {
            for (let p = 1; p <= TOTAL_PASSAGES; p++) {
                const titleEl = document.getElementById(`input-title-${p}`);
                const passageEl = document.getElementById(`input-passage-${p}`);
                const qEl = document.getElementById(`input-magic-questions-${p}`);
                const aEl = document.getElementById(`input-answer-key-${p}`);
                const eEl = document.getElementById(`input-explanation-${p}`);
                if (titleEl) titleEl.value = "";
                if (passageEl) passageEl.value = "";
                if (qEl) qEl.value = "";
                if (aEl) aEl.value = "";
                if (eEl) eEl.value = "";
            }
        }

        async function handleSetDateChange() {
            const dateInput = document.getElementById("set-date");
            const selectedDate = dateInput?.value;
            if (!selectedDate) return;

            const existing = await resolveSetRecordByDate(selectedDate).catch(() => null);
            if (existing?.setId) {
                currentSetId = existing.setId;
                upsertLocalRecord(existing);
                updateEditorUrl(currentSetId, selectedDate);
                updateHeaderPackageLabel(selectedDate);
                await loadSectionDraft();
                updateUserView();
                return;
            }

            currentSetId = "";
            clearSectionDraftInputs();
            await saveSectionMeta();
            updateUserView();
        }

        function saveSectionDraft() {
            const draft = { passages: {} };
            for (let p = 1; p <= TOTAL_PASSAGES; p++) {
                draft.passages[p] = {
                    title: (document.getElementById(`input-title-${p}`) || {}).value || "",
                    passage: (document.getElementById(`input-passage-${p}`) || {}).value || "",
                    questions: (document.getElementById(`input-magic-questions-${p}`) || {}).value || "",
                    answerKey: (document.getElementById(`input-answer-key-${p}`) || {}).value || "",
                    explanation: (document.getElementById(`input-explanation-${p}`) || {}).value || ""
                };
            }
            localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
            if (window.toeflStorage) {
                const setDate = (document.getElementById("set-date") || {}).value || new Date().toISOString().split("T")[0];
                const setId = ensureCurrentSetId(setDate);
                toeflStorage.saveDraftBySetId(setId, MODULE_ID, draft).catch((e) => console.warn("[ToeflSync] draft save failed:", e));
            }
        }

        async function loadSectionDraft() {
            if (!currentSetId) {
                // New set flow should always start blank.
                return;
            }
            let draft = {};
            if (window.toeflStorage) {
                try {
                    if (currentSetId) {
                        draft = await toeflStorage.getDraftBySetId(currentSetId);
                    }
                } catch { /* fallback below */ }
            }
            if (!draft || typeof draft !== "object" || !draft.passages) return;

            for (let p = 1; p <= TOTAL_PASSAGES; p++) {
                const row = draft.passages[p] || {};
                const titleEl = document.getElementById(`input-title-${p}`);
                const passageEl = document.getElementById(`input-passage-${p}`);
                const qEl = document.getElementById(`input-magic-questions-${p}`);
                const aEl = document.getElementById(`input-answer-key-${p}`);
                const eEl = document.getElementById(`input-explanation-${p}`);

                if (titleEl && typeof row.title === "string") titleEl.value = row.title;
                if (passageEl && typeof row.passage === "string") passageEl.value = row.passage;
                if (qEl && typeof row.questions === "string") qEl.value = row.questions;
                if (aEl && typeof row.answerKey === "string") aEl.value = row.answerKey;
                if (eEl && typeof row.explanation === "string") eEl.value = row.explanation;
            }
        }

        async function loadSectionMeta() {
            const dateInput = document.getElementById("set-date");
            const difficultyInput = document.getElementById("set-difficulty");
            const params = new URLSearchParams(window.location.search);
            const requestedDate = params.get("setDate");
            currentSetId = params.get("setId") || "";
            let stored = {};
            if (!currentSetId && requestedDate) {
                const byDate = await resolveSetRecordByDate(requestedDate);
                if (byDate?.setId) {
                    currentSetId = byDate.setId;
                    stored = byDate;
                }
            }
            if (!currentSetId && !requestedDate) {
                const latest = await resolveLatestSetRecord();
                if (latest?.setId) {
                    currentSetId = latest.setId;
                    stored = latest;
                }
            }
            if (window.toeflStorage) {
                try {
                    if (currentSetId && typeof toeflStorage.getSetRecordById === "function") {
                        stored = await toeflStorage.getSetRecordById(currentSetId) || {};
                    }
                } catch { /* fallback below */ }
            }
            if (!stored.setDate) {
                const local = getStoredSetMap();
                if (currentSetId && local[currentSetId]) {
                    stored = local[currentSetId];
                }
            }
            const today = new Date().toISOString().split("T")[0];
            dateInput.value = requestedDate || stored.setDate || today;
            difficultyInput.value = stored.difficulty || "intermediate";
            updateHeaderPackageLabel(dateInput.value);
        }

        async function saveSectionMeta() {
            const dateInput = document.getElementById("set-date");
            const difficultyInput = document.getElementById("set-difficulty");
            const setDate = dateInput.value || new Date().toISOString().split("T")[0];
            updateHeaderPackageLabel(setDate);
            const setId = ensureCurrentSetId(setDate);
            const record = {
                setId,
                module: MODULE_ID,
                label: MODULE_LABEL,
                setDate,
                difficulty: difficultyInput.value || "intermediate",
                updatedAt: new Date().toISOString()
            };
            upsertLocalRecord(record);
            updateEditorUrl(setId, setDate);
            if (window.toeflStorage && typeof toeflStorage.upsertSetRecord === "function") {
                try {
                    await toeflStorage.upsertSetRecord(record);
                } catch (error) {
                    console.warn("[ToeflSync] set save failed:", error);
                }
            }
        }

        function updateHeaderPackageLabel(dateString) {
            const label = document.getElementById("header-package-label");
            if (!label) return;
            if (!dateString) {
                label.textContent = "Package";
                return;
            }
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) {
                label.textContent = "Package";
                return;
            }
            const day = String(date.getDate()).padStart(2, "0");
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            label.textContent = `Package ${day} ${months[date.getMonth()]}`;
        }

        function updateHeaderProgress() {
            const uids = Object.keys(globalQuestions || {});
            const total = uids.length;
            const answered = uids.reduce((count, uid) => {
                const checked = document.querySelector(`input[name="q_${uid}"]:checked`);
                return count + (checked ? 1 : 0);
            }, 0);

            const label = document.getElementById("answered-count-label");
            if (label) label.textContent = `Answered ${answered}/${total}`;

            const setBar = (id, done, all) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (!all) {
                    el.style.width = "8px";
                    return;
                }
                const width = Math.max(8, Math.round((done / all) * 146));
                el.style.width = `${width}px`;
            };

            setBar("progress-part-a", answered, total);
            setBar("progress-part-b", answered, total);
            setBar("progress-part-c", answered, total);
        }

        function updateFullScreenButton() {
            const fullScreenButton = document.getElementById("fullscreen-btn");
            if (!fullScreenButton) return;
            const isFullScreen = Boolean(document.fullscreenElement);
            fullScreenButton.setAttribute("aria-label", isFullScreen ? "Exit full screen" : "Enter full screen");
            fullScreenButton.classList.toggle("is-active", isFullScreen);
        }

        function handleFullScreenStateChange() {
            updateFullScreenButton();
        }

        async function toggleFullScreenMode() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                } else {
                    await document.exitFullscreen();
                }
            } catch (error) {
                console.warn("[Fullscreen] Unable to toggle full screen:", error);
            } finally {
                handleFullScreenStateChange();
            }
        }

        function setFeaturesMenuOpen(open) {
            const overlay = document.getElementById("features-overlay");
            const triggerButton = document.getElementById("toggle-navigator-btn");
            if (!overlay) return;
            const shouldOpen = Boolean(open);
            overlay.classList.toggle("is-open", shouldOpen);
            overlay.setAttribute("aria-hidden", shouldOpen ? "false" : "true");
            if (triggerButton) triggerButton.classList.toggle("is-active", shouldOpen);
        }

        function toggleFeaturesMenu(event) {
            if (event) event.stopPropagation();
            const overlay = document.getElementById("features-overlay");
            if (!overlay) return;
            setFeaturesMenuOpen(!overlay.classList.contains("is-open"));
        }

        function handleFeaturesOverlayClick(event) {
            if (event.target === event.currentTarget) {
                setFeaturesMenuOpen(false);
            }
        }

        function handleFeaturesMenuKeydown(event) {
            if (event.key === "Escape") {
                setFeaturesMenuOpen(false);
            }
        }

        function positionListeningHeaderTimer() {
            const header = document.querySelector(".figma-header--listening");
            const timer = header ? header.querySelector(".timer") : null;
            const packageFrame = header ? header.querySelector(".test-package-frame") : null;
            const progressBlock = header ? header.querySelector(".progressbar-final") : null;
            if (!header || !timer || !packageFrame || !progressBlock) return;

            const packageRight = packageFrame.offsetLeft + packageFrame.offsetWidth;
            const progressLeft = progressBlock.offsetLeft;
            const timerWidth = timer.offsetWidth || 0;
            const sidePadding = 16;

            const targetCenterX = (packageRight + progressLeft) / 2;
            const minCenterX = packageRight + (timerWidth / 2) + sidePadding;
            const maxCenterX = progressLeft - (timerWidth / 2) - sidePadding;
            const defaultCenterX = header.offsetWidth / 2;
            const clampedCenterX = maxCenterX < minCenterX
                ? defaultCenterX
                : Math.min(Math.max(targetCenterX, minCenterX), maxCenterX);

            timer.style.left = `${clampedCenterX}px`;
        }

        function initStructure() {
            const userContainer = document.getElementById('user-passages-container');
            const userNavContainer = document.getElementById('user-sub-nav-container');
            const devContainer = document.getElementById('dev-panels-container');
            const devNavContainer = document.getElementById('dev-sub-nav-container');

            for (let p = 1; p <= TOTAL_PASSAGES; p++) {
                userContainer.innerHTML += `
                <div id="user-part-${p}" class="sub-content ${p === 1 ? 'active' : ''}">
                    <div class="user-main">
                        <div class="passage-section">
                            <div class="passage-heading" id="display-title-${p}">Questions 1-10</div>
                            <div class="passage-box" id="display-passage-${p}"></div>
                        </div>
                        <div class="question-section">
                            <div id="display-questions-${p}"></div>
                            ${p === TOTAL_PASSAGES ? `<button class="btn-submit-all" onclick="submitAnswers()">Submit Section 3 (Finish Test)</button>` : `<button class="btn-submit-all" style="background:#7f8c8d" onclick="document.getElementById('btn-nav-${p+1}').click()">Next Passage âž”</button>`}
                        </div>
                    </div>
                </div>`;

                userNavContainer.innerHTML += `<button id="btn-nav-${p}" class="user-sub-btn ${p === 1 ? 'active' : ''}" onclick="openSubTab(event, 'user-part-${p}', 'user-sub-btn')">Passage ${p}</button>`;

                const devBtn = document.createElement('button');
                devBtn.className = `dev-sub-btn ${p === 1 ? 'active' : ''}`;
                devBtn.onclick = (e) => openSubTab(e, `dev-part-${p}`, 'dev-sub-btn');
                devBtn.innerText = `Edit P${p}`;
                devNavContainer.insertBefore(devBtn, devNavContainer.lastElementChild);

                // Hapus tombol insert marker manual, karena sekarang otomatis
                devContainer.innerHTML += `
                <div id="dev-part-${p}" class="sub-content ${p === 1 ? 'active' : ''}">
                    <div class="dev-container">
                        <h3 style="margin-top:0; color:#333;">Passage ${p} Setup</h3>
                        <input type="text" id="input-title-${p}" placeholder="Judul Heading (Misal: Questions 34-43)" value="Questions 1-10" style="padding:10px; width:100%; box-sizing:border-box; margin-bottom:10px; font-weight:bold;">
                        
                        <div class="format-toolbar">
                            <button class="format-btn" title="Bold" onclick="formatText('input-passage-${p}', '<b>', '</b>')">B</button>
                            <button class="format-btn" title="Italic" onclick="formatText('input-passage-${p}', '<i>', '</i>')">I</button>
                            <button class="format-btn" onclick="formatSource('${p}')" style="color:red; margin-left:10px;">ðŸ“ Highlight Lokasi Jawaban</button>
                        </div>
                        <textarea id="input-passage-${p}" class="passage-textarea" style="height:250px" placeholder="Masukkan teks Passage di sini...\n\nKetik (1), (5), (10) di awal paragraf untuk memunculkan nomor baris otomatis."></textarea>
                        
                        <div class="format-toolbar" style="background:var(--dev-color); color:white; padding:8px 10px; border-radius:5px 5px 0 0;">ðŸ“ Soal Pilihan Ganda (Bisa (A), A., A), dll)</div>
                        <textarea id="input-magic-questions-${p}" class="smart-textarea" placeholder="Ketik soal...\nContoh:\n34. What does the passage mainly discuss?\n(A) The function...\n(B) The connection..."></textarea>
                        
                        <div style="display:flex; gap:15px; margin-top:15px;">
                            <div style="flex:1;">
                                <div class="format-toolbar" style="background:#27ae60; color:white; padding:8px 10px; border-radius:5px 5px 0 0;"><img src="../asset/icon/key.png" style="width:15px;height:15px;vertical-align:middle;margin-right:5px;"> Kunci Jawaban</div>
                                <textarea id="input-answer-key-${p}" class="answer-textarea" placeholder="Contoh: \n34. a\n35. b..."></textarea>
                            </div>
                            <div style="flex:2;">
                                <div class="format-toolbar" style="background:#3498db; color:white; padding:8px 10px; border-radius:5px 5px 0 0;"><img src="../asset/icon/light.png" style="width:15px;height:15px;vertical-align:middle;margin-right:5px;"> Pembahasan (Opsional)</div>
                                <textarea id="input-explanation-${p}" class="explanation-textarea" placeholder="Contoh:\n34. Terdapat pada baris ke-4..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            devContainer.innerHTML += `
            <div id="dev-guide" class="sub-content">
                <div class="dev-container" style="max-width: 900px; padding-top: 10px;">
                    <div style="background: #fff; padding: 25px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid #004b87;">
                        <h2 style="color: #004b87; margin-top: 0;">ðŸ“– Panduan Fitur Otomatis</h2>
                        
                        <div style="background:#e3f2fd; padding:15px; border-left:4px solid #3498db; margin-bottom:20px;">
                            <strong style="color:#004b87;">Cara Memunculkan Nomor Baris Otomatis:</strong><br><br>
                            Anda hanya perlu <strong>mengetikkan angka di dalam tanda kurung</strong> di awal paragraf atau awal baris pada kotak pengetikan teks (contoh: <code>(1)</code>, <code>(5)</code>, <code>(10)</code>).<br><br>
                            Saat Anda mengklik "Update Tampilan", sistem akan <strong>secara ajaib</strong> memotong tanda kurung tersebut dan menjadikannya nomor baris yang melayang di margin kiri luar kotak, persis seperti yang Anda ketikkan di panel Developer!
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function isDeveloperMode() {
            const params = new URLSearchParams(window.location.search);
            return window.location.hash === "#dev-view" || params.get("mode") === "dev";
        }

        function applyViewMode() {
            if (isDeveloperMode()) return;
            const userButton = Array.from(document.querySelectorAll(".tab-button")).find((button) => (button.getAttribute("onclick") || "").includes("'user-view'"));
            if (userButton) userButton.remove();
            const userView = document.getElementById("user-view");
            if (userView) userView.classList.add("active");
        }

        function activateInitialTab() {
            if (!isDeveloperMode()) return;
            const devButton = Array.from(document.querySelectorAll(".tab-button")).find((button) => (button.getAttribute("onclick") || "").includes("'dev-view'"));
            if (devButton) {
                openTab({ currentTarget: devButton }, 'dev-view');
            }
        }

        function openSubTab(evt, tabName, btnClass) {
            const parent = document.getElementById(tabName).parentElement;
            parent.querySelectorAll(".sub-content").forEach(c => c.classList.remove("active"));
            
            const navContainer = btnClass.includes('user') ? document.getElementById('user-sub-nav-container') : document.getElementById('dev-sub-nav-container');
            navContainer.querySelectorAll(`.${btnClass}`).forEach(b => b.classList.remove("active"));
            
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function formatText(areaId, openTag, closeTag) {
            const textArea = document.getElementById(areaId);
            const start = textArea.selectionStart;
            const end = textArea.selectionEnd;
            const text = textArea.value;
            textArea.value = text.substring(0, start) + openTag + text.substring(start, end) + closeTag + text.substring(end);
            textArea.focus();
        }

        function formatSource(p) {
            const qNum = prompt("Tandai lokasi jawaban untuk soal nomor berapa? (contoh: 34)");
            if (qNum) formatText(`input-passage-${p}`, `<span id="source-${p}_${qNum.trim()}" class="source-highlight">`, `</span>`);
        }

        function scrollToSource(uniqueID) {
            const el = document.getElementById(`source-${uniqueID}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('active-highlight');
                setTimeout(() => el.classList.remove('active-highlight'), 2500);
            } else {
                alert("Lokasi jawaban (Highlight) belum ditambahkan oleh instruktur di teks bacaan ini.");
            }
        }

        let globalAnswerKey = {};
        let globalExplanations = {};
        let globalQuestions = {};
        let globalPassages = {};
        let timerInterval;

        function updateUserView(shouldSaveMeta = false) {
            if (shouldSaveMeta) {
                saveSectionMeta();
                saveSectionDraft();
            }
            document.getElementById('global-score-board').style.display = 'none';
            globalAnswerKey = {};
            globalExplanations = {};
            globalQuestions = {};
            globalPassages = {};

            for(let p=1; p<=TOTAL_PASSAGES; p++) {
                document.getElementById(`display-title-${p}`).innerText = document.getElementById(`input-title-${p}`).value || `Questions ${p}`;
                let passageText = document.getElementById(`input-passage-${p}`).value;
                
                // SISTEM PENDETEKSI (AUTO-PARSE) NOMOR BARIS
                passageText = passageText.split('\n\n').map(para => {
                    if(para.trim() === '') return '';
                    // 1. Ubah enter tunggal menjadi <br>
                    let processedPara = para.trim().replace(/\n/g, '<br>');
                    // 2. Deteksi teks (1), (5), (14) di awal paragraf atau setelah <br>, lalu jadikan span
                    processedPara = processedPara.replace(/(^|<br>)\s*\((\d+)\)\s*/g, '$1<span class="line-marker">($2)</span>');
                    return `<p>${processedPara}</p>`;
                }).join('');
                document.getElementById(`display-passage-${p}`).innerHTML = passageText;
                globalPassages[p] = { title: document.getElementById(`input-title-${p}`).value || `Passage ${p}`, content: passageText };

                document.getElementById(`input-answer-key-${p}`).value.split('\n').forEach(l => {
                    let m = l.match(/^(\d+)[\.\)]?\s+(.*)/);
                    if(m) globalAnswerKey[`${p}_${m[1]}`] = m[2].trim().toLowerCase();
                });

                let currentExpNum = null;
                document.getElementById(`input-explanation-${p}`).value.split('\n').forEach(l => {
                    let m = l.match(/^(\d+)[\.\)]?\s+(.*)/);
                    if(m) { currentExpNum = `${p}_${m[1]}`; globalExplanations[currentExpNum] = m[2].trim(); }
                    else if(currentExpNum && l.trim()) globalExplanations[currentExpNum] += "<br>" + l.trim();
                });

                const lines = document.getElementById(`input-magic-questions-${p}`).value.split('\n');
                let cleanHtml = '';
                let openDiv = false;
                let currentUID = '';

                for (let line of lines) {
                    let rawLine = line.trim();
                    if (!rawLine) continue;
                    
                    let qMatch = rawLine.match(/^(?:<[^>]+>)*(\d+)[\.\)]?\s+(.*)/);
                    let isOption = rawLine.match(/^[\(]?([A-D])[\.\)]?\s+(.*)/i);

                    if (qMatch && !isOption) {
                        if (openDiv) cleanHtml += `<div class="feedback" id="feedback-${currentUID}"></div></div>`;
                        let currentQuestionNum = qMatch[1];
                        currentUID = `${p}_${currentQuestionNum}`;
                        globalQuestions[currentUID] = { questionText: qMatch[2], options: {}, passageId: p };
                        cleanHtml += `<div class="question-item" id="q-container-${currentUID}">`;
                        cleanHtml += `<p>${currentQuestionNum}. ${qMatch[2]}</p>`;
                        cleanHtml += `<div class="radio-group">`;
                        openDiv = true;
                    } else if (isOption && openDiv) {
                        let letter = isOption[1].toUpperCase();
                        if (globalQuestions[currentUID]) globalQuestions[currentUID].options[letter] = isOption[2];
                        cleanHtml += `<label>
                            <input type="radio" name="q_${currentUID}" value="${letter.toLowerCase()}"> 
                            <span class="option-letter">(${letter})</span> 
                            <span>${isOption[2]}</span>
                        </label>`;
                    }
                }
                if (openDiv) cleanHtml += `</div><div class="feedback" id="feedback-${currentUID}"></div></div>`;

                document.getElementById(`display-questions-${p}`).innerHTML = cleanHtml;
            }
            updateHeaderProgress();
            startTimer();
        }

        function submitAnswers() {
            let score = 0;
            let total = Object.keys(globalAnswerKey).length;

            if (total === 0) { alert("Kunci jawaban belum dimasukkan oleh instruktur/developer."); return; }
            if (!confirm("Yakin ingin mengakhiri ujian dan melihat skor?")) return;

            clearInterval(timerInterval);

            for (let uid in globalAnswerKey) {
                const radio = document.querySelector(`input[name="q_${uid}"]:checked`);
                const userAnswer = radio ? radio.value.trim().toLowerCase() : '';
                if (userAnswer === globalAnswerKey[uid]) score++;
            }

            const scaledScore = Math.round(31 + ((score / total) * (67 - 31)));

            const answeredQs = Object.keys(globalAnswerKey).map(uid => {
                const pId = parseInt(uid.split('_')[0]);
                const qNum = parseInt(uid.split('_')[1]);
                const radio = document.querySelector(`input[name="q_${uid}"]:checked`);
                const userAnswer = radio ? radio.value.trim().toLowerCase() : '';
                const correct = globalAnswerKey[uid];
                const q = globalQuestions[uid] || {};
                return { uid, number: qNum, passageId: pId, questionText: q.questionText || `Question ${qNum}`, options: q.options || {}, correctAnswer: correct, userAnswer, isCorrect: userAnswer === correct, explanation: globalExplanations[uid] || '' };
            }).sort((a, b) => a.number - b.number);

            const passages = {};
            for (let pid in globalPassages) passages[pid] = globalPassages[pid];

            const result = { sectionTitle: "Section 3: Reading Comprehension", sectionKey: "reading", totalQuestions: total, rawScore: score, scaledScore, submittedAt: new Date().toISOString().slice(0, 10), questions: answeredQs, passages };
            localStorage.setItem('toefl_section3_result', JSON.stringify(result));
            window.location.href = 'section 3-answered.html';
        }

        function startTimer() {
            let t = 3300; 
            clearInterval(timerInterval);
            document.getElementById('time').style.color = "#d32f2f";
            timerInterval = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('time').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                if(t <= 300) { document.getElementById('time').style.animation = "blink 1s infinite"; }
                if(--t < 0) { 
                    clearInterval(timerInterval); 
                    alert("Waktu Habis! Jawaban Anda disubmit otomatis.");
                    submitAnswers(); 
                }
            }, 1000);
        }

        function bindUserToolbarActions() {
            const userContainer = document.getElementById("user-passages-container");
            if (userContainer) {
                userContainer.addEventListener("change", (event) => {
                    const target = event.target;
                    if (target && target.matches('input[type="radio"]')) {
                        updateHeaderProgress();
                    }
                });
            }
        }

        window.onload = async () => {
            initStructure();
            applyViewMode();
            activateInitialTab();
            bindUserToolbarActions();
            updateFullScreenButton();
            document.addEventListener("fullscreenchange", handleFullScreenStateChange);
            try {
                await loadSectionMeta();
                await loadSectionDraft();
                updateUserView();
            } catch (error) {
                console.warn("[Init] Failed to fully restore section data:", error);
            }
            positionListeningHeaderTimer();
            setTimeout(positionListeningHeaderTimer, 60);
            const featuresOverlay = document.getElementById("features-overlay");
            if (featuresOverlay) {
                featuresOverlay.addEventListener("click", handleFeaturesOverlayClick);
            }
            document.addEventListener("keydown", handleFeaturesMenuKeydown);
            window.addEventListener("resize", positionListeningHeaderTimer);
            const setDateEl = document.getElementById("set-date");
            const setDifficultyEl = document.getElementById("set-difficulty");
            if (setDateEl) setDateEl.addEventListener("change", handleSetDateChange);
            if (setDifficultyEl) setDifficultyEl.addEventListener("change", saveSectionMeta);
        };
    </script>
</body>
