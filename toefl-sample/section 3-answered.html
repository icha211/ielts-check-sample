<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section 3 Review – Reading | TOEFL ITP</title>
    <style>
        :root {
            --primary: #004b87;
            --bg-body: #f0f5fa;
            --bg-surface: #ffffff;
            --text-main: #0d1f33;
            --text-muted: #5a6d83;
            --border-color: #d0dde9;
            --danger: #c44444;
            --success: #1463ad;
            --footer-h: 94px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

        body { background: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .page-header {
            background: linear-gradient(90deg, #003a6e, #004b87);
            color: #e8f2ff; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
            border-bottom: 2px solid #0069bd; flex-shrink: 0;
            height: 52px;
        }

        .page-header-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; }

        .page-header-badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

        /* Main layout: side by side panels */
        .main-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Left: passage */
        .passage-panel {
            width: 42%;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: #fff;
            overflow: hidden;
        }

        .panel-header {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--primary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .passage-id-chip {
            background: #e8f2ff; color: var(--primary);
            border: 1px solid #b8d5f5; border-radius: 999px;
            padding: 2px 10px; font-size: 12px; font-weight: 700;
        }

        .passage-title {
            padding: 10px 16px 0;
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text-main);
            flex-shrink: 0;
        }

        .passage-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 20px;
            font-size: 0.9rem;
            line-height: 1.75;
            color: #1a2e3d;
        }

        .line-marker {
            display: inline-block;
            background: #e8f0fb;
            color: #004b87;
            border: 1px solid #b8d0f0;
            border-radius: 4px;
            padding: 0 5px;
            font-size: 0.78rem;
            font-weight: 700;
            margin-right: 2px;
            vertical-align: middle;
            line-height: 1.6;
        }

        /* Drag handle */
        .resize-handle {
            width: 8px;
            background: #eef4fb;
            border-left: 1px solid #d0dde9;
            border-right: 1px solid #d0dde9;
            cursor: col-resize;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .resize-handle::after {
            content: "⋮";
            color: #88a8c8;
            font-size: 18px;
        }

        /* Right: question panel */
        .question-panel {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .question-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .q-card {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 3px 10px rgba(0,75,135,0.06); padding: 16px;
        }

        .panel-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; }

        .question-no { font-size: 0.82rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }

        .passage-badge {
            display: inline-block; background: #e8f2ff; color: var(--primary);
            border: 1px solid #b8d5f5; border-radius: 999px;
            padding: 4px 12px; font-size: 12px; font-weight: 700; margin-bottom: 12px;
        }

        .question-text { font-size: 0.95rem; line-height: 1.65; }

        .answer-option {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid transparent;
        }
        .answer-option.correct { background: rgba(20,99,173,0.08); border-color: rgba(20,99,173,0.2); }
        .answer-option.incorrect { background: rgba(196,68,68,0.08); border-color: rgba(196,68,68,0.2); }

        .opt-circle {
            width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; border: 2px solid #a0b8d0; background: #fff; color: var(--text-main); font-size: 0.82rem;
        }
        .answer-option.correct .opt-circle { background: var(--success); border-color: var(--success); color: #fff; }
        .answer-option.incorrect .opt-circle { background: var(--danger); border-color: var(--danger); color: #fff; }

        .opt-text { flex: 1; line-height: 1.5; font-size: 0.93rem; }
        .opt-meta { font-size: 0.72rem; font-weight: 700; border-radius: 999px; padding: 3px 8px; align-self: center; white-space: nowrap; }
        .opt-meta.user { background: #e8f2ff; color: #003a6e; }
        .opt-meta.correct { background: #ddeeff; color: var(--success); }

        /* Explanation */
        .explanation-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); }
        .explanation-text { line-height: 1.6; color: #334155; font-size: 0.93rem; display: grid; gap: 8px; }
        .expl-position-card { background: #eaf3ff; border: 1px solid #b8d5f5; border-left: 4px solid #004b87; border-radius: 10px; padding: 12px 14px; }
        .expl-explain-card { background: #f8fbff; border: 1px solid #ccdded; border-left: 4px solid #1463ad; border-radius: 10px; padding: 12px 14px; }
        .expl-card-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #004b87; margin-bottom: 6px; }
        .expl-card-body { font-size: 0.93rem; line-height: 1.65; color: #334155; }
        .passage-highlight { background-color: #cde8ff; color: #0d3d6b; border-radius: 3px; padding: 0 2px; font-weight: 700; }

        /* Footer */
        .review-footer { height: var(--footer-h); background: var(--bg-surface); border-top: 1px solid var(--border-color); box-shadow: 0 -4px 14px rgba(0,75,135,0.1); flex-shrink: 0; }
        .review-footer-wrap { height: 100%; max-width: 100%; padding: 0 20px; display: grid; grid-template-columns: 240px 1fr 280px; gap: 10px; align-items: center; }
        .summary-col { display: flex; align-items: center; gap: 10px; }
        .score-ring { --pct: 0%; width: 60px; height: 60px; border-radius: 50%; background: conic-gradient(var(--primary) var(--pct), #d0dde9 0); display: grid; place-items: center; flex-shrink: 0; position: relative; }
        .score-ring::before { content: ""; width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 1px solid #c0d0e0; position: absolute; }
        .score-value { position: relative; z-index: 1; font-size: 1rem; font-weight: 700; color: var(--primary); }
        .score-band { position: relative; z-index: 1; font-size: 0.5rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
        .summary-meta h1 { font-size: 0.88rem; font-weight: 700; margin-bottom: 2px; }
        .summary-meta p { font-size: 0.72rem; color: var(--text-muted); }

        .tracker { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; overflow: hidden; max-height: 74px; }

        .tracker-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; position: relative; padding: 4px 8px 4px 28px; border: 1px solid #d0dde9; border-radius: 999px; background: #f5f8fb; }
        .tracker-group-label { position: absolute; left: 6px; font-size: 0.65rem; font-weight: 700; color: var(--primary); white-space: nowrap; }

        .q-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #a0b8d0; background: #fff; color: #1a2840; font-size: 0.7rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .q-circle.correct { background: #d8eeff; border-color: #7db3d5; color: #0d3f70; }
        .q-circle.incorrect { background: #fae0e0; border-color: #e8a0a0; color: #8f2020; }
        .q-circle.active { box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px var(--primary); }

        .nav-col { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        .nav-small { width: 40px; height: 34px; border-radius: 8px; border: 1px solid var(--border-color); background: #fff; cursor: pointer; font-size: 1rem; font-weight: 700; }
        .nav-small:disabled { opacity: 0.4; cursor: not-allowed; }
        .next-btn { min-width: 130px; height: 34px; border-radius: 8px; border: 1px solid #90b8d8; background: #e8f2ff; color: var(--primary); font-weight: 700; cursor: pointer; padding: 0 12px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .next-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 800px) {
            .main-body { flex-direction: column; overflow-y: auto; }
            .passage-panel { width: 100%; min-height: 250px; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border-color); }
            .resize-handle { display: none; }
            .question-panel { min-height: 300px; overflow: visible; }
            .question-scroll { overflow: visible; }
            .body { overflow-y: auto; }
            .review-footer-wrap { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-header-title">📘 Section 3: Reading Comprehension — Answer Review</div>
        <span class="page-header-badge">TOEFL ITP</span>
    </div>

    <div class="main-body" id="mainBody">
        <!-- Left: passage -->
        <div class="passage-panel" id="passagePanel">
            <div class="panel-header">
                <span>Passage</span>
                <span class="passage-id-chip" id="passageChip">—</span>
            </div>
            <div class="passage-title" id="passageTitle">—</div>
            <div class="passage-body" id="passageBody">Select a question to view its passage.</div>
        </div>

        <div class="resize-handle" id="resizeHandle"></div>

        <!-- Right: question scroll -->
        <div class="question-panel" id="questionPanel">
            <div class="question-scroll">
                <div class="q-card">
                    <div class="panel-label">Question</div>
                    <div id="passageBadge" class="passage-badge"></div>
                    <div class="question-no" id="questionNo">Question —</div>
                    <div class="question-text" id="questionText">—</div>
                </div>

                <div class="q-card">
                    <div class="panel-label">Answer Options</div>
                    <div id="optionsBox"></div>
                </div>

                <div class="q-card">
                    <div class="explanation-title">Explanation</div>
                    <div class="explanation-text" id="explanationText">No explanation provided.</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="review-footer">
        <div class="review-footer-wrap">
            <div class="summary-col">
                <div class="score-ring" id="scoreRing">
                    <div>
                        <div class="score-value" id="scaledScore">—</div>
                        <div class="score-band">ITP Score</div>
                    </div>
                </div>
                <div class="summary-meta">
                    <h1>Section 3: Reading</h1>
                    <p id="scoreSummary">0 correct of 0</p>
                </div>
            </div>

            <div class="tracker" id="tracker"></div>

            <div class="nav-col">
                <button class="nav-small" id="prevBtn" type="button">&#8592;</button>
                <div id="questionCounter" style="min-width:80px;text-align:center;font-weight:700;font-size:0.85rem;">Q 1 / 50</div>
                <button class="next-btn" id="nextBtn" type="button">Next &#8594;</button>
            </div>
        </div>
    </footer>

    <script>
        let result = null;
        let flatQuestions = [];
        let currentIdx = 0;

        function escapeHtml(v) { return String(v || "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }

        function renderQuotedHighlights(v) {
            return escapeHtml(v)
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/"([^"]{1,})"/g, (_, i) => `<mark class="passage-highlight">"${i}"</mark>`)
                .replace(/\n/g, '<br>');
        }

        function extractFirstQuotedPhrase(text) {
            const m = String(text || "").match(/"([^"]{2,})"/);
            return m ? m[1].trim() : '';
        }

        function parseSimpleExplanation(text) {
            const raw = String(text || '').replace(/\r/g, '').replace(/<br\s*\/?>/gi, '\n').trim();
            if (!raw) return null;
            const multiline = raw.match(/(?:^|\n)\s*(?:\d+\.\s*)?Position\s*:\s*([\s\S]*?)\n+\s*(?:Explain(?:ation)?|Reason)\s*:\s*([\s\S]*)$/i);
            const inline = raw.match(/(?:^|\n)\s*(?:\d+\.\s*)?Position\s*:\s*([\s\S]*?)\s+(?:Explain(?:ation)?|Reason)\s*:\s*([\s\S]*)$/i);
            const match = multiline || inline;
            if (!match) return null;
            const positionText = String(match[1] || '').trim();
            const explainText = String(match[2] || '').trim();
            if (!positionText && !explainText) return null;
            return { positionText, explainText };
        }

        function renderExplanationText(el, text) {
            const raw = String(text || '').replace(/\r/g, '').replace(/<br\s*\/?>/gi, '\n').trim();
            const parsed = parseSimpleExplanation(raw);
            if (parsed) {
                el.innerHTML = `
                    <div class="expl-position-card">
                        <div class="expl-card-label">&#128205; Position</div>
                        <div class="expl-card-body">${renderQuotedHighlights(parsed.positionText)}</div>
                    </div>
                    <div class="expl-explain-card">
                        <div class="expl-card-label">&#128161; Explanation</div>
                        <div class="expl-card-body">${renderQuotedHighlights(parsed.explainText)}</div>
                    </div>`;
                return;
            }
            el.innerHTML = renderQuotedHighlights(raw);
        }

        function renderOptions(q) {
            const box = document.getElementById('optionsBox');
            box.innerHTML = '';
            const options = q.options || {};
            const letters = Object.keys(options).sort();
            if (!letters.length) { box.innerHTML = '<p style="color:var(--text-muted);font-size:0.88rem;">No options stored.</p>'; return; }
            const correctLetter = String(q.correctAnswer || '').trim().toUpperCase();
            const userLetter = String(q.userAnswer || '').trim().toUpperCase();
            letters.forEach(letter => {
                const isCorrect = letter === correctLetter;
                const row = document.createElement('div');
                row.className = 'answer-option ' + (isCorrect ? 'correct' : 'incorrect');
                const circle = document.createElement('div'); circle.className = 'opt-circle'; circle.textContent = letter;
                const text = document.createElement('div'); text.className = 'opt-text'; text.textContent = options[letter];
                row.appendChild(circle); row.appendChild(text);
                if (userLetter === letter) { const tag = document.createElement('span'); tag.className = 'opt-meta user'; tag.textContent = 'Your answer'; row.appendChild(tag); }
                if (isCorrect) { const tag = document.createElement('span'); tag.className = 'opt-meta correct'; tag.textContent = 'Correct'; row.appendChild(tag); }
                box.appendChild(row);
            });
        }

        function updatePassagePanel(passageId) {
            const passages = (result && result.passages) ? result.passages : {};
            const passage = passages[passageId];
            document.getElementById('passageChip').textContent = `Passage ${passageId}`;
            if (passage) {
                document.getElementById('passageTitle').textContent = passage.title || `Passage ${passageId}`;
                document.getElementById('passageBody').innerHTML = passage.content || '';
            } else {
                document.getElementById('passageTitle').textContent = `Passage ${passageId}`;
                document.getElementById('passageBody').textContent = 'Passage text not available.';
            }
        }

        function setActiveCircle(number) {
            document.querySelectorAll('.q-circle.active').forEach(el => el.classList.remove('active'));
            const target = Array.from(document.querySelectorAll('.q-circle')).find(el => Number(el.dataset.num) === number);
            if (target) { target.classList.add('active'); target.scrollIntoView({ block: 'nearest', inline: 'nearest' }); }
        }

        function showQuestion(idx) {
            if (!flatQuestions.length) return;
            idx = Math.max(0, Math.min(idx, flatQuestions.length - 1));
            currentIdx = idx;
            const q = flatQuestions[currentIdx];
            document.getElementById('passageBadge').textContent = `Passage ${q.passageId || '?'}`;
            document.getElementById('questionNo').textContent = `Question ${q.number}`;
            document.getElementById('questionText').textContent = q.questionText || '(No question text)';
            document.getElementById('questionCounter').textContent = `Q ${q.number} / ${result.totalQuestions || flatQuestions.length}`;
            document.getElementById('prevBtn').disabled = currentIdx === 0;
            document.getElementById('nextBtn').disabled = currentIdx === flatQuestions.length - 1;
            updatePassagePanel(q.passageId);
            renderOptions(q);
            renderExplanationText(document.getElementById('explanationText'), q.explanation || '');
            setActiveCircle(q.number);
        }

        function buildTracker() {
            const tracker = document.getElementById('tracker');
            tracker.innerHTML = '';
            // Group by passage
            const groups = {};
            flatQuestions.forEach(q => {
                const pid = q.passageId || 0;
                if (!groups[pid]) groups[pid] = [];
                groups[pid].push(q);
            });
            Object.keys(groups).sort((a,b) => Number(a)-Number(b)).forEach(pid => {
                const group = groups[pid];
                const grpEl = document.createElement('div');
                grpEl.className = 'tracker-group';
                const lbl = document.createElement('span');
                lbl.className = 'tracker-group-label';
                lbl.textContent = `P${pid}`;
                grpEl.appendChild(lbl);
                group.forEach(q => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'q-circle ' + (q.isCorrect ? 'correct' : 'incorrect');
                    btn.textContent = q.number;
                    btn.dataset.num = q.number;
                    btn.addEventListener('click', () => { const fi = flatQuestions.findIndex(x => x.number === q.number); if (fi >= 0) showQuestion(fi); });
                    grpEl.appendChild(btn);
                });
                tracker.appendChild(grpEl);
            });
        }

        // Panel resize
        function initResize() {
            const handle = document.getElementById('resizeHandle');
            const passagePanel = document.getElementById('passagePanel');
            const mainBody = document.getElementById('mainBody');
            let dragging = false;
            let startX = 0;
            let startW = 0;

            handle.addEventListener('mousedown', e => {
                dragging = true;
                startX = e.clientX;
                startW = passagePanel.offsetWidth;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', e => {
                if (!dragging) return;
                const dx = e.clientX - startX;
                const totalW = mainBody.offsetWidth;
                const newW = Math.max(180, Math.min(totalW - 200, startW + dx));
                passagePanel.style.width = newW + 'px';
                passagePanel.style.flex = 'none';
            });

            document.addEventListener('mouseup', () => {
                if (dragging) { dragging = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; }
            });
        }

        function init() {
            try { const raw = localStorage.getItem('toefl_section3_result'); if (raw) result = JSON.parse(raw); } catch (_) {}

            if (!result || !Array.isArray(result.questions) || !result.questions.length) {
                document.getElementById('questionText').textContent = 'No review data found. Complete Section 3 first.';
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                return;
            }

            flatQuestions = result.questions;
            const total = result.totalQuestions || flatQuestions.length;
            const raw2 = result.rawScore || 0;
            const scaled = result.scaledScore || 0;
            const pct = scaled <= 31 ? 0 : Math.round(((scaled - 31) / (67 - 31)) * 100);
            document.getElementById('scaledScore').textContent = scaled;
            document.getElementById('scoreSummary').textContent = `${raw2} correct of ${total}`;
            document.getElementById('scoreRing').style.setProperty('--pct', pct + '%');

            buildTracker();
            document.getElementById('prevBtn').addEventListener('click', () => showQuestion(currentIdx - 1));
            document.getElementById('nextBtn').addEventListener('click', () => showQuestion(currentIdx + 1));
            initResize();
            showQuestion(0);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
