<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepHaven | Study Plan Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f7f5;
            --surface: #ffffff;
            --text: #182621;
            --muted: #5a6d66;
            --border: #d8e4de;
            --shadow: 0 12px 28px rgba(14, 97, 80, 0.11);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 7% 9%, rgba(157, 225, 111, 0.18), transparent 32%),
                        radial-gradient(circle at 94% 4%, rgba(31, 138, 112, 0.18), transparent 28%),
                        var(--bg);
            padding: 0;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            min-height: 100vh;
            transition: grid-template-columns 0.2s ease;
        }

        body.sidebar-collapsed .app-shell {
            grid-template-columns: 90px minmax(0, 1fr);
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.9);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(8px);
            padding: 1.15rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .brand-badge {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(140deg, #0e6150, #1f8a70);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .brand-copy strong {
            display: block;
            font-family: "Sora", sans-serif;
            font-size: 1.42rem;
            line-height: 1;
        }

        .brand-copy span {
            color: var(--muted);
            font-size: 0.8rem;
        }

        .nav-link {
            border: 1px solid transparent;
            border-radius: 12px;
            min-height: 44px;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-weight: 700;
        }

        .nav-emoji {
            width: 26px;
            height: 26px;
            border-radius: 999px;
            background: #e7f3ee;
            color: #1e5b4b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.03em;
        }

        .nav-link.active,
        .nav-link:hover {
            background: #eef5f1;
            border-color: #d9e4de;
        }

        .sidebar-toggle {
            margin-top: auto;
            border: 1px solid #d9e4de;
            background: #fff;
            border-radius: 10px;
            min-height: 40px;
            padding: 0.45rem 0.65rem;
            font: inherit;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
        }

        .content-wrap {
            padding: 1rem;
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            gap: 0.9rem;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .top h1 {
            font-family: "Sora", sans-serif;
            font-size: clamp(1.6rem, 3.4vw, 2.7rem);
            line-height: 1.15;
        }

        .back-btn {
            border: 1px solid var(--border);
            background: #0e6150;
            color: #fff;
            border-radius: 12px;
            min-height: 44px;
            padding: 0.55rem 1rem;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: transform 0.18s ease, background-color 0.18s ease;
        }

        .back-btn:hover {
            background: #0a4a3d;
            transform: translateY(-1px);
        }

        .calendar-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 1rem;
        }

        .weekday-row,
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0.45rem;
        }

        .weekday {
            text-align: center;
            font-size: 0.95rem;
            font-weight: 800;
            color: #5a6d66;
            padding: 0.35rem 0.12rem;
        }

        .day-placeholder,
        .day-card {
            min-height: 126px;
            border-radius: 12px;
            border: 1px solid #cfe0d8;
            background: #fff;
            padding: 0.65rem;
        }

        .day-placeholder {
            border-style: dashed;
            background: #f8fbfd;
        }

        .day-card {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .day-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(58, 88, 124, 0.15);
        }

        .day-card.today {
            border-color: #79bf9f;
            box-shadow: 0 0 0 2px rgba(121, 191, 159, 0.25);
        }

        .day-card.done {
            background: linear-gradient(180deg, #ffffff 0%, #f0faf5 100%);
        }

        .day-num {
            font-size: 2rem;
            line-height: 1;
            font-weight: 800;
            color: #34594d;
        }

        .pill-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .task-pill {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            background: #e3eaf2;
            color: #324b66;
        }

        .task-pill.listening.done { background: #2c9bb4; color: #fff; }
        .task-pill.reading.done { background: #2f7c48; color: #fff; }
        .task-pill.writing.done { background: #d79245; color: #fff; }
        .task-pill.speaking.done { background: #af566f; color: #fff; }

        .legend {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            color: var(--muted);
            font-size: 0.82rem;
        }

        @media (max-width: 820px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-toggle {
                display: none;
            }

            .weekday-row {
                display: none;
            }

            .calendar-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .day-num {
                font-size: 1.45rem;
            }
        }

        body.sidebar-collapsed .brand-copy,
        body.sidebar-collapsed .nav-text,
        body.sidebar-collapsed .toggle-text {
            display: none;
        }

        body.sidebar-collapsed .nav-link,
        body.sidebar-collapsed .sidebar-toggle {
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="appSidebar">
            <div class="brand">
                <div class="brand-badge">PH</div>
                <div class="brand-copy">
                    <strong>PrepHaven</strong>
                    <span>IELTS with clear feedback</span>
                </div>
            </div>
            <a class="nav-link" href="index.html"><span class="nav-emoji">DB</span><span class="nav-text">Dashboard</span></a>
            <a class="nav-link active" href="study-plan.html"><span class="nav-emoji">SP</span><span class="nav-text">Study Plan</span></a>
            <a class="nav-link" href="developer.html"><span class="nav-emoji">DV</span><span class="nav-text">Developer Console</span></a>
            <button class="sidebar-toggle" id="sidebarToggleBtn" type="button"><span class="toggle-icon">&lt;&gt;</span> <span class="toggle-text">Minimize</span></button>
        </aside>
        <div class="content-wrap">
    <main class="page">
        <header class="top">
            <h1 id="calendarTitle">Mock Test Schedule</h1>
            <a class="back-btn" href="study-plan.html">Back to Month Selector</a>
        </header>

        <section class="calendar-panel" aria-label="Monthly study timetable">
            <div class="weekday-row">
                <div class="weekday">SUN</div>
                <div class="weekday">MON</div>
                <div class="weekday">TUE</div>
                <div class="weekday">WED</div>
                <div class="weekday">THU</div>
                <div class="weekday">FRI</div>
                <div class="weekday">SAT</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="legend">
                <span>Grey icon = not completed</span>
                <span>Colored icon = completed task</span>
                <span>Click day to open practice details</span>
            </div>
        </section>
    </main>
        </div>
    </div>

    <script>
        const SIDEBAR_KEY = "prephaven_sidebar_collapsed_v1";
        const DAILY_TEST_KEY = "prephaven_daily_tests_v1";
        const MODULES = ["listening", "reading", "writing", "speaking"];
        const MONTH_LABELS_ID = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
        const MODULE_ICONS = {
            listening: "L",
            reading: "R",
            writing: "W",
            speaking: "S"
        };

        const params = new URLSearchParams(window.location.search);
        const monthParam = params.get("month");

        function initSidebar() {
            const toggleBtn = document.getElementById("sidebarToggleBtn");
            const collapsed = localStorage.getItem(SIDEBAR_KEY) === "1";
            if (collapsed) {
                document.body.classList.add("sidebar-collapsed");
            }
            toggleBtn.addEventListener("click", () => {
                const next = !document.body.classList.contains("sidebar-collapsed");
                document.body.classList.toggle("sidebar-collapsed", next);
                localStorage.setItem(SIDEBAR_KEY, next ? "1" : "0");
            });
        }

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw) || fallback;
            } catch (error) {
                return fallback;
            }
        }

        function dateId(year, monthIndex, day) {
            return `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        }

        function openDatePage(dateKey) {
            window.location.href = `practice-day.html?date=${encodeURIComponent(dateKey)}`;
        }

        function getDateState(dateKey) {
            const store = safeParse(localStorage.getItem(DAILY_TEST_KEY), {});
            return store[dateKey] || null;
        }

        function isModuleDone(dateKey, module) {
            const dateState = getDateState(dateKey);
            return Boolean(dateState && dateState.modules && dateState.modules[module] && dateState.modules[module].taken);
        }

        function renderCalendar(year, monthIndex) {
            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";

            const dayCount = new Date(year, monthIndex + 1, 0).getDate();
            const firstWeekday = new Date(year, monthIndex, 1).getDay();

            for (let i = 0; i < firstWeekday; i += 1) {
                const gap = document.createElement("div");
                gap.className = "day-placeholder";
                grid.appendChild(gap);
            }

            const today = new Date();
            const todayKey = dateId(today.getFullYear(), today.getMonth(), today.getDate());

            for (let day = 1; day <= dayCount; day += 1) {
                const key = dateId(year, monthIndex, day);
                const allDone = MODULES.every((module) => isModuleDone(key, module));
                const isToday = key === todayKey;

                const card = document.createElement("article");
                card.className = "day-card" + (allDone ? " done" : "") + (isToday ? " today" : "");
                card.addEventListener("click", () => openDatePage(key));

                const num = document.createElement("span");
                num.className = "day-num";
                num.textContent = String(day);
                card.appendChild(num);

                const pillRow = document.createElement("div");
                pillRow.className = "pill-row";
                MODULES.forEach((module) => {
                    const pill = document.createElement("span");
                    pill.className = "task-pill " + module + (isModuleDone(key, module) ? " done" : "");
                    pill.textContent = MODULE_ICONS[module];
                    pillRow.appendChild(pill);
                });
                card.appendChild(pillRow);

                grid.appendChild(card);
            }
        }

        function init() {
            const now = new Date();
            let year = now.getFullYear();
            let monthIndex = now.getMonth();

            if (monthParam && /^\d{4}-\d{2}$/.test(monthParam)) {
                year = Number(monthParam.slice(0, 4));
                monthIndex = Number(monthParam.slice(5, 7)) - 1;
            }

            if (monthIndex < 0 || monthIndex > 11) {
                monthIndex = now.getMonth();
            }

            document.getElementById("calendarTitle").textContent = `Mock Test Schedule: ${MONTH_LABELS_ID[monthIndex]} ${year}`;
            renderCalendar(year, monthIndex);
        }

        initSidebar();
        init();
    </script>
</body>
</html>
