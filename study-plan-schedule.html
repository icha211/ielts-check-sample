<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Check | Study Plan Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f7f5;
            --surface: #ffffff;
            --text: #182621;
            --muted: #5a6d66;
            --border: #d8e4de;
            --shadow: 0 12px 28px rgba(14, 97, 80, 0.11);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 7% 9%, rgba(157, 225, 111, 0.18), transparent 32%),
                        radial-gradient(circle at 94% 4%, rgba(31, 138, 112, 0.18), transparent 28%),
                        var(--bg);
            padding: 0;
        }

        .app-shell {
            min-height: 100vh;
        }

        .sidebar {
            position: sticky;
            top: 0;
            z-index: 40;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            background: rgba(243, 247, 245, 0.88);
        }

        .sidebar-inner {
            width: min(1120px, calc(100% - 2rem));
            margin-inline: auto;
            min-height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .brand-badge {
            width: clamp(64px, 9vw, 104px);
            height: 34px;
            border-radius: 0;
            display: grid;
            place-items: center;
            overflow: visible;
            background: transparent;             
            transform: translateY(-5px);
        }

        .brand-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            list-style: none;
        }

        .nav-link {
            text-decoration: none;
            color: #28443b;
            font-size: 0.88rem;
            font-weight: 600;
            min-height: 44px;
            padding: 0 0.75rem;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.18s ease, transform 0.18s ease;
        }

        .nav-link.active,
        .nav-link:hover {
            background: #e4efea;
            transform: translateY(-1px);
        }

        .content-wrap {
            width: min(1120px, calc(100% - 2rem));
            margin-inline: auto;
            padding: 1rem 0;
        }

        .subheader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            background: #f0f6f3;
            border: 1px solid var(--border);
        }

        .subheader strong {
            font-family: "Sora", sans-serif;
            color: #194c89;
        }

        .subnav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .subnav a {
            text-decoration: none;
            border: 1px solid transparent;
            color: #28443b;
            border-radius: 10px;
            min-height: 40px;
            padding: 0 0.75rem;
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            font-size: 0.85rem;
            background: transparent;
            transition: background-color 0.18s ease, transform 0.18s ease;
        }

        .subnav a.active {
            background: #e4efea;
            color: #28443b;
        }

        .subnav a:hover {
            background: #e4efea;
            transform: translateY(-1px);
        }

        .page {
            width: 100%;
            margin: 0;
            display: grid;
            gap: 0.9rem;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .top h1 {
            font-family: "Sora", sans-serif;
            font-size: clamp(1.6rem, 3.4vw, 2.7rem);
            line-height: 1.15;
        }

        .back-btn {
            border: 1px solid #d2e6dc;
            background: #fff;
            color: #185041;
            border-radius: 12px;
            min-height: 44px;
            padding: 0 1rem;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
        }

        .back-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 10px rgba(14, 97, 80, 0.08);
        }

        .calendar-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 1rem;
        }

        .weekday-row,
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0.45rem;
        }

        .weekday {
            text-align: center;
            font-size: 0.95rem;
            font-weight: 800;
            color: #5a6d66;
            padding: 0.35rem 0.12rem;
        }

        .day-placeholder,
        .day-card {
            min-height: 126px;
            border-radius: 12px;
            border: 1px solid #cfe0d8;
            background: #fff;
            padding: 0.65rem;
        }

        .day-placeholder {
            border-style: dashed;
            background: #f8fbfd;
        }

        .day-card {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .day-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(58, 88, 124, 0.15);
        }

        .day-card.today {
            border-color: #79bf9f;
            box-shadow: 0 0 0 2px rgba(121, 191, 159, 0.25);
        }

        .day-card.done {
            background: linear-gradient(180deg, #ffffff 0%, #eefbf3 100%);
            border-color: #7fc7a1;
            box-shadow: 0 0 0 2px rgba(127, 199, 161, 0.22);
        }

        .day-card.partial {
            background: linear-gradient(180deg, #ffffff 0%, #fff4f4 100%);
            border-color: #efb4b4;
        }

        .day-num {
            font-size: 2rem;
            line-height: 1;
            font-weight: 800;
            color: #34594d;
        }

        .pill-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .task-pill {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            background: #eef3f1;
            color: #7b8c88;
        }

        .task-pill.done {
            background: #2f8f62;
            color: #fff;
        }

        .legend {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            color: var(--muted);
            font-size: 0.82rem;
        }

        @media (max-width: 820px) {
            .sidebar-inner {
                min-height: auto;
                padding: 0.75rem 0;
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .weekday-row {
                display: none;
            }

            .calendar-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .day-num {
                font-size: 1.45rem;
            }
        }

    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="appSidebar">
            <div class="sidebar-inner">
                <div class="brand">
                    <div class="brand-badge"><img src="logo.png" alt="IELTS Check logo"></div>
                </div>
                <ul class="nav-links">
                    <li><a class="nav-link" href="index.html">🏠 Dashboard</a></li>
                    <li><a class="nav-link active" href="study-plan.html">📚 Study Plan</a></li>
                    <li><a class="nav-link" href="developer.html">🧑‍💻 Developer Console</a></li>
                </ul>
            </div>
        </aside>
        <div class="content-wrap">
    <main class="page">
        <section class="calendar-panel subheader" aria-label="Study plan section header">
            <strong>📚 Study Plan Workspace</strong>
            <div class="subnav">
                <a href="study-plan.html">🗓️ Month Selector</a>
                <a class="active" href="study-plan-schedule.html">🧭 Schedule View</a>
                <a href="practice-day.html">✅ Daily Practice</a>
            </div>
        </section>

        <header class="top">
            <h1 id="calendarTitle">Mock Test Schedule</h1>
            <a class="back-btn" href="study-plan.html">Back to Month Selector</a>
        </header>

        <section class="calendar-panel" aria-label="Monthly study timetable">
            <div class="weekday-row">
                <div class="weekday">SUN</div>
                <div class="weekday">MON</div>
                <div class="weekday">TUE</div>
                <div class="weekday">WED</div>
                <div class="weekday">THU</div>
                <div class="weekday">FRI</div>
                <div class="weekday">SAT</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="legend">
                <span>Grey icon = not completed</span>
                <span>Colored icon = completed task</span>
                <span>Click day to open practice details</span>
            </div>
        </section>
    </main>
        </div>
    </div>

    <script>
        const DAILY_TEST_KEY = "prephaven_daily_tests_v1";
        const MODULES = ["listening", "reading", "writing", "speaking"];
        const MONTH_LABELS_ID = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
        const MODULE_ICONS = {
            listening: "🎧",
            reading: "📖",
            writing: "✍️",
            speaking: "🗣️"
        };

        const params = new URLSearchParams(window.location.search);
        const monthParam = params.get("month");

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw) || fallback;
            } catch (error) {
                return fallback;
            }
        }

        function dateId(year, monthIndex, day) {
            return `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        }

        function openDatePage(dateKey) {
            window.location.href = `practice-day.html?date=${encodeURIComponent(dateKey)}`;
        }

        function getDateState(dateKey) {
            const store = safeParse(localStorage.getItem(DAILY_TEST_KEY), {});
            return store[dateKey] || null;
        }

        function isModuleDone(dateKey, module) {
            const dateState = getDateState(dateKey);
            return Boolean(dateState && dateState.modules && dateState.modules[module] && dateState.modules[module].taken);
        }

        function renderCalendar(year, monthIndex) {
            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";

            const dayCount = new Date(year, monthIndex + 1, 0).getDate();
            const firstWeekday = new Date(year, monthIndex, 1).getDay();

            for (let i = 0; i < firstWeekday; i += 1) {
                const gap = document.createElement("div");
                gap.className = "day-placeholder";
                grid.appendChild(gap);
            }

            const today = new Date();
            const todayKey = dateId(today.getFullYear(), today.getMonth(), today.getDate());

            for (let day = 1; day <= dayCount; day += 1) {
                const key = dateId(year, monthIndex, day);
                const allDone = MODULES.every((module) => isModuleDone(key, module));
                const isToday = key === todayKey;

                const card = document.createElement("article");
                card.className = "day-card" + (allDone ? " done" : " partial") + (isToday ? " today" : "");
                card.addEventListener("click", () => openDatePage(key));

                const num = document.createElement("span");
                num.className = "day-num";
                num.textContent = String(day);
                card.appendChild(num);

                const pillRow = document.createElement("div");
                pillRow.className = "pill-row";
                MODULES.forEach((module) => {
                    const pill = document.createElement("span");
                    pill.className = "task-pill" + (isModuleDone(key, module) ? " done" : "");
                    pill.textContent = MODULE_ICONS[module];
                    pillRow.appendChild(pill);
                });
                card.appendChild(pillRow);

                grid.appendChild(card);
            }
        }

        function init() {
            const now = new Date();
            let year = now.getFullYear();
            let monthIndex = now.getMonth();

            if (monthParam && /^\d{4}-\d{2}$/.test(monthParam)) {
                year = Number(monthParam.slice(0, 4));
                monthIndex = Number(monthParam.slice(5, 7)) - 1;
            }

            if (monthIndex < 0 || monthIndex > 11) {
                monthIndex = now.getMonth();
            }

            document.getElementById("calendarTitle").textContent = `Mock Test Schedule: ${MONTH_LABELS_ID[monthIndex]} ${year}`;
            renderCalendar(year, monthIndex);
        }

        init();
    </script>
</body>
</html>
